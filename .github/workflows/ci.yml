name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run checks
        run: scripts/check.sh
      - name: Validate nginx configuration
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            --volume "$GITHUB_WORKSPACE/deployment/nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro" \
            nginx:1.28-alpine nginx -t

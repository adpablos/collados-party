<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Pachas — los gastos de la peña</title>
<meta name="description" content="Los gastos de la peña, a partes iguales. Ni pa ti ni pa mí.">
<meta name="theme-color" content="#F5F6FA">
<meta name="apple-mobile-web-app-title" content="A Pachas">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Crect width='48' height='48' rx='10' fill='%23F5F6FA'/%3E%3Ccircle cx='24' cy='24' r='17' fill='%23FFFFFF' stroke='%23E6E8F0'/%3E%3Ccircle cx='24' cy='24' r='12.5' stroke='%235A50EC' stroke-width='3.5'/%3E%3Cg stroke='%235A50EC' stroke-width='3.5' stroke-linecap='round'%3E%3Cline x1='24' y1='24' x2='24' y2='11.5'/%3E%3Cline x1='24' y1='24' x2='35.9' y2='20.1'/%3E%3Cline x1='24' y1='24' x2='31.3' y2='34.1'/%3E%3Cline x1='24' y1='24' x2='16.7' y2='34.1'/%3E%3Cline x1='24' y1='24' x2='12.1' y2='20.1'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  /* v2 palette from the Claude Design redesign: bright neutral base, festive
     violet primary, green = owed to you, coral = you owe. Ink-dark mode. */
  :root{
    --bg:#F5F6FA;
    --card:#FFFFFF;
    --ink:#171A21;
    --muted:#6A7186;
    --line:#E6E8F0;
    --primary:#5A50EC;
    --onprimary:#FFFFFF;
    --primarysoft:#ECEAFE;
    --green:#0E9256;
    --greensoft:#DCF5E7;
    --coral:#E5484D;
    --coralsoft:#FDE8E8;
    --chip:#EFF1F6;
    --shadow:0 1px 2px rgba(16,18,24,.04);
    --overlay:rgba(13,15,22,.5);
    --radius:16px;
    --display:'Bricolage Grotesque',system-ui,-apple-system,sans-serif;
    --text:'Instrument Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
      --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
      --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
      --chip:#242836; --shadow:none; --overlay:rgba(13,15,22,.5);
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F6FA; --card:#FFFFFF; --ink:#171A21; --muted:#6A7186; --line:#E6E8F0;
    --primary:#5A50EC; --onprimary:#FFFFFF; --primarysoft:#ECEAFE;
    --green:#0E9256; --greensoft:#DCF5E7; --coral:#E5484D; --coralsoft:#FDE8E8;
    --chip:#EFF1F6; --shadow:0 1px 2px rgba(16,18,24,.04); --overlay:rgba(13,15,22,.5);
  }
  :root[data-theme="dark"]{
    --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
    --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
    --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
    --chip:#242836; --shadow:none; --overlay:rgba(13,15,22,.5);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--text);
    font-size:15px; line-height:1.45;
    min-height:100dvh;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  main{flex:1;padding:14px 20px 104px;overflow-x:hidden}
  body.no-party #tabbar{display:none}
  body.no-party main{padding-bottom:30px}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* ---------- theme button ---------- */
  #themeButton{
    /* absolute instead of fixed: it scrolls with the page instead of floating
       over cards. */
    position:absolute;top:14px;right:14px;z-index:50;
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--muted);
  }
  #themeButton svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- screen headers ---------- */
  .screen-header{margin:18px 2px 16px}
  .screen-header h1{font-family:var(--display);font-size:26px;font-weight:700;margin:0;line-height:1.15}
  .screen-header .sub{color:var(--muted);font-size:13px;margin-top:3px}

  /* ---------- party hero ---------- */
  .hero{text-align:center;padding:34px 0 6px}
  .hero .logo{color:var(--primary)}
  .hero .logo svg{width:76px;height:76px}
  .hero h1{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.5px;margin:10px 0 6px}
  .hero .tagline{color:var(--muted);font-size:14px;line-height:1.5;margin:0 auto 24px;max-width:34ch}
  .beta-badge{display:inline-flex;align-items:center;border-radius:999px;background:var(--primarysoft);
    color:var(--primary);font-size:11.5px;font-weight:700;padding:5px 10px;margin-bottom:6px}
  .how-it-works{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:4px 0 18px}
  .how-step{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 8px;
    color:var(--muted);font-size:11.5px;text-align:center;line-height:1.35}
  .how-step strong{display:block;color:var(--ink);font-size:13px;margin-bottom:2px}
  .app-footer{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:22px 0 6px;
    color:var(--muted);font-size:12px}
  .app-footer button{background:none;border:0;color:inherit;text-decoration:underline;
    text-underline-offset:3px;cursor:pointer;padding:4px}

  /* ---------- common ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);display:block;margin:16px 0 7px}
  .card .label:first-child, .field .label{margin-top:0}
  .btn{border:none;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer}
  .btn:disabled,button[aria-busy="true"]{opacity:.62;cursor:wait}
  .btn-primary{background:var(--primary);color:var(--onprimary)}
  .btn-green{background:var(--green);color:var(--onprimary)}
  .btn-danger{background:var(--coral);color:var(--onprimary)}
  .btn-soft{background:var(--primarysoft);color:var(--primary)}
  .btn-outline{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn-mini{min-height:44px;padding:8px 13px;font-size:13.5px;border-radius:9px}
  .btn-block{width:100%}
  .quiet-link{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 2px}
  input[type=text],input[type=tel],input[type=date],textarea{
    font-family:inherit;font-size:16px;background:var(--card);color:var(--ink);
    border:1px solid var(--line);border-radius:11px;padding:12px 13px;width:100%;
  }
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.75}
  input:focus,textarea:focus{outline:none;border-color:var(--primary)}
  input[type=date]{min-height:47px}
  textarea{resize:vertical;min-height:90px}
  .add-row{display:flex;gap:8px;margin-bottom:14px}
  .add-row input{flex:1;min-width:0}
  .field{margin-bottom:16px}
  .empty-state{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px;line-height:1.6}
  .avatar{
    width:40px;height:40px;border-radius:999px;background:var(--primarysoft);flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:16px;color:var(--primary);
  }
  .avatar.mini{width:24px;height:24px;font-size:11px}
  .status-chip{font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px;white-space:nowrap}
  .chip-neutral{background:var(--chip);color:var(--muted)}
  .chip-primary{background:var(--primarysoft);color:var(--primary)}
  .key-icon{width:13px;height:13px;color:var(--muted);flex:none}

  /* ---------- party card (brand violet, same in both themes) ---------- */
  .party-card{position:relative;overflow:hidden;background:#5A50EC;border-color:#5A50EC;color:#fff}
  .party-card .label{color:#fff;opacity:.72}
  .party-card .title{font-family:var(--display);font-weight:700;font-size:21px;margin:2px 0 3px}
  .party-card .meta{font-size:13px;opacity:.82;margin-bottom:10px}
  .party-card .brand-mark{position:absolute;right:-42px;top:-34px;width:200px;height:200px;
    color:#fff;opacity:.16;pointer-events:none}
  .party-card .brand-mark svg{width:100%;height:100%}
  .btn-white{background:var(--card);color:var(--primary)}
  .btn-live{background:rgba(255,255,255,.16);color:#fff}
  .party-card .sync-status{color:#fff;opacity:.95;font-weight:600;font-size:13px}
  .sync-status.live::before{content:'';display:inline-block;width:8px;height:8px;
    border-radius:999px;background:#3DDC84;margin-right:7px}
  .next-action-text{margin:0 0 12px;font-family:var(--display);font-weight:700;font-size:18px;line-height:1.3}
  .create-dashed{
    width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
    color:var(--muted);font-size:14px;font-weight:600;padding:14px;cursor:pointer;
  }
  /* Compact row inside .card. It comes later in the cascade, so it owns its
     spacing; 2px left the text pressed against the border. */
  .identity-row{display:flex;align-items:center;gap:10px;padding:11px 14px}
  .identity-row .who{flex:1;font-size:14px;color:var(--muted)}
  .identity-row b{color:var(--ink)}

  /* ---------- list ---------- */
  .item-card .item-row{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
  .item-card .name{font-weight:600;font-size:15px;line-height:1.35;padding-top:2px}
  .item-card .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .item-card .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px}
  .item-card .actions .btn,.item-card .actions .quiet-link{min-height:44px}
  .remove-button{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
    width:44px;height:44px;padding:0;line-height:1;opacity:.65;flex:none}
  .bought-card{cursor:pointer;width:100%;text-align:left;color:var(--ink);font-family:inherit}
  .bought-card:active{filter:brightness(.97)}
  .bought-card.read-only{cursor:default}
  .bought-card.read-only:active{filter:none}
  .bought-checkIcon{width:26px;height:26px;border-radius:999px;background:var(--greensoft);
    color:var(--green);display:inline-flex;align-items:center;justify-content:center;
    flex:none;margin-top:1px}
  .bought-checkIcon svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.6;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- group ---------- */
  .person-row{display:flex;width:100%;align-items:center;gap:12px;padding:12px 2px;
    border:0;border-bottom:1px solid var(--line);background:none;color:var(--ink);
    text-align:left;font-family:inherit;cursor:pointer}
  .person-row:last-child{border-bottom:none}
  .person-row .center{flex:1;min-width:0}
  .person-row .name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
  .person-row .secondary-text{display:block;color:var(--muted);font-size:13px;margin-top:1px}
  .person-row .balance{text-align:right;font-variant-numeric:tabular-nums}
  .person-row .balance .amount{font-weight:600;font-size:14.5px}
  .person-row .balance .status{display:block;font-size:11px;color:var(--muted)}
  .inactive-note{display:block;color:var(--muted);font-size:12px;font-weight:600}
  .balance-green{color:var(--green)}
  .balance-coral{color:var(--coral)}
  .balance-neutral{color:var(--muted)}

  /* ---------- accounts ---------- */
  .total-card{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
    padding:18px 16px;text-align:left}
  .total-card .amount{font-family:var(--display);font-weight:800;font-size:28px;letter-spacing:-.5px;
    font-variant-numeric:tabular-nums}
  .total-card .per-head{color:var(--muted);font-size:13px;text-align:right}
  .bizum-row{display:flex;align-items:center;gap:11px}
  .bizum-row.done{opacity:.55}
  .bizum-row .who{flex:1;font-size:14.5px;font-weight:600;min-width:0}
  .bizum-row .who svg{width:14px;height:14px;color:var(--muted);vertical-align:-2px;margin:0 3px}
  .bizum-row .transfer-amount{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .checkIcon{
    width:44px;height:44px;border-radius:999px;border:1.5px solid var(--line);
    background:transparent;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;justify-content:center;color:transparent;
  }
  .checkIcon.on{background:var(--green);border-color:var(--green);color:var(--onprimary)}
  .checkIcon svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round}
  .settled-message{color:var(--green);text-align:center;font-weight:600;font-size:14.5px;padding:18px 10px 6px}
  .footnote{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .my-account-amount{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.5px;
    line-height:1.1;font-variant-numeric:tabular-nums}
  .my-account-breakdown{color:var(--muted);font-size:13px;margin-top:3px}
  .my-account-action{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);
    margin-top:12px;padding-top:11px;font-size:14px}
  .my-account-action .text{flex:1;min-width:0}
  .my-account-action .btn{flex:none}

  /* ---------- actionable home / sharing ---------- */
  .hero-mini{display:flex;align-items:center;gap:8px;padding:14px 2px 12px;color:var(--primary)}
  .hero-mini svg{width:24px;height:24px}
  .hero-mini .wordmark{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.3px;color:var(--ink)}
  .sync-status{color:var(--muted);font-size:12.5px;margin-top:10px}
  .balance-card{display:flex;align-items:center;gap:10px}
  .balance-card .center{flex:1;min-width:0}
  .balance-card .label{margin:0 0 1px}
  .balance-card .amount{font-family:var(--display);font-weight:800;font-size:24px;
    letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1.15}
  .btn-text{background:none;border:none;color:var(--primary);font-weight:600;font-size:14.5px;cursor:pointer;padding:6px 4px}
  .preview{white-space:pre-wrap;overflow-wrap:break-word;background:var(--bg);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;font-size:13px;line-height:1.55;max-height:36dvh;overflow-y:auto}
  .history-line{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .activity-list{display:flex;flex-direction:column;gap:0;margin-top:10px}
  .activity-row{padding:12px 0;border-bottom:1px solid var(--line)}
  .activity-row:last-child{border-bottom:0}
  .activity-title{font-size:14px;line-height:1.35;color:var(--ink)}
  .activity-meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .centered{display:block;margin:10px auto 0;text-align:center}
  .selection-summary{display:flex;align-items:center;gap:10px;padding:11px 0}
  .selection-summary .value{flex:1;font-weight:600}
  .selection-options{border-top:1px solid var(--line);padding-top:10px;margin-bottom:8px}
  .selection-options[hidden]{display:none}
  .quick-picks{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .recent-list{display:grid;gap:8px;margin-top:8px}
  .recent-party{display:flex;width:100%;align-items:center;gap:10px;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink);cursor:pointer}
  .recent-party .recent-copy{flex:1;min-width:0}
  .recent-party .recent-name{font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .recent-party .recent-meta{font-size:12.5px;color:var(--muted);display:block;margin-top:2px}
  .access-note{border:1px solid var(--line);border-radius:11px;padding:11px 12px;
    color:var(--muted);font-size:12.5px;line-height:1.45;margin:12px 0}
  .access-note strong{color:var(--ink)}
  .recovery-card{border-color:var(--coral);background:var(--coralsoft)}
  .recovery-card .title{font-weight:700;margin-bottom:3px}
  .read-only-badge{display:inline-flex;align-items:center;border-radius:999px;
    background:rgba(255,255,255,.18);color:#fff;font-size:11.5px;font-weight:700;
    padding:4px 9px;margin-bottom:7px}

  /* ---------- tab bar ---------- */
  nav#tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar-in{max-width:480px;margin:0 auto;display:flex}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;padding:7px 4px 4px;cursor:pointer;position:relative;
  }
  .tab svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--primary)}
  .tab .badge{
    position:absolute;top:3px;right:calc(50% - 24px);
    background:var(--coral);color:var(--onprimary);font-size:9.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .tab .badge[hidden]{display:none}

  /* ---------- sheet ---------- */
  #overlay{position:fixed;inset:0;background:var(--overlay);z-index:60;opacity:0;
    pointer-events:none;transition:opacity .2s}
  #overlay.open{opacity:1;pointer-events:auto}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:480px;margin:0 auto;transform:translateY(105%);transition:transform .25s;
    max-height:85dvh;overflow-y:auto;pointer-events:none;
  }
  #sheet.open{transform:translateY(0);pointer-events:auto}
  #sheet[hidden]{display:block;visibility:hidden}
  .sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 16px}
  .sheet-close{position:absolute;right:12px;top:10px;width:44px;height:44px;border:0;border-radius:999px;
    background:transparent;color:var(--muted);font-size:22px;cursor:pointer}
  .sheet-title{font-family:var(--display);font-size:20px;font-weight:700;margin:0 0 4px;text-wrap:balance}
  .sheet-sub{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.5}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--card);border-radius:999px;padding:6px 13px 6px 6px;
    font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .pill .avatar{width:24px;height:24px;font-size:11px}
  .pill.on{border-color:var(--green);background:var(--greensoft)}
  .pill.off{opacity:.4}
  .pill.text-only{padding:6px 13px}
  .pill.on.pill-primary{border-color:var(--primary);background:var(--primarysoft)}
  .price-input{display:flex;align-items:center;gap:10px}
  .price-input input{font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
  .price-input .eur{font-size:19px;font-weight:600;color:var(--muted)}
  .sheet-actions{display:flex;gap:10px;margin-top:22px}
  .sheet-actions .btn{flex:1}
  .delete-link{background:none;border:none;color:var(--coral);font-size:13.5px;
    font-weight:600;margin:16px auto 0;display:block;cursor:pointer}
  .menu-option{
    display:block;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:11px;
    font-size:14.5px;font-weight:600;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;
  }

<script>
'use strict';
/* ================= state ================= */
const STORAGE_KEY = 'a-pachas-v2';
const RECENT_PARTIES_KEY = 'a-pachas-recent-v1';
const PREVIOUS_PARTY_KEY = STORAGE_KEY + '-previous';
const DELETED_PARTIES_KEY = 'a-pachas-deleted-v1';
const DEVICE_KEY = 'a-pachas-device-v1';
const THEME_KEY = 'a-pachas-theme';
const SUPPORT_EMAIL = 'alex@alexdepablos.com';
const API = '/api';
const STATE_VERSION = 6;
const LOCAL_RETENTION_MS = 90 * 24 * 3600 * 1000;
const PREVIOUS_RETENTION_MS = 7 * 24 * 3600 * 1000;
const now = () => Date.now();

// Normalize current state loaded from localStorage, AP2 links, or the server.
// IDs are sanitized because they eventually get interpolated into DOM attributes;
// a poisoned state cannot smuggle a weird ID into HTML.
const ID_RE = /^[A-Za-z0-9_-]{1,40}$/;
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
const PARTY_ID_RE = /^[abcdefghjkmnpqrstuvwxyz23456789]{10}$/i;
const WRITE_KEY_RE = /^[abcdefghjkmnpqrstuvwxyz23456789]{14}$/i;
const OWNER_KEY_RE = /^[abcdefghjkmnpqrstuvwxyz23456789]{24}$/i;
function stableEntityId(prefix, text){
  let first = 2166136261, second = 3335557771;
  for(let i=0; i<text.length; i++){
    const code = text.charCodeAt(i);
    first = Math.imul(first ^ code, 16777619);
    second = Math.imul(second ^ code, 2246822519);
  }
  return `${prefix}${(first >>> 0).toString(36)}${(second >>> 0).toString(36)}`;
}
function legacyTransferId(key, value){
  return stableEntityId('tl', `${key}|${value.cents || 0}|${value.at || 0}`);
}
function migrateLegacyTransfers(settled, people){
  if(!settled || typeof settled !== 'object' || Array.isArray(settled)) return [];
  const peopleIds = new Set(people.map(p=>p.id));
  return Object.entries(settled).flatMap(([key,value]) => {
    const [fromId,toId,extra] = key.split('>');
    if(extra !== undefined || !value || !value.done || fromId === toId ||
       !peopleIds.has(fromId) || !peopleIds.has(toId) ||
       !Number.isInteger(value.cents) || value.cents <= 0) return [];
    const at = Number(value.at) || 0;
    return [{id:legacyTransferId(key,value), fromId, toId, cents:value.cents,
      createdAt:at, createdBy:value.by || null, updatedAt:at, updatedBy:null}];
  });
}
function normalizeAudit(value){
  if(!Array.isArray(value)) return [];
  return value.slice(-200).flatMap(event => {
    if(!event || !ID_RE.test(event.id || '') || typeof event.action !== 'string' ||
       !Number.isInteger(event.rev) || typeof event.at !== 'string') return [];
    const changes = Array.isArray(event.changes) ? event.changes.slice(0,12).flatMap(change =>
      change && typeof change.field === 'string'
        ? [{field:change.field, before:change.before ?? null, after:change.after ?? null}] : []) : [];
    return [{id:event.id, action:event.action, rev:event.rev, at:event.at,
      ...(ID_RE.test(event.entityId || '') ? {entityId:event.entityId} : {}),
      ...(ID_RE.test(event.actorId || '') ? {actorId:event.actorId} : {}),
      ...(typeof event.deviceRef === 'string' ? {deviceRef:event.deviceRef.slice(0,16)} : {}),
      ...(typeof event.label === 'string' ? {label:event.label.slice(0,80)} : {}),
      changes}];
  });
}
function migrateState(o){
  if(!o) return o;
  o.v = STATE_VERSION;
  if(!o.party || typeof o.party !== 'object') o.party = {name:'A Pachas', date:null, updatedAt:0};
  if(!o.party.updatedAt) o.party.updatedAt = 0;
  // The date ends up in value="...": it is YYYY-MM-DD or nothing.
  if(o.party.date != null && !DATE_RE.test(o.party.date)) o.party.date = null;
  o.people = (o.people || []).filter(p => p && typeof p.id === 'string' && ID_RE.test(p.id));
  o.people.forEach((p,i) => {
    if(p.admin === undefined) p.admin = i < 2;
    if(p.active === undefined) p.active = true;
    if(!p.updatedAt) p.updatedAt = 0;
  });
  if(o.people.length && !o.people.some(p=>p.active)) o.people[0].active = true;
  if(o.people.length && !o.people.some(p=>p.active && p.admin)) o.people.find(p=>p.active).admin = true;
  o.items = (o.items || []).filter(it => it && typeof it.id === 'string' && ID_RE.test(it.id));
  const activeIds = o.people.filter(p=>p.active).map(p=>p.id);
  const activeIdSet = new Set(activeIds);
  const peopleIds = new Set(o.people.map(p=>p.id));
  o.items.forEach(it => {
    if(!it.updatedAt) it.updatedAt = 0;
    // v5 used null as a dynamic "everyone" split. Freeze the people present
    // during migration so future joins and departures cannot rewrite history.
    if(it.status === 'bought'){
      const validConsumers = Array.isArray(it.consumers)
        ? [...new Set(it.consumers.filter(id=>peopleIds.has(id)))] : [];
      it.consumers = validConsumers.length ? validConsumers : activeIds.slice();
    }
    if(it.status === 'claimed' && !activeIdSet.has(it.claimerId)){
      it.status = 'pending'; delete it.claimerId;
    }
  });
  o.transfers = (Array.isArray(o.transfers) ? o.transfers : [])
    .filter(t => t && typeof t.id === 'string' && ID_RE.test(t.id) &&
      peopleIds.has(t.fromId) && peopleIds.has(t.toId) && t.fromId!==t.toId &&
      Number.isInteger(t.cents) && t.cents>0);
  if(!o.transfers.length && o.settled) o.transfers.push(...migrateLegacyTransfers(o.settled,o.people));
  o.transfers.forEach(t => {
    if(!t.createdAt) t.createdAt = 0;
    if(!t.updatedAt) t.updatedAt = t.createdAt;
  });
  delete o.settled;
  o.tombstones = (o.tombstones || []).filter(l => l && typeof l.id === 'string' && ID_RE.test(l.id));
  o.tombstones.forEach(l => {
    if(!l.at) l.at = 0;
    if(l.seenAt == null) l.seenAt = l.at;
  });
  o.audit = normalizeAudit(o.audit);
  return o;
}

      {id:'i2', name:'Barril de cerveza',      status:'bought', payerId:'p1', priceCents:8450, consumers:['p1','p2','p3','p5']},
      {id:'i3', name:'Hielo (3 bolsas)',       status:'bought', payerId:'p4', priceCents:600,  consumers:['p1','p2','p3','p4','p5']},
      {id:'i4', name:'Cordero',                status:'claimed',  claimerId:'p1'},

}

let S = null;
let openingParty = false;
let deviceId = null;

function currentDeviceId(){
  if(deviceId) return deviceId;
  try {
    const stored = localStorage.getItem(DEVICE_KEY);
    if(stored && /^[A-Za-z0-9_-]{16,64}$/.test(stored)){ deviceId = stored; return deviceId; }
  } catch(e){}
  try {
    const bytes = new Uint8Array(16); crypto.getRandomValues(bytes);
    deviceId = 'd' + [...bytes].map(byte=>byte.toString(16).padStart(2,'0')).join('');
  } catch(e){
    deviceId = 'd' + Array.from({length:4},()=>Math.random().toString(36).slice(2,10)).join('');
  }
  try { localStorage.setItem(DEVICE_KEY,deviceId); } catch(e){}
  return deviceId;
}

function purgeExpiredPreviousParty(){
  try {
    const raw = localStorage.getItem(PREVIOUS_PARTY_KEY);
    if(!raw) return;
    const backup = JSON.parse(raw);
    if(!backup || !Number.isFinite(backup.savedAt) || now()-backup.savedAt>PREVIOUS_RETENTION_MS){
      localStorage.removeItem(PREVIOUS_PARTY_KEY);
    }
  } catch(e){
    try { localStorage.removeItem(PREVIOUS_PARTY_KEY); } catch(ignore){}
  }
}

purgeExpiredPreviousParty();
try {
  S = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if(S && Number.isFinite(S.localSavedAt) && now()-S.localSavedAt>LOCAL_RETENTION_MS){
    localStorage.removeItem(STORAGE_KEY); S = null;
  }
  if(S){
    migrateState(S);
    S.localSavedAt = now();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(S));
  }
  if(S && !['party','list','group','accounts'].includes(S.tab)) S.tab = 'party';
} catch(e){
  S = null;
  try { localStorage.removeItem(STORAGE_KEY); } catch(ignore){}
}

function saveLocal(){
  if(S) S.localSavedAt = now();
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }catch(e){}
  rememberCurrentParty();
}

function loadRecentParties(){
  try {
    const value = JSON.parse(localStorage.getItem(RECENT_PARTIES_KEY));
    if(!Array.isArray(value)) return [];
    const recent = value.flatMap(x => {
      if(!x || !PARTY_ID_RE.test(x.id || '') ||
         !Number.isFinite(x.lastOpenedAt) || now()-x.lastOpenedAt>LOCAL_RETENTION_MS) return [];
      const key = WRITE_KEY_RE.test(x.key || '') ? x.key : null;
      if(!key && x.readOnly !== true) return [];
      return [{id:x.id, key, readOnly:!key,
        ...(OWNER_KEY_RE.test(x.ownerKey || '') ? {ownerKey:x.ownerKey} : {}),
        name:typeof x.name === 'string' ? x.name.slice(0,80) : 'Fiesta',
        date:DATE_RE.test(x.date || '') ? x.date : null,
        lastOpenedAt:x.lastOpenedAt}];
    }).slice(0,5);
    if(recent.length !== value.length) localStorage.setItem(RECENT_PARTIES_KEY,JSON.stringify(recent));
    return recent;
  } catch(e){ return []; }
}
function rememberCurrentParty(){
  if(!S || !S.remote || S.party.demo) return;
  try {
    const stored = loadRecentParties();
    const previous = stored.find(x => x.id === S.remote.id);
    const key = WRITE_KEY_RE.test(S.remote.key || '') ? S.remote.key : (previous && previous.key);
    const ownerKey = OWNER_KEY_RE.test(S.remote.ownerKey || '')
      ? S.remote.ownerKey : (previous && previous.ownerKey);
    const recent = stored.filter(x => x.id !== S.remote.id);
    recent.unshift({id:S.remote.id, key:key || null, readOnly:!key,
      ...(ownerKey ? {ownerKey} : {}), name:S.party.name,
      date:S.party.date || null, lastOpenedAt:now()});
    localStorage.setItem(RECENT_PARTIES_KEY, JSON.stringify(recent.slice(0,5)));
  } catch(e){}
}
function forgetRecentParty(id){
  try {
    const recent = loadRecentParties().filter(party=>party.id!==id);
    localStorage.setItem(RECENT_PARTIES_KEY,JSON.stringify(recent));
  } catch(e){}
}

function loadDeletedParties(){
  try {
    const value = JSON.parse(localStorage.getItem(DELETED_PARTIES_KEY));
    if(!Array.isArray(value)) return [];
    const deleted = value.flatMap(entry => {
      if(!entry || !PARTY_ID_RE.test(entry.id || '') || !WRITE_KEY_RE.test(entry.key || '') ||
         !OWNER_KEY_RE.test(entry.ownerKey || '') || !Number.isFinite(entry.purgeAt) ||
         entry.purgeAt <= now()) return [];
      return [{id:entry.id, key:entry.key, ownerKey:entry.ownerKey,
        name:typeof entry.name === 'string' ? entry.name.slice(0,80) : 'Fiesta borrada',
        purgeAt:entry.purgeAt}];
    }).slice(0,3);
    if(deleted.length !== value.length) localStorage.setItem(DELETED_PARTIES_KEY,JSON.stringify(deleted));
    return deleted;
  } catch(e){ return []; }
}
function rememberDeletedParty(entry){
  try {
    const deleted = loadDeletedParties().filter(item=>item.id!==entry.id);
    deleted.unshift(entry);
    localStorage.setItem(DELETED_PARTIES_KEY,JSON.stringify(deleted.slice(0,3)));
  } catch(e){}
}
function forgetDeletedParty(id){
  try {
    const deleted = loadDeletedParties().filter(entry=>entry.id!==id);
    localStorage.setItem(DELETED_PARTIES_KEY,JSON.stringify(deleted));
  } catch(e){}
}

// When switching parties (open link, create, import, demoState, start another), the
// previous party's sync state is irrelevant to the new one.
function resetSync(){
  clearTimeout(sync.timer);
  sync.uploadedJson = null; sync.uploadAgain = false;
  sync.renderLater = false; sync.lastSeenAt = 0; sync.markOffline = false;
  sync.offlineNotified = false; sync.rejected = false;
}

/* ================= theme ================= */
(function(){
  const t = localStorage.getItem(THEME_KEY);
  if(t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
})();
function currentTheme(){
  return document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

function refreshThemeButton(){

  button.setAttribute('aria-label', dark ? 'Usar modo claro' : 'Usar modo oscuro');
  button.innerHTML = dark
    ? '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
    : '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>';
}
refreshThemeButton();
document.getElementById('themeButton').addEventListener('click', () => {

/* ================= utilities ================= */
const $ = sel => document.querySelector(sel);
const eur = c => (c/100).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
const personById = id => S && S.people.find(p=>p.id===id);
const activePeople = () => S ? S.people.filter(p=>p.active) : [];
const initial = n => n.trim()[0].toUpperCase();
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const consumerIds = it => Array.isArray(it.consumers) ? it.consumers.filter(id=>personById(id)) : [];
const isUnownedItem = it => it && (it.status === 'pending' ||
  (it.status === 'claimed' && (!personById(it.claimerId) || !personById(it.claimerId).active)));
const isAdmin = () => { const p = personById(S && S.me); return !!(p && p.active && p.admin); };
const adminCount = () => activePeople().filter(p=>p.admin).length;
const normalizeName = name => String(name).trim().toLocaleLowerCase('es-ES')
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');
const personByName = name => S && S.people.find(p=>normalizeName(p.name)===normalizeName(name));
// New ID = prefix + timestamp + random component + counter. Randomness is
// required for live parties: two phones creating their first entity in the same
// millisecond would otherwise collide and merge into one.
let uid = 0;
function shortRandom(){
  try {
    const b = new Uint32Array(1);
    crypto.getRandomValues(b);
    return b[0].toString(36);
  } catch(e){ return Math.random().toString(36).slice(2, 9); }
}
const newId = pre => pre + Date.now().toString(36) + shortRandom() + (uid++);

function prettyDate(f){
  if(!f) return null;
  try {
    const d = new Date(f + 'T12:00:00');
    if(isNaN(d)) return null;
    return d.toLocaleDateString('es-ES',{weekday:'long', day:'numeric', month:'long'});
  } catch(e){ return null; }
}

const balanceClass = s => s > 0 ? 'balance-green' : (s < 0 ? 'balance-coral' : 'balance-neutral');

async function withBusyButton(button, pendingText, task){
  if(!button || button.dataset.busy === 'true') return false;
  const previousHtml = button.innerHTML;
  button.dataset.busy = 'true';
  button.disabled = true;
  button.setAttribute('aria-busy','true');
  if(pendingText) button.textContent = pendingText;
  try { return await task(); }
  finally {
    button.dataset.busy = 'false';
    button.disabled = false;
    button.removeAttribute('aria-busy');
    if(button.isConnected && pendingText) button.innerHTML = previousHtml;
  }
}

// Last-edit stamp: cross-phone merging depends on this. It is monotonic against
// the edited entity, so even if this phone's clock moves backwards, a real edit
// always lands above the version and tombstone it overwrites.
function touch(x){ x.updatedAt = Math.max(now(), (x.updatedAt || 0) + 1); x.updatedBy = S.me || null; return x; }

// Protocol delete: remove from the collection and add an informed tombstone
// (`seenAt`), keeping a local tombstone cap because the server rejects runaway
// states.
function tombstoneEntity(collection, entity){
  S[collection] = S[collection].filter(x => x.id !== entity.id);
  S.tombstones.push({id: entity.id, at: now(), seenAt: entity.updatedAt || 0});
  if(S.tombstones.length > 300) S.tombstones = S.tombstones.slice(-300);
}

const itemById = id => S && S.items.find(x => x.id === id);

// Two phones may confirm the same recommendation from the same server revision.
// Give that payment the same ID on both phones so the entity merge keeps one.
// Later expenses or payments change the basis, allowing a genuinely new Bizum
// with the same people and amount to remain a separate transfer.
function transferCompletionId(fromId, toId, cents){
  const itemBasis = S.items.map(item=>`${item.id}:${item.updatedAt || 0}`).sort().join(',');
  const transferBasis = S.transfers.map(transfer=>transfer.id).sort().join(',');
  const tombstoneBasis = S.tombstones.map(tombstone=>tombstone.id).sort().join(',');
  return stableEntityId('t',
    `${fromId}>${toId}|${cents}|${itemBasis}|${transferBasis}|${tombstoneBasis}`);
}

// Abort a sheet action whose premise is no longer true because the party changed
// underneath it: close, repaint the truth, and notify consistently.
function abortSheet(msg){ closeSheet(); render(); toast(msg); }
function requireAdmin(){
  if(isReadOnlyParty()){
    abortSheet('Este enlace es solo para mirar.');
    return false;
  }
  if(isAdmin()) return true;
  abortSheet('La llave ya no es tuya: eso no te toca.');
  return false;
}
function requireActivePerson(){
  if(isReadOnlyParty()){
    toast('Este enlace es solo para mirar.');
    return false;
  }
  const person = personById(S && S.me);
  if(!person){ identitySheet(true); return false; }
  if(!person.active){ toast('Ya no sales en gastos nuevos. La llave puede volverte a meter.'); return false; }
  return true;
}

const personPill = (p, attr, classes) =>

// Parse price into cents using Spanish notation: comma decimals and dot
// thousands ("1.000" is one thousand euros, not one euro).
function parsePriceCents(txt){
  let s = String(txt).trim().replace(/[€\s]/g,'');
  if(!s) return NaN;
  if(s.includes(',')) s = s.replace(/\./g,'').replace(',', '.');
  else if(/^\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g,'');
  if(!/^\d+(\.\d+)?$/.test(s)) return NaN;
  return Math.round(parseFloat(s)*100);
}

function timeAgo(t){
  if(!t) return 'hace nada';
  const s = Math.max(0, Math.round((now() - t) / 1000));
  if(s < 45) return 'hace un momento';
  if(s < 3600) return `hace ${Math.round(s/60)} min`;
  if(s < 86400) return `hace ${Math.round(s/3600)} h`;
  return `hace ${Math.round(s/86400)} día${Math.round(s/86400)===1?'':'s'}`;
}

function timeUntil(t){
  if(!t) return 'dentro de poco';
  const s = Math.max(0, Math.round((t - now()) / 1000));
  if(s < 45) return 'en un momento';
  if(s < 3600) return `dentro de ${Math.round(s/60)} min`;
  if(s < 86400) return `dentro de ${Math.round(s/3600)} h`;
  const days = Math.round(s/86400);
  return `dentro de ${days} día${days===1?'':'s'}`;
}

async function copyToClipboard(txt){

  catch(e){

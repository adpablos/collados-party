# nginx config for the apachas stack: serve public/ and proxy /api/ to the api
# container (server/api.js). Mounted at /etc/nginx/conf.d/default.conf by
# compose.yaml. The API access format intentionally excludes client IPs, URLs,
# query strings, request bodies, user agents, referrers, and party IDs.
log_format apachas_api escape=json
    '{"timestamp":"$time_iso8601","level":"info","event":"nginx_api_request",'
    '"requestId":"$request_id","method":"$request_method","route":"api",'
    '"status":$status,"durationSeconds":$request_time,'
    '"upstreamStatus":"$upstream_status","upstreamSeconds":"$upstream_response_time"}';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    include /etc/nginx/security-headers.conf;

    location /api/ {
        # Docker resolver + variable: nginx re-resolves the api container IP even
        # after recreation. A literal hostname is cached at startup.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8010;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        client_max_body_size 1m;
        proxy_read_timeout 15s;
        # The URL contains the party ID, which grants read access on its own.
        # The custom access log preserves upstream status and latency without
        # logging the request URI. nginx error logs can include the full URI, so
        # they remain disabled for this location.
        access_log /dev/stdout apachas_api;
        error_log /dev/null;
    }

    # The app is one HTML file. Force browser revalidation so nobody stays on a
    # stale cached version that cannot understand new #F: links after deploy.
    # Serve the root here directly, with no internal redirect, so it also gets
    # this header.
    location = / {
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# nginx del stack collados: sirve public/ y pasa /api/ al contenedor api
# (server/api.js). Montado en /etc/nginx/conf.d/default.conf por compose.yaml.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /api/ {
        proxy_pass http://api:8010;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 1m;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

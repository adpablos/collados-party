# nginx config for the apachas stack: serve public/ and proxy /api/ to the api
# container (server/api.js). Mounted at /etc/nginx/conf.d/default.conf by
# compose.yaml.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header X-Frame-Options "DENY" always;

    location /api/ {
        # Docker resolver + variable: nginx re-resolves the api container IP even
        # after recreation. A literal hostname is cached at startup.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8010;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 1m;
        proxy_read_timeout 15s;
        # The URL contains the party ID, which grants read access on its own.
        # Keep it out of both access and error logs; upstream 502/timeouts log
        # the full request line. Use the API logs for debugging; they already
        # redact IDs.
        access_log off;
        error_log /dev/null;
    }

    # The app is one HTML file. Force browser revalidation so nobody stays on a
    # stale cached version that cannot understand new #F: links after deploy.
    # Serve the root here directly, with no internal redirect, so it also gets
    # this header.
    location = / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header X-Frame-Options "DENY" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header X-Frame-Options "DENY" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

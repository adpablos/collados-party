# nginx del stack collados: sirve public/ y pasa /api/ al contenedor api
# (server/api.js). Montado en /etc/nginx/conf.d/default.conf por compose.yaml.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location /api/ {
        # resolver de Docker + variable: nginx re-resuelve la IP del contenedor
        # api aunque se recree (con hostname literal la cachea al arrancar)
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://api:8010;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 1m;
        proxy_read_timeout 15s;
        # la URL lleva el id de la fiesta, que por sí solo da acceso de
        # lectura: fuera del access log
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

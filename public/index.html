/* ================= links ================= */
// Edit links keep the write key in the hash; read-only links carry only the
// unguessable party ID. AP2 full-state links remain local recovery copies.
const EDIT_LINK_RE = /(?:^|[#\s])F:([abcdefghjkmnpqrstuvwxyz23456789]{10}):([abcdefghjkmnpqrstuvwxyz23456789]{14})(?=$|[\s)>,])/i;
const READ_LINK_RE = /(?:^|[#\s])R:([abcdefghjkmnpqrstuvwxyz23456789]{10})(?=$|[\s)>,])/i;

function partyCode(){
  // Whitelist through sharedFrom, which defines shared state. A new local
  // field can never accidentally leak into snapshot links.
  const snapshot = {...sharedFrom(S), me:null, tab:'party'};
  const json = JSON.stringify(snapshot);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return 'AP2:' + b64;
}
function writePartyLink(){
  if(S.remote && WRITE_KEY_RE.test(S.remote.key || '')){
    return location.origin + location.pathname + '#F:' + S.remote.id + ':' + S.remote.key;
  }
  return location.origin + location.pathname + '#' + partyCode();
}
function readOnlyPartyLink(){
  if(S.remote) return location.origin + location.pathname + '#R:' + S.remote.id;
  if(S.localReadOnly) return '';
  return writePartyLink();
}
function decodeSnapshot(text){
  const m = String(text).match(/AP2:([A-Za-z0-9_-]+)/);
  if(!m) return null;
  try {
    let b64 = m[1].replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const obj = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!obj || !obj.people || !obj.items || !obj.party) return null;
    obj.me = null; obj.tab = 'party'; obj.remote = null;
    return migrateState(obj);
  } catch(e){ return null; }
}
// Before replacing the current party with another, leave a localStorage backup.
// Live parties still live on the server anyway.
function backupCurrentParty(){
  if(S && !S.party.demo && (S.items.length || S.people.length > 1)){
    try{ localStorage.setItem(PREVIOUS_PARTY_KEY, JSON.stringify({savedAt:now(),state:S})); }catch(e){}
  }
}
function applyImported(obj){
  backupCurrentParty();
  resetSync();
  S = obj; saveLocal(); render(); identitySheet(true);
}
function importParty(text){
  const edit = String(text).match(EDIT_LINK_RE);
  if(edit){
    closeSheet();
    openLiveLink(edit[1].toLowerCase(), edit[2].toLowerCase());
    return true;
  }
  const read = String(text).match(READ_LINK_RE);
  if(read){
    closeSheet();
    openLiveLink(read[1].toLowerCase(), null);
    return true;
  }
  const obj = decodeSnapshot(text);
  if(!obj) return false;
  // A snapshot link must not silently disconnect a live party.
  if(isRemoteParty()){
    closeSheet();
    confirmSheet('¿Abrir la fiesta del enlace?',
      'Ese enlace lleva una copia congelada. Tu fiesta en vivo se queda a salvo: vuelves a ella con el enlace del grupo.',
      () => applyImported(obj));
    return true;
  }
  applyImported(obj);
  return true;
}

/* ================= live party sync ================= */
const sync = {
  uploadedJson: null,       // JSON of the last shared state confirmed by the server.
  timer: null,
  uploading: false,
  uploadAgain: false,     // A change arrived while an upload was in flight.
  renderLater: false, // New state exists but repaint is deferred.
  lastSeenAt: 0,          // Last successful server contact.
  markOffline: false,
  offlineNotified: false,
  rejected: false,   // Server rejected state (400/413): do not retry blindly.
};

function clientRouteName(method, route){
  if(route === '/parties') return 'parties.create';
  if(route.endsWith('/restore')) return 'parties.restore';
  if(route.startsWith('/parties/')){
    if(method === 'GET') return 'parties.read';
    if(method === 'DELETE') return 'parties.delete';
    return 'parties.update';
  }
  return 'client';
}

const clientEventQueue = [];
let sendingClientEvents = false;

async function flushClientEvents(){
  if(sendingClientEvents || !clientEventQueue.length) return;
  sendingClientEvents = true;
  const batch = clientEventQueue.slice(0,10);
  try {
    const response = await fetch(API + '/events', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({events:batch}), cache:'no-store', keepalive:true,
    });
    if(response.ok) clientEventQueue.splice(0,batch.length);
  } catch(e){}
  finally { sendingClientEvents = false; }
}

function reportClientEvent(code, details){
  details = details || {};
  const event = {
    code,
    route:details.route || 'client',
    deviceId:currentDeviceId(),
    ...(S && S.remote ? {partyId:S.remote.id} : {}),
    ...(Number.isInteger(details.status) ? {status:details.status} : {}),
    ...(details.requestId ? {requestId:details.requestId} : {}),
    ...(details.errorType ? {errorType:String(details.errorType).replace(/[^A-Za-z]/g,'').slice(0,40)} : {}),
  };
  clientEventQueue.push(event);
  if(clientEventQueue.length > 20) clientEventQueue.splice(0,clientEventQueue.length-20);
  flushClientEvents();
}

const reportedUsageEvents = new Set();
function reportUsageEvent(code){
  const partyId = S && S.remote ? S.remote.id : 'local';
  const key = `${code}:${partyId}`;
  if(reportedUsageEvents.has(key)) return;
  reportedUsageEvents.add(key);
  reportClientEvent(code,{route:'client'});
}

async function apiRequest(method, route, body){
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), 8000);
  try {
    const r = await fetch(API + route, {
      method: method,
      headers: body ? {'Content-Type':'application/json'} : undefined,
      body: body ? JSON.stringify(body) : undefined,
      cache: 'no-store',
      signal: ctl.signal,
    });
    let data = null;
    try { data = await r.json(); } catch(e){}
    flushClientEvents();
    return {status: r.status, body: data, requestId:r.headers.get('X-Request-ID')};
  } catch(e){
    reportClientEvent(e && e.name === 'AbortError' ? 'sync.timeout' : 'sync.network_error', {
      route:clientRouteName(method,route), errorType:e && e.name,
    });
    throw e;
  } finally { clearTimeout(t); }
}

// What travels to the server and in links: the party without local fields
// (me, tab, remote). sharedFrom also canonicalizes key order because
// comparisons are JSON-based.
const sharedFrom = o => ({v:STATE_VERSION, party:o.party, people:o.people, items:o.items,
  transfers:o.transfers, tombstones:o.tombstones});
const sharedState = () => sharedFrom(S);
const stateJson = () => JSON.stringify(sharedState());

// A real (non-demo) party with a server-backed remote. Does not imply sync is
// currently succeeding; see isLiveSyncing for that.
function isRemoteParty(){ return !!(S && S.remote && !S.party.demo); }
function canEditParty(){
  return !!S && !S.localReadOnly &&
    (!isRemoteParty() || WRITE_KEY_RE.test(S.remote.key || ''));
}
function isReadOnlyParty(){ return !!S && !canEditParty(); }
// Genuinely live right now: remote, not a demo, and not currently offline or rejected.
function isLiveSyncing(){ return isRemoteParty() && !sync.markOffline && !sync.rejected; }
// Local-only party that could still be switched on.
function canGoLive(){ return !S.remote && !S.party.demo && !isReadOnlyParty(); }

// Entity merge: latest edit wins by `mod`, and the tombstone list prevents
// deleted entities from coming back. A tombstone only buries an entity if it is
// newer than that entity's latest edit; if someone re-saves a purchase after
// someone else deleted it, the real payment survives and the losing tombstone is
// discarded. a is usually server state, b is local state.
function mergeStates(a, b){
  const mod = x => (x && x.updatedAt) || 0;
  const byLowestId = (x,y) => x.id < y.id ? -1 : 1;
  // For two tombstones with the same ID, keep the one that saw the highest
  // version, not the latest wall-clock timestamp. A later blind delete cannot
  // degrade an informed one.
  const strength = l => l.seenAt != null ? l.seenAt : (l.at || 0);
  const tombstoneMap = new Map();
  [...(a.tombstones||[]), ...(b.tombstones||[])].forEach(p => {
    const previous = tombstoneMap.get(p.id);
    if(!previous || strength(p) > strength(previous) ||
       (strength(p) === strength(previous) && (p.at||0) > (previous.at||0))) tombstoneMap.set(p.id, p);
  });
  // The tombstone stores the version seen by the deleter. It can only bury what
  // it knew. A blind delete cannot remove a purchase saved in a revision it
  // never downloaded.
  const isBuried = x => {
    const l = tombstoneMap.get(x.id);
    return !!l && strength(l) >= mod(x);
  };
  const mergeEntities = (la, lb) => {
    const inA = new Map(la.map(x=>[x.id,x]));
    const inB = new Map(lb.map(x=>[x.id,x]));
    const res = [];
    for(const x of lb) if(!inA.has(x.id) && !isBuried(x)) res.push(x);
    for(const x of la){
      const y = inB.get(x.id);
      const winner = y && mod(y) > mod(x) ? y : x;
      if(!isBuried(winner)) res.push(winner);
    }
    return res;
  };
  const people = mergeEntities(a.people, b.people);
  const items = mergeEntities(a.items, b.items);
  const transfers = mergeEntities(a.transfers || [], b.transfers || []);
  // Person-deletion cleanup is derived here, not written at delete time. A
  // rewrite from a stale view would overwrite unseen edits. Anyone referenced by
  // a surviving expense or transfer must remain so history and balances stay true.
  const presentIds = new Set(people.map(p => p.id));
  const candidates = new Map();
  [...(a.people||[]), ...(b.people||[])].forEach(p => {
    const prev = candidates.get(p.id);
    if(!prev || mod(p) > mod(prev)) candidates.set(p.id, p);
  });
  const restoreIds = new Set();
  for(const it of items){
    if(it.payerId && !presentIds.has(it.payerId)) restoreIds.add(it.payerId);
    (it.consumers || []).forEach(id => { if(!presentIds.has(id)) restoreIds.add(id); });
  }
  for(const transfer of transfers){
    if(!presentIds.has(transfer.fromId)) restoreIds.add(transfer.fromId);
    if(!presentIds.has(transfer.toId)) restoreIds.add(transfer.toId);
  }
  for(const id of restoreIds){
    if(!presentIds.has(id) && candidates.has(id)){
      people.push(candidates.get(id));
      presentIds.add(id);
    }
  }
  // The group cannot become empty. Two key holders deleting in parallel can bury
  // everyone while each local guard passes on its own phone. That is never the
  // intent, so restore the lowest ID deterministically.
  if(!people.length && candidates.size){
    const survivor = [...candidates.values()].sort(byLowestId)[0];
    people.push(survivor);
    presentIds.add(survivor.id);
  }
  // Active membership and the admin role cannot disappear through concurrent
  // edits. The lowest ID inherits each role deterministically.
  if(people.length && !people.some(p => p.active)){
    [...people].sort(byLowestId)[0].active = true;
  }
  if(people.length && !people.some(p => p.active && p.admin)){
    [...people].filter(p=>p.active).sort(byLowestId)[0].admin = true;
  }
  const activePersonIds = new Set(people.filter(p=>p.active).map(p=>p.id));
  for(const item of items){
    if(item.status === 'claimed' && !activePersonIds.has(item.claimerId)){
      item.status = 'pending'; delete item.claimerId;
    }
  }
  const liveIds = new Set([...people, ...items, ...transfers].map(x => x.id));
  return {
    v: STATE_VERSION,
    party: mod(b.party) > mod(a.party) ? b.party : a.party,
    people,
    items,
    transfers,
    // Drop tombstones that lost to a newer edit. The cap removes the oldest
    // tombstones, not the most recently arrived ones.
    tombstones: [...tombstoneMap.values()].filter(l => !liveIds.has(l.id))
      .sort((x,y)=>(x.at||0)-(y.at||0)).slice(-300),
  };
}

function adoptSharedState(c){
  S.v = STATE_VERSION; S.party = c.party; S.people = c.people; S.items = c.items;
  S.transfers = c.transfers; S.tombstones = c.tombstones;
  if(S.me && !personById(S.me)) S.me = null;
}

function markOnline(){
  sync.lastSeenAt = now(); sync.markOffline = false; sync.offlineNotified = false;
  refreshSync();
}
function markOffline(){
  sync.markOffline = true;
  if(!sync.offlineNotified && S && S.remote){
    sync.offlineNotified = true;
    toast(isReadOnlyParty()
      ? 'Sin red. Ves la última copia guardada en este móvil.'
      : 'Sin red. Conéctate para cambiar la fiesta.');
  }
  refreshSync();
}
function syncText(){
  if(!S) return '';
  if(S.party.demo) return 'Fiesta de ejemplo · solo en este móvil';
  if(isReadOnlyParty()){
    if(!S.remote || sync.markOffline) return 'Solo lectura · última copia de este móvil';
    if(!sync.lastSeenAt) return 'Solo lectura · abriendo la fiesta…';
    return 'Solo lectura · al día ' + timeAgo(sync.lastSeenAt);
  }
  if(!S.remote) return 'Solo en este móvil';
  if(sync.rejected) return 'En vivo · no se pueden guardar cambios ahora';
  if(sync.markOffline) return 'Sin red · conecta para cambiar la fiesta';
  if(!sync.lastSeenAt) return 'En vivo · poniéndose al día…';
  return 'En vivo con la peña · al día ' + timeAgo(sync.lastSeenAt);
}
function refreshSync(){
  const el = $('#syncStatus');
  if(!el) return;
  el.textContent = syncText();
  el.classList.toggle('live', isLiveSyncing());
}

const isSheetOpen = () => $('#sheet').classList.contains('open');
// Do not repaint under someone's fingers: open sheet or half-written text.
// Inputs from a closed sheet do not count, even though their DOM remains.
function isBusy(){
  const a = document.activeElement;
  if(a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA') &&
     (!$('#sheet').contains(a) || isSheetOpen())) return true;
  return [...document.querySelectorAll('#preview input, #preview textarea')].some(el => el.value);
}
// Repaint immediately if possible; otherwise repaint once the user lets go.
function renderNowOrLater(){
  if(!isSheetOpen() && !isBusy()){ sync.renderLater = false; render(); }
  else sync.renderLater = true;
}

function scheduleUpload(){
  clearTimeout(sync.timer);
  sync.timer = setTimeout(upload, 600);
}

async function upload(){
  if(!S || !S.remote || S.party.demo || isReadOnlyParty() || sync.rejected) return;
  // Without a server baseline and without truly pending changes, a PUT would be
  // blind churn. Let the first poll seed sync.uploadedJson first.
  if(sync.uploadedJson === null && !S.pendingUpload) return;
  if(sync.uploading){ sync.uploadAgain = true; return; }
  sync.uploading = true;
  let requestedPartyId = null;
  try {
    for(let attempt = 0; attempt < 4; attempt++){
      requestedPartyId = S.remote.id;
      const state = sharedState();
      const json = JSON.stringify(state);
      if(json === sync.uploadedJson){
        // Everything is confirmed; clear the persisted pending mark too.
        if(S.pendingUpload){ S.pendingUpload = false; saveLocal(); }
        break;
      }
      const r = await apiRequest('PUT', '/parties/' + requestedPartyId,
        {key: S.remote.key, rev: S.remote.rev, state,
          actorId:S.me || null, deviceId:currentDeviceId()});
      // If the party changed during the request, this response is irrelevant.
      if(!S || !S.remote || S.remote.id !== requestedPartyId) break;
      if(r.status === 200){
        S.remote.rev = r.body.rev; sync.uploadedJson = json;
        S.audit = normalizeAudit(r.body.audit);
        const current = stateJson();
        if(json === current) S.pendingUpload = false;
        saveLocal(); markOnline();
        break;
      } else if(r.status === 409 && r.body && r.body.state){
        // Merge against the CURRENT shared state, not the pre-PUT snapshot. Edits
        // made while the request was in flight must not be lost.
        adoptSharedState(mergeStates(migrateState(r.body.state), sharedState()));
        S.audit = normalizeAudit(r.body.audit);
        S.remote.rev = r.body.rev;
        saveLocal();
        renderNowOrLater();
        // The next loop uploads the merged state.
        if(attempt === 3) reportClientEvent('sync.conflict_exhausted', {
          route:'parties.update', status:409, requestId:r.requestId,
        });
      } else if(r.status === 404){
        reportClientEvent('sync.party_missing', {
          route:'parties.update', status:404, requestId:r.requestId,
        });
        disconnectRemote('Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 403){
        reportClientEvent('sync.access_lost', {
          route:'parties.update', status:403, requestId:r.requestId,
        });
        disconnectRemote('Este enlace ya no puede editar la fiesta. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 429){
        break; // Server throttle; the interval will retry soon.
      } else if(r.status === 400 || r.status === 413){
        // The server rejects this state, likely shape or size. This is not a
        // network issue, and blind retries will not fix it.
        sync.rejected = true;
        reportClientEvent('sync.rejected', {
          route:'parties.update', status:r.status, requestId:r.requestId,
        });
        toast('No se ha podido guardar ese cambio.');
        refreshSync();
        break;
      } else { markOffline(); break; }
    }
  } catch(e){
    // Same stale-rejection guard as download(): don't mark a party the user
    // has since switched away from as offline.
    if(S && S.remote && S.remote.id === requestedPartyId) markOffline();
  }
  sync.uploading = false;
  if(sync.uploadAgain){ sync.uploadAgain = false; scheduleUpload(); }
}

async function download(){
  if(!S || !S.remote || S.party.demo) return;
  const requestedPartyId = S.remote.id;
  try {
    const r = await apiRequest('GET', '/parties/' + requestedPartyId + '?rev=' + S.remote.rev);
    // If the party changed during the request, this response belongs to the old one.
    if(!S || !S.remote || S.remote.id !== requestedPartyId) return;
    if(r.status === 204){
      // The server is at our revision. If no pending local changes exist, local
      // state is the uploaded state; this avoids churn PUTs on reopen.
      if(sync.uploadedJson === null && !S.pendingUpload) sync.uploadedJson = stateJson();
      markOnline(); return;
    }
    if(r.status === 200 && r.body && r.body.state){
      // Stale response: one of our PUTs already advanced the revision. Ignore it
      // to avoid a rev/state bounce and re-upload loop.
      if(!(r.body.rev > S.remote.rev)){ markOnline(); return; }
      const beforeJson = stateJson();
      const remoteState = migrateState(r.body.state);
      const readOnly = isReadOnlyParty();
      adoptSharedState(readOnly ? remoteState : mergeStates(remoteState, sharedState()));
      S.audit = normalizeAudit(r.body.audit);
      S.remote.rev = r.body.rev;
      const afterJson = stateJson();
      if(readOnly || afterJson === JSON.stringify(sharedFrom(remoteState))){
        sync.uploadedJson = afterJson;
        S.pendingUpload = false;
      } else {
        S.pendingUpload = true;
        scheduleUpload(); // The merge has local changes the server has not seen.
      }
      markOnline();
      saveLocal();
      if(afterJson !== beforeJson) renderNowOrLater();
    } else if(r.status === 404 || r.status === 410){
      reportClientEvent('sync.party_missing', {
        route:'parties.read', status:r.status, requestId:r.requestId,
      });
      forgetRecentParty(requestedPartyId);
      disconnectRemote(r.status === 410
        ? 'Esa fiesta está borrada. Quien la creó todavía puede recuperarla.'
        : 'Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
    } else if(r.status === 429 || r.status >= 500){
      markOffline(); // Saturation or outage: same honest treatment as no coverage.
    }
  } catch(e){
    // A stale rejection (the user switched parties before this GET failed) must
    // not mark the newly opened party offline.
    if(S && S.remote && S.remote.id === requestedPartyId) markOffline();
  }
}

let creatingRemote = false; // A double tap must not create two parties.
async function createRemote(){
  if(!S || S.party.demo || S.remote) return !!(S && S.remote); // The demoState never uploads.
  if(creatingRemote) return false;
  creatingRemote = true;
  const localParty = S; // If S changes during the POST, the response is stale.
  const state = sharedState();
  const json = JSON.stringify(state); // Snapshot of what we actually send.
  try {
    const r = await apiRequest('POST', '/parties', {state,
      actorId:S.me || null, deviceId:currentDeviceId()});
    if(S !== localParty) return false;
    if(r.status === 201 && r.body && r.body.id){
      resetSync();
      S.remote = {id:r.body.id, key:r.body.key, ownerKey:r.body.ownerKey, rev:r.body.rev};
      S.audit = normalizeAudit(r.body.audit);
      sync.uploadedJson = json;
      // Upload edits made while the POST was in flight.
      const current = stateJson();
      if(current !== json){ S.pendingUpload = true; scheduleUpload(); }
      else S.pendingUpload = false;
      saveLocal(); markOnline();
      return true;
    }
    if(r.status === 400 || r.status === 413) reportClientEvent('sync.rejected', {
      route:'parties.create', status:r.status, requestId:r.requestId,
    });
  } catch(e){}
  finally { creatingRemote = false; }
  return false;
}

function disconnectRemote(msg){
  const wasReadOnly = isReadOnlyParty();
  S.disconnectedRemoteId = S.remote && S.remote.id;
  S.remote = null;
  if(wasReadOnly) S.localReadOnly = true;
  resetSync();
  saveLocal(); toast(msg);
  renderNowOrLater();
}

function restoreSharedJson(json){
  const restored = migrateState(JSON.parse(json));
  adoptSharedState(restored);
  S.pendingUpload = false;
  sync.rejected = false;
  saveLocal();
}

function internetNeeded(){
  toast('Necesitas internet para cambiar la fiesta. Conéctate y prueba otra vez.');
}

function toastCommitMessage(message){
  if(message) toast(typeof message === 'function' ? message() : message);
}

async function syncBeforeSharedChange(){
  if(!S || !S.remote || isReadOnlyParty()) return false;
  const partyId = S.remote.id;
  clearTimeout(sync.timer);
  await download();
  if(!S || !S.remote || S.remote.id !== partyId) return false;
  if(S.pendingUpload && !sync.rejected && !sync.markOffline){
    await upload();
    while(sync.uploading) await new Promise(res => setTimeout(res, 50));
  }
  return !!(S && S.remote && S.remote.id === partyId &&
    !S.pendingUpload && !sync.markOffline && !sync.rejected);
}

let commitQueue = Promise.resolve();
async function commitSharedChange(mutator, options){
  const queued = commitQueue.catch(() => {}).then(() => commitSharedChangeNow(mutator, options));
  commitQueue = queued.catch(() => {});
  return queued;
}

async function commitSharedChangeNow(mutator, options){
  options = options || {};
  if(isReadOnlyParty()){
    toast('Este enlace es solo para mirar.');
    return false;
  }
  if(S.party.demo){
    mutator();
    saveLocal();
    if(options.close) closeSheet();
    if(options.render !== false) render();
    toastCommitMessage(options.toast);
    return true;
  }

  if(!S.remote && !(await createRemote())){
    internetNeeded();
    return false;
  }
  if(sync.rejected){
    if(sync.uploadedJson) restoreSharedJson(sync.uploadedJson);
    else { sync.rejected = false; S.pendingUpload = false; saveLocal(); refreshSync(); }
  }
  if(!await syncBeforeSharedChange()){
    if(S && S.remote) internetNeeded();
    return false;
  }

  const beforeJson = stateJson();
  const beforeRev = S.remote && S.remote.rev;
  try {
    mutator();
  } catch(e){
    restoreSharedJson(beforeJson);
    throw e;
  }
  S.pendingUpload = true;
  sync.rejected = false;
  clearTimeout(sync.timer);
  await upload();
  const confirmed = !S.pendingUpload && !sync.markOffline && !sync.rejected;
  if(!confirmed){
    const rejected = sync.rejected;
    const stillRemote = !!(S && S.remote);
    if(stillRemote) S.remote.rev = beforeRev;
    if(stillRemote) restoreSharedJson(beforeJson);
    else saveLocal();
    if(options.render !== false) render();
    if(!rejected && stillRemote) internetNeeded();
    return false;
  }

  if(options.close) closeSheet();
  if(options.render !== false) render();
  toastCommitMessage(options.toast);
  return true;
}

async function enableLive(){
  if(isReadOnlyParty()) return toast('Este enlace es solo para mirar.');
  if(S.remote) return shareSheet('invite');
  if(creatingRemote) return; // Already in progress, likely a double tap.
  const btn = $('#enableLiveButton');
  if(btn) btn.disabled = true;
  if(await createRemote()){
    render(); shareSheet('invite');
  } else {
    if(btn) btn.disabled = false;
    internetNeeded();
  }
}

async function openLiveLink(id, key){
  const openParty = S; // If S changes during the GET, the response is stale.
  if(!openParty){ openingParty = true; render(); }
  const r = await apiRequest('GET', '/parties/' + id).catch(() => ({status: 0}));
  if(S !== openParty) return false;
  if(r.status !== 200 || !r.body || !r.body.state){
    openingParty = false;
    if(r.status === 404 || r.status === 410) forgetRecentParty(id);
    toast(r.status === 404 ? 'Ese enlace ya no lleva a ninguna fiesta.'
      : r.status === 410 ? 'Esa fiesta está borrada. Quien la creó todavía puede recuperarla.'
      : 'No se ha podido abrir la fiesta del enlace. ¿Hay red?');
    render();
    return false;
  }
  const remoteState = migrateState(r.body.state);
  const isSameParty = S && S.remote && S.remote.id === id;
  const readOnly = !WRITE_KEY_RE.test(key || '');
  if(!isSameParty || readOnly) backupCurrentParty();
  const me = isSameParty ? S.me : null;
  const recent = loadRecentParties().find(party=>party.id===id);
  const ownerKey = isSameParty && OWNER_KEY_RE.test(S.remote.ownerKey || '')
    ? S.remote.ownerKey : (recent && recent.ownerKey);
  // Explicit read-only links always show the server truth. Edit links may merge
  // pending changes when reopening the same party.
  const base = isSameParty && !readOnly ? mergeStates(remoteState, sharedState()) : remoteState;
  resetSync();
  openingParty = false;
  S = {...base, me, tab:'party', remote:{id, key:readOnly?null:key,
      ...(ownerKey ? {ownerKey} : {}), rev:r.body.rev},
    audit:normalizeAudit(r.body.audit)};
  // The opener may have been removed from the group; do not let them act as a
  // ghost participant.
  if(S.me && !personById(S.me)) S.me = null;
  const json = stateJson();
  if(readOnly || json === JSON.stringify(sharedFrom(remoteState))){
    sync.uploadedJson = json;
    S.pendingUpload = false;
  } else {
    sync.uploadedJson = JSON.stringify(sharedFrom(remoteState));
    S.pendingUpload = true;
    scheduleUpload();
  }
  saveLocal(); markOnline(); render();
  reportUsageEvent(readOnly ? 'usage.party_opened_read' : 'usage.party_opened_write');
  if(!S.me) identitySheet(true);
  return true;
}

/* ================= account calculation ================= */
function accounts(){
  const payerTotals = {}, owes = {};
  S.people.forEach(p => { payerTotals[p.id]=0; owes[p.id]=0; });
  let total = 0;
  for(const it of S.items){
    if(it.status !== 'bought' || !it.priceCents) continue;
    total += it.priceCents;
    if(payerTotals[it.payerId] !== undefined) payerTotals[it.payerId] += it.priceCents;
    const cons = consumerIds(it).filter(id => owes[id] !== undefined);
    if(!cons.length) continue;
    const base = Math.floor(it.priceCents / cons.length);
    let remainder = it.priceCents - base*cons.length;
    for(const id of cons){ owes[id] += base + (remainder-- > 0 ? 1 : 0); }
  }
  const balance = {};
  S.people.forEach(p => balance[p.id] = payerTotals[p.id] - owes[p.id]);

  // Completed Bizums are real money movements. Applying them to the balance
  // keeps future expenses from asking somebody to pay the same debt twice.
  for(const transfer of S.transfers){
    if(balance[transfer.fromId] === undefined || balance[transfer.toId] === undefined) continue;
    balance[transfer.fromId] += transfer.cents;
    balance[transfer.toId] -= transfer.cents;
  }

  const debtors = S.people.filter(p=>balance[p.id]<0).map(p=>({id:p.id, v:-balance[p.id]})).sort((a,b)=>b.v-a.v);
  const creditors = S.people.filter(p=>balance[p.id]>0).map(p=>({id:p.id, v:balance[p.id]})).sort((a,b)=>b.v-a.v);
  const bizums = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const m = Math.min(debtors[i].v, creditors[j].v);
    if(m>0) bizums.push({fromId:debtors[i].id, toId:creditors[j].id, cents:m});
    debtors[i].v -= m; creditors[j].v -= m;
    if(debtors[i].v===0) i++;
    if(creditors[j].v===0) j++;
  }
  return {total, payerTotals, owes, balance, bizums};
}

/* ================= sheet ================= */
let sheetReturnFocus = null;
let sheetHideTimer = null;
function sheetFocusableElements(){
  return [...$('#sheet').querySelectorAll('button:not([disabled]),input:not([disabled]),textarea:not([disabled]),[tabindex="0"]')]
    .filter(el => !el.hidden && el.getClientRects().length);
}
function openSheet(html, locked){
  const sheet = $('#sheet');
  const wasOpen = sheet.classList.contains('open');
  if(!wasOpen) sheetReturnFocus = document.activeElement;
  clearTimeout(sheetHideTimer);
  sheet.hidden = false;
  sheet.dataset.locked = locked ? 'true' : 'false';
  sheet.innerHTML = '<div class="sheet-handle" aria-hidden="true"></div>' +
    (locked ? '' : '<button class="sheet-close" type="button" aria-label="Cerrar">×</button>') + html;
  const title = sheet.querySelector('.sheet-title');
  if(title){ title.id = 'sheetTitle'; sheet.setAttribute('aria-labelledby','sheetTitle'); }
  else sheet.setAttribute('aria-label','Ventana de A Pachas');
  requestAnimationFrame(() => sheet.classList.add('open'));
  $('#overlay').classList.add('open');
  $('#overlay').onclick = locked ? null : closeSheet;
  $('#app').inert = true;
  $('#themeButton').inert = true;
  const close = sheet.querySelector('.sheet-close');
  if(close) close.onclick = closeSheet;
  requestAnimationFrame(() => {
    const focusable = sheetFocusableElements();
    if(focusable.length) focusable[0].focus();
    else {
      sheet.setAttribute('tabindex','-1');
      sheet.focus();
    }
  });
}
function closeSheet(){
  const sheet = $('#sheet');
  if(!sheet.classList.contains('open')) return;
  sheet.classList.remove('open');
  $('#overlay').classList.remove('open');
  $('#app').inert = false;
  $('#themeButton').inert = false;
  // Without this, a sheet input keeps focus and leaves the keyboard open.
  const a = document.activeElement;
  if(a && a.blur && sheet.contains(a)) a.blur();
  if(sheetReturnFocus && sheetReturnFocus.isConnected) sheetReturnFocus.focus();
  sheetReturnFocus = null;
  sheetHideTimer = setTimeout(() => {
    if(sheet.classList.contains('open')) return;
    sheet.hidden = true;
    sheet.innerHTML = '';
    sheet.removeAttribute('aria-labelledby');
    sheet.removeAttribute('aria-label');
    sheet.removeAttribute('tabindex');
  }, 260);
  if(sync.renderLater) renderNowOrLater();
}
document.addEventListener('keydown', e => {
  const sheet = $('#sheet');
  if(!sheet.classList.contains('open')) return;
  if(e.key === 'Escape' && sheet.dataset.locked !== 'true'){
    e.preventDefault(); closeSheet(); return;
  }
  if(e.key !== 'Tab') return;
  const focusable = sheetFocusableElements();
  if(!focusable.length){ e.preventDefault(); sheet.focus(); return; }
  const first = focusable[0], last = focusable[focusable.length-1];
  if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
});

/* --- identity --- */
function duplicateIdentitySheet(existing, typedName){
  openSheet(`
    <h2 class="sheet-title">Ya hay un ${escapeHtml(existing.name)}</h2>
    <p class="sheet-sub">¿Eres tú o sois dos con el mismo nombre?</p>
    <div class="sheet-actions">
      <button class="btn btn-outline" id="differentPersonButton" type="button">Soy otra persona</button>
      <button class="btn btn-primary" id="existingPersonButton" type="button">Sí, soy yo</button>
    </div>
  `);
  $('#existingPersonButton').onclick = () => {
    S.me = existing.id; saveLocal(); closeSheet(); render(); toast('Hola, ' + existing.name);
  };
  $('#differentPersonButton').onclick = () => identitySheet(true, typedName);
}
function identitySheet(forced, suggestedName){
  const readOnly = isReadOnlyParty();
  const people = [...S.people].sort((a,b)=>Number(b.active)-Number(a.active));
  const pills = people.map(p =>
    personPill(p, 'who', 'pill-primary ' + (p.id===S.me?'on':''))).join('');
  openSheet(`
    <h2 class="sheet-title">¿Quién eres?</h2>
    <p class="sheet-sub">Estás en «${escapeHtml(S.party.name)}». ${readOnly
      ? 'Elige tu nombre si quieres ver tu cuenta.' : 'Di quién eres o apúntate.'}</p>
    <div class="access-note"><strong>${readOnly ? 'Has entrado para mirar.' : 'Este enlace permite cambiar la fiesta.'}</strong><br>${readOnly
      ? 'Puedes consultar las cuentas, pero no guardar cambios.'
      : 'Cada móvil elige un nombre y A Pachas no comprueba la identidad. Mándalo solo a la peña.'}</div>
    <div class="pills">${pills}</div>
    ${readOnly ? '' : `<label class="label" for="newNameInput">O apúntate</label>
      <div class="add-row">
        <input type="text" id="newNameInput" placeholder="Tu nombre" maxlength="20" autocomplete="off">
        <button class="btn btn-primary" id="joinButton" type="button">Entrar</button>
      </div>`}
    ${forced && !S.me ? '<button class="quiet-link centered" id="lookOnlyButton" type="button">Solo quiero mirar</button>' : ''}
  `);
  if(suggestedName && $('#newNameInput')){ $('#newNameInput').value = suggestedName; $('#newNameInput').select(); }
  document.querySelectorAll('[data-who]').forEach(b => b.onclick = () => {
    const p = personById(b.dataset.who);
    if(!p) return; // Removed while the sheet was open.
    S.me = p.id; saveLocal(); closeSheet(); render();
    toast('Hola, ' + p.name);
  });
  const lookOnly = $('#lookOnlyButton');
  if(lookOnly) lookOnly.onclick = closeSheet;
  const joinButton = $('#joinButton');
  if(joinButton) joinButton.onclick = async () => {
    const n = $('#newNameInput').value.trim();
    if(!n) return toast('Escribe tu nombre, que la lista no adivina.');
    const existing = personByName(n);
    if(existing) return duplicateIdentitySheet(existing,n);
    if(S.people.length >= 100) return toast('La peña no da pa más (100). Menuda fiesta.');
    await withBusyButton(joinButton,'Entrando…',() => commitSharedChange(() => {
      if(personByName(n)) throw new Error('duplicate_name');
      const p = touch({id:newId('p'), name:n, admin:false, active:true});
      S.people.push(p); S.me = p.id;
    }, {close:true, toast:'Bienvenido, ' + n})).catch(e => {
      if(e.message === 'duplicate_name') duplicateIdentitySheet(personByName(n),n);
      else throw e;
    });
  };
}

/* --- expense: direct, mark bought, or edit in one sheet --- */
function expenseSheet(itemId){
  if(isReadOnlyParty()) return toast('Este enlace es solo para mirar.');
  const it = itemId ? itemById(itemId) : null;
  if(itemId && !it){ render(); return toast('Esa ya no está en la lista.'); }
  const direct = !it;
  const editing = !!(it && it.status === 'bought');
  const currentActivePeople = activePeople();
  const selectedIds = new Set(editing ? consumerIds(it) : currentActivePeople.map(p=>p.id));
  let selectedPayerId = editing ? it.payerId : ((it && it.claimerId) || S.me);
  if(!personById(selectedPayerId)) selectedPayerId = personById(S.me) ? S.me : null;

  const consumerCandidates = S.people.filter(p => p.active || selectedIds.has(p.id));
  const payerCandidates = S.people.filter(p => p.active || p.id === selectedPayerId);
  const consumerPills = consumerCandidates.map(p =>
    personPill(p, 'consumer', selectedIds.has(p.id)?'on':'off')).join('');
  const payerPills = payerCandidates.map(p =>
    personPill(p, 'payer', 'pill-primary ' + (p.id===selectedPayerId?'on':''))).join('');
  const c = accounts();
  const suggestedPayer = [...currentActivePeople].sort((a,b)=>(c.balance[a.id]||0)-(c.balance[b.id]||0))[0];

  let history = '';
  if(editing){
    const creator = it.createdBy && personById(it.createdBy);
    const editor = it.updatedBy && it.updatedBy !== it.createdBy && personById(it.updatedBy);
    const parts = [];
    if(creator) parts.push(`La apuntó ${escapeHtml(creator.name)}${it.createdAt ? ' ' + timeAgo(it.createdAt) : ''}`);
    if(editor) parts.push(`tocada por ${escapeHtml(editor.name)} ${timeAgo(it.updatedAt)}`);
    if(parts.length) history = `<div class="history-line">${parts.join(' · ')}</div>`;
  }

  const title = direct ? 'Apuntar un gasto' : escapeHtml(it.name);
  const sub = direct ? 'Qué fue, cuánto costó y quiénes lo catan.'
    : editing ? 'Corrige lo que haga falta.'
    : 'Apunta lo que ha costado y quién la cata.';
  const initialPrice = editing && it.priceCents ? (it.priceCents/100).toFixed(2).replace('.',',') : '';
  openSheet(`
    <h2 class="sheet-title">${title}</h2>
    <p class="sheet-sub">${sub}</p>
    <label class="label" for="expenseNameInput" style="margin-top:0">Qué</label>
    <input type="text" id="expenseNameInput" placeholder="Hielo, pan, el bar…" maxlength="40"
      autocomplete="off" value="${it ? escapeHtml(it.name) : ''}">
    <label class="label" for="priceInput">Precio</label>
    <div class="price-input">
      <input type="tel" id="priceInput" inputmode="decimal" placeholder="0,00" value="${initialPrice}" autocomplete="off">
      <span class="eur">€</span>
    </div>
    <span class="label">Pagó</span>
    <div class="selection-summary">
      <span class="value" id="payerSummary"></span>
      <button class="btn btn-outline btn-mini" id="togglePayersButton" type="button" aria-expanded="false">Cambiar</button>
    </div>
    <div class="selection-options" id="payerOptions" hidden>
      <div class="pills">${payerPills}</div>
      ${suggestedPayer && suggestedPayer.id !== selectedPayerId && (c.balance[suggestedPayer.id]||0)<0
        ? `<button class="quiet-link" id="suggestedPayerButton" type="button">Pa equilibrar, que pague ${escapeHtml(suggestedPayer.name)}</button>` : ''}
    </div>
    <span class="label">¿Quiénes lo catan?</span>
    <div class="selection-summary">
      <span class="value" id="consumerSummary"></span>
      <button class="btn btn-outline btn-mini" id="toggleConsumersButton" type="button" aria-expanded="false">Cambiar</button>
    </div>
    <div class="selection-options" id="consumerOptions" hidden>
      <div class="quick-picks">
        <button class="btn btn-outline btn-mini" id="allConsumersButton" type="button">Todos</button>
        ${personById(S.me)?.active ? '<button class="btn btn-outline btn-mini" id="onlyMeConsumerButton" type="button">Solo yo</button>' : ''}
      </div>
      <div class="pills">${consumerPills}</div>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-outline" id="cancelButton" type="button">Cancelar</button>
      <button class="btn btn-green" id="saveExpenseButton" type="button">
        ${editing ? 'Guardar' : direct ? 'Apuntar el gasto' : 'Apuntar la compra'}</button>
    </div>
    ${editing ? '<button class="delete-link" id="deleteItemButton" type="button">Borrar esta compra</button>' : ''}
    ${history}
  `);
  const updatePayerSummary = () => {
    const payer = personById(selectedPayerId);
    $('#payerSummary').textContent = payer ? (payer.id === S.me ? 'Pagaste tú' : 'Pagó ' + payer.name) : 'Elige quién pagó';
  };
  const updateConsumerSummary = () => {
    const activeIds = new Set(activePeople().map(p=>p.id));
    const selectedActiveCount = [...selectedIds].filter(id=>activeIds.has(id)).length;
    const includesOnlyActive = [...selectedIds].every(id=>activeIds.has(id));
    $('#consumerSummary').textContent = includesOnlyActive && selectedActiveCount === activeIds.size
      ? `Entre todos (${selectedIds.size})` : `Entre ${selectedIds.size}`;
  };
  const updateConsumerPills = () => {
    document.querySelectorAll('[data-consumer]').forEach(b => {
      b.classList.toggle('on',selectedIds.has(b.dataset.consumer));
      b.classList.toggle('off',!selectedIds.has(b.dataset.consumer));
    });
    updateConsumerSummary();
  };
  const toggleOptions = (button, options) => {
    const expanded = button.getAttribute('aria-expanded') === 'true';
    button.setAttribute('aria-expanded',String(!expanded));
    options.hidden = expanded;
  };
  $('#togglePayersButton').onclick = () => toggleOptions($('#togglePayersButton'),$('#payerOptions'));
  $('#toggleConsumersButton').onclick = () => toggleOptions($('#toggleConsumersButton'),$('#consumerOptions'));
  document.querySelectorAll('[data-consumer]').forEach(b => b.onclick = () => {
    const id = b.dataset.consumer;
    if(selectedIds.has(id)){
      if(selectedIds.size === 1) return toast('Alguien lo catará, digo yo.');
      selectedIds.delete(id);
    } else selectedIds.add(id);
    updateConsumerPills();
  });
  document.querySelectorAll('[data-payer]').forEach(b => b.onclick = () => {
    selectedPayerId = b.dataset.payer;
    document.querySelectorAll('[data-payer]').forEach(x =>
      x.classList.toggle('on', x.dataset.payer === selectedPayerId));
    updatePayerSummary();
  });
  $('#allConsumersButton').onclick = () => {
    selectedIds.clear(); activePeople().forEach(p=>selectedIds.add(p.id)); updateConsumerPills();
  };
  const onlyMe = $('#onlyMeConsumerButton');
  if(onlyMe) onlyMe.onclick = () => { selectedIds.clear(); selectedIds.add(S.me); updateConsumerPills(); };
  const suggested = $('#suggestedPayerButton');
  if(suggested) suggested.onclick = () => {
    selectedPayerId = suggestedPayer.id;
    document.querySelectorAll('[data-payer]').forEach(x =>
      x.classList.toggle('on',x.dataset.payer===selectedPayerId));
    updatePayerSummary();
  };
  updatePayerSummary();
  updateConsumerSummary();
  $('#cancelButton').onclick = closeSheet;
  $('#saveExpenseButton').onclick = async () => {
    const name = $('#expenseNameInput').value.trim();
    if(!name) return toast('Pon qué fue.');
    const priceCents = parsePriceCents($('#priceInput').value);
    if(isNaN(priceCents) || priceCents<=0) return toast('Ponle precio, que gratis no fue.');
    if(priceCents > 100000000) return toast('¿' + eur(priceCents) + '? Repasa ese precio, anda.');
    if(!personById(selectedPayerId)) return toast('¿Quién lo pagó?');
    const consumers = [...selectedIds].filter(id => personById(id));
    if(!consumers.length){
      return abortSheet('La peña ha cambiado por debajo: revisa quiénes lo catan.');
    }
    let successMessage = '';
    const button = $('#saveExpenseButton');
    await withBusyButton(button,'Guardando…',() => commitSharedChange(() => {
      const livePayer = personById(selectedPayerId);
      const liveConsumers = consumers.map(id=>personById(id));
      if(!livePayer || liveConsumers.some(person=>!person) ||
         (!editing && (!livePayer.active || liveConsumers.some(person=>!person.active)))){
        throw new Error('group_changed');
      }
      if(direct){
        if(S.items.length >= 500) throw new Error('too_many_items');
        S.items.unshift(touch({id:newId('i'), name, status:'bought', priceCents:priceCents,
          payerId:selectedPayerId, consumers,
          createdAt:now(), createdBy:S.me || null}));
        successMessage = 'Apuntado. Las cuentas ya lo saben.';
      } else {
        // Find by ID again: the party may have refreshed while the sheet was
        // open. Permission is revalidated before anything else, including the
        // resurrection path, so someone who lost admin cannot revive another
        // person's purchase.
        let live = S.items.find(x=>x.id===itemId);
        const target = live || it;
        if(editing && !isAdmin() && target.payerId !== S.me){
          throw new Error('payer_changed');
        }
        if(live && !editing && live.status === 'bought'){
          // Someone else bought it while the sheet was open; do not overwrite
          // their payment with this form.
          throw new Error('already_bought');
        }
        if(!live){
          // If someone else deleted it, add it again: the payment was real.
          live = it;
          S.items.unshift(live);
          S.tombstones = S.tombstones.filter(t=>t.id!==itemId);
        }
        live.name = name;
        live.priceCents = priceCents;
        live.consumers = consumers;
        live.payerId = selectedPayerId;
        touch(live);
        if(!editing){
          live.status = 'bought';
          delete live.claimerId;
          successMessage = 'Apuntada. Las cuentas ya lo saben.';
        } else {
          successMessage = 'Guardado';
        }
      }
    }, {close:true, toast:() => successMessage})).catch(e => {
      if(e.message === 'too_many_items') toast('La lista no da pa más (500 cosas). Quita algo primero.');
      else if(e.message === 'payer_changed') abortSheet('Esa compra acaba de cambiar de manos: solo quien la pagó o la llave pueden tocarla.');
      else if(e.message === 'already_bought') abortSheet('Alguien la ha apuntado ya como comprada: revísala antes de corregirla.');
      else if(e.message === 'group_changed') abortSheet('La peña ha cambiado: revisa quién pagó y quiénes lo catan.');
      else throw e;
    });
  };
  const del = $('#deleteItemButton');
  if(del) del.onclick = () => {
    confirmSheet('¿Borrar esta compra?',
      `«${it.name}» (${eur(it.priceCents||0)}) se quita de la lista y de las cuentas.`, async () => {
        // Revalidate against live state; the party may have changed underneath.
        const live = itemById(itemId);
        if(!live){ render(); return toast('Ya no está: alguien la ha quitado antes.'); }
        if(!isAdmin() && live.payerId !== S.me){
          render(); return toast('Esa compra ha cambiado de manos: solo quien la pagó o la llave pueden borrarla.');
        }
        await commitSharedChange(() => {
          const latest = itemById(itemId);
          if(!latest) throw new Error('missing_item');
          tombstoneEntity('items', latest);
        }, {toast:'Fuera de la lista'}).catch(e => {
          if(e.message === 'missing_item') abortSheet('Esa compra ya no está en la lista.');
          else throw e;
        });
      });
  };
  setTimeout(()=>$(direct ? '#expenseNameInput' : '#priceInput').focus(), 250);
}

/* --- assign, admins only --- */
function assignSheet(itemId){
  if(!requireAdmin()) return;
  const it = S.items.find(x=>x.id===itemId); if(!it) return;
  const pills = activePeople().map(p =>
    personPill(p, 'assign-person', 'pill-primary ' + (it.claimerId===p.id?'on':''))).join('');
  openSheet(`
    <h2 class="sheet-title">¿Quién trae «${escapeHtml(it.name)}»?</h2>
    <p class="sheet-sub">Le saldrá como suya en la lista.</p>
    <div class="pills">
      ${pills}
      <button class="pill text-only ${!it.claimerId?'on':''}" type="button" data-assign-person="">Sin dueño</button>
    </div>
  `);
  document.querySelectorAll('[data-assign-person]').forEach(b => b.onclick = async () => {
    if(!requireAdmin()) return;
    const who = personById(b.dataset.assignPerson);
    // data-assign-person="" intentionally means "unowned". A person removed underneath
    // must not be confused with that, because it would release the item.
    if(b.dataset.assignPerson && (!who || !who.active)) return abortSheet('Esa persona ya no está en la peña.');
    let live = itemById(itemId);
    if(!live) return abortSheet('Esa cosa ya no está en la lista.');
    if(live.status === 'bought') return abortSheet('Esa ya está comprada: no hay nada que asignar.');
    await withBusyButton(b,'Guardando…',() => commitSharedChange(() => {
      if(!isAdmin()) throw new Error('not_admin');
      live = itemById(itemId);
      if(!live) throw new Error('missing_item');
      if(live.status === 'bought') throw new Error('already_bought');
      if(who){ live.status='claimed'; live.claimerId=who.id; }
      else { live.status='pending'; delete live.claimerId; }
      touch(live);
    }, {close:true, toast: who ? 'Se la lleva ' + who.name : 'Suelta. A ver quién se la pide ahora.'})).catch(e => {
      if(e.message === 'missing_item') abortSheet('Esa cosa ya no está en la lista.');
      else if(e.message === 'already_bought') abortSheet('Esa ya está comprada: no hay nada que asignar.');
      else if(e.message === 'not_admin') abortSheet('La llave ya no es tuya: eso no te toca.');
      else throw e;
    });
  });
}

/* --- person detail --- */
function renamePersonSheet(pid){
  if(isReadOnlyParty()) return toast('Este enlace es solo para mirar.');
  const p = personById(pid); if(!p) return abortSheet('Esa persona ya no está en la peña.');
  if(pid !== S.me && !requireAdmin()) return;
  openSheet(`
    <h2 class="sheet-title">Cambiar nombre</h2>
    <div class="field" style="margin-top:14px">
      <label class="label" for="personNameEditInput">Nombre en la peña</label>
      <input type="text" id="personNameEditInput" maxlength="20" value="${escapeHtml(p.name)}" autocomplete="off">
    </div>
    <div class="sheet-actions">
      <button class="btn btn-outline" id="cancelPersonRenameButton" type="button">Cancelar</button>
      <button class="btn btn-primary" id="savePersonRenameButton" type="button">Guardar</button>
    </div>
  `);
  $('#cancelPersonRenameButton').onclick = closeSheet;
  $('#savePersonRenameButton').onclick = async () => {
    const q = personById(pid);
    if(!q) return abortSheet('Esa persona ya no está en la peña.');
    if(pid !== S.me && !requireAdmin()) return;
    const n = $('#personNameEditInput').value.trim();
    if(!n) return toast('Ponle nombre, que alguien será.');
    const duplicate = personByName(n);
    if(duplicate && duplicate.id !== pid) return toast('Ya hay alguien con ese nombre. Ponle un mote distinto.');
    const button = $('#savePersonRenameButton');
    await withBusyButton(button,'Guardando…',() => commitSharedChange(() => {
      const live = personById(pid);
      if(!live) throw new Error('missing_person');
      if(pid !== S.me && !isAdmin()) throw new Error('not_admin');
      const duplicate = personByName(n);
      if(duplicate && duplicate.id !== pid) throw new Error('duplicate_name');
      live.name = n;
      touch(live);
    }, {close:true, toast:'Nombre cambiado'})).catch(e => {
      if(e.message === 'missing_person') abortSheet('Esa persona ya no está en la peña.');
      else if(e.message === 'not_admin') abortSheet('La llave ya no es tuya: eso no te toca.');
      else if(e.message === 'duplicate_name') toast('Ya hay alguien con ese nombre. Ponle un mote distinto.');
      else throw e;
    });
  };
}

function personHasHistory(pid){
  return S.items.some(item => item.payerId===pid || item.claimerId===pid ||
      item.createdBy===pid || item.updatedBy===pid || consumerIds(item).includes(pid)) ||
    S.transfers.some(transfer => transfer.fromId===pid || transfer.toId===pid ||
      transfer.createdBy===pid || transfer.updatedBy===pid);
}

function personSheet(pid){
  const p = personById(pid); if(!p) return;
  const c = accounts();
  const assignedItems = S.items.filter(i=>i.status==='claimed' && i.claimerId===pid);
  const purchases = S.items.filter(i=>i.status==='bought' && i.payerId===pid);
  const isMe = pid === S.me;
  const canManage = !isReadOnlyParty() && isAdmin() && !isMe;
  const canRename = !isReadOnlyParty() && (isMe || isAdmin());

  const assignedList = assignedItems.length
    ? assignedItems.map(i=>`<li>${escapeHtml(i.name)}</li>`).join('')
    : '<li style="color:var(--muted)">Nada pendiente</li>';

  const s = c.balance[pid] || 0;
  const balanceText = s === 0 ? 'está en paz' : s > 0 ? `le deben ${eur(s)}` : `debe ${eur(-s)}`;

  openSheet(`
    <h2 class="sheet-title">${escapeHtml(p.name)}${p.admin?' '+KEY_ICON:''}${isMe?' <span class="status-chip chip-primary">tú</span>':''}${p.active?'':' <span class="status-chip chip-neutral">ya no participa</span>'}</h2>
    <p class="sheet-sub">Ha pagado <strong>${eur(c.payerTotals[pid]||0)}</strong> en ${purchases.length} compra${purchases.length===1?'':'s'} ·
      le tocaba ${eur(c.owes[pid]||0)} · ${balanceText}.</p>
    <span class="label">Le toca traer</span>
    <ul style="margin:0 0 6px;padding-left:20px;font-size:14px;line-height:1.7">${assignedList}</ul>
    ${!S.localReadOnly && !isMe ? `<button class="btn btn-outline btn-mini" id="remindButton" type="button" style="margin-top:6px">Mandarle un recordatorio</button>` : ''}
    ${canRename ? `
      <span class="label">Nombre</span>
      <button class="menu-option" id="renamePersonButton" type="button">
        Cambiar nombre
        <small>Pa corregir un mote torcido antes de que se quede pa siempre.</small>
      </button>` : ''}
    ${canManage ? `
      <span class="label">Gestión</span>
      ${p.active ? `<button class="menu-option" id="toggleAdminButton" type="button">
        ${p.admin ? 'Quitarle la llave' : 'Darle la llave'}
        <small>Los de la llave asignan cosas, corrigen precios y gestionan la peña.</small>
      </button>` : ''}
      <button class="menu-option" id="removePersonButton" type="button">
        ${p.active ? 'Sacar de futuros gastos' : 'Volver a meter en la peña'}
        <small>${p.active
          ? 'Conserva sus compras, su saldo y sus Bizums. Solo deja de salir en gastos nuevos.'
          : 'Volverá a salir en la lista y en los gastos nuevos.'}</small>
      </button>
      ${!p.active && !personHasHistory(pid) ? `<button class="delete-link" id="deletePersonButton" type="button">Borrar del todo</button>` : ''}` : ''}
  `);
  const rec = $('#remindButton');
  if(rec) rec.onclick = () => {
    if(!personById(pid)) return abortSheet('Esa persona ya no está en la peña.');
    shareSheet('person', pid);
  };
  const ren = $('#renamePersonButton');
  if(ren) ren.onclick = () => renamePersonSheet(pid);
  // Handlers re-find by ID and reconfirm admin status; the party may have
  // merged underneath while the sheet was open.
  const tog = $('#toggleAdminButton');
  if(tog) tog.onclick = async () => {
    if(!requireAdmin()) return;
    const q = personById(pid);
    if(!q) return abortSheet('Esa persona ya no está en la peña.');
    if(q.admin && adminCount() === 1) return toast('Alguien tiene que quedarse con la llave');
    const nextAdmin = !q.admin;
    await withBusyButton(tog,'Guardando…',() => commitSharedChange(() => {
      const live = personById(pid);
      if(!live) throw new Error('missing_person');
      if(!isAdmin()) throw new Error('not_admin');
      if(live.admin && adminCount() === 1) throw new Error('last_admin');
      live.admin = nextAdmin;
      touch(live);
    }, {close:true, toast:() => {
      const live = personById(pid);
      return nextAdmin ? (live ? live.name : q.name) + ' tiene la llave' : (live ? live.name : q.name) + ' ya no tiene la llave';
    }})).catch(e => {
      if(e.message === 'missing_person') abortSheet('Esa persona ya no está en la peña.');
      else if(e.message === 'not_admin') abortSheet('La llave ya no es tuya: eso no te toca.');
      else if(e.message === 'last_admin') toast('Alguien tiene que quedarse con la llave');
      else throw e;
    });
  };
  const eli = $('#removePersonButton');
  if(eli) eli.onclick = async () => {
    if(!requireAdmin()) return;
    const q = personById(pid);
    if(!q) return abortSheet('Esa persona ya no está en la peña.');
    if(q.active && activePeople().length === 1) return toast('Alguien tiene que quedarse en la peña');
    if(q.active && q.admin && adminCount() === 1) return toast('Alguien tiene que quedarse con la llave');
    if(!q.active){
      await withBusyButton(eli,'Guardando…',() => commitSharedChange(() => {
        const live = personById(pid);
        if(!live) throw new Error('missing_person');
        if(!isAdmin()) throw new Error('not_admin');
        live.active = true;
        touch(live);
      }, {close:true, toast:q.name + ' vuelve a la peña'})).catch(e => {
        if(e.message === 'missing_person') abortSheet('Esa persona ya no está en la peña.');
        else if(e.message === 'not_admin') abortSheet('La llave ya no es tuya: eso no te toca.');
        else throw e;
      });
      return;
    }
    confirmSheet('¿Sacar a ' + q.name + '?',
      'Dejará de salir en gastos nuevos, pero sus compras, su saldo y sus Bizums se quedan tal cual.', async () => {
        await commitSharedChange(() => {
          const live = personById(pid);
          if(!live) throw new Error('missing_person');
          if(!isAdmin()) throw new Error('not_admin');
          if(!live.active) throw new Error('person_changed');
          if(activePeople().length === 1) throw new Error('last_active');
          if(live.admin && adminCount() === 1) throw new Error('last_admin');
          live.active = false;
          live.admin = false;
          touch(live);
          S.items.filter(item=>item.status==='claimed' && item.claimerId===pid).forEach(item => {
            item.status = 'pending'; delete item.claimerId; touch(item);
          });
        }, {toast:q.name + ' ya no sale en gastos nuevos'}).catch(e => {
          if(e.message === 'missing_person' || e.message === 'person_changed') abortSheet('La peña ha cambiado: abre de nuevo a esa persona.');
          else if(e.message === 'not_admin') abortSheet('La llave ya no es tuya: eso no te toca.');
          else if(e.message === 'last_active') toast('Alguien tiene que quedarse en la peña');
          else if(e.message === 'last_admin') toast('Alguien tiene que quedarse con la llave');
          else throw e;
        });
      });
  };
  const deletePerson = $('#deletePersonButton');
  if(deletePerson) deletePerson.onclick = () => confirmSheet('¿Borrar a ' + p.name + '?',
    'No aparece en ningún gasto ni Bizum. Esta acción no se puede deshacer.', async () => {
      await commitSharedChange(() => {
        const live = personById(pid);
        if(!isAdmin()) throw new Error('not_admin');
        if(!live || live.active || personHasHistory(pid)) throw new Error('person_changed');
        tombstoneEntity('people',live);
      }, {toast:p.name + ' ya no está en la peña'}).catch(e => {
        if(e.message === 'person_changed') toast('Ya no se puede borrar: la peña ha cambiado.');
        else if(e.message === 'not_admin') toast('La llave ya no es tuya: eso no te toca.');
        else throw e;
      });
    });
}

/* --- share with the group: moment-specific messages --- */
function shareUsesReadOnlyLink(shareType){
  return shareType === 'accounts' || isReadOnlyParty();
}

function shareMessage(shareType, pid){
  const link = shareUsesReadOnlyLink(shareType) ? readOnlyPartyLink() : writePartyLink();
  const n = S.party.name;
  if(shareType === 'invite'){
    return `A pachas con los gastos de «${n}».\n` +
      `Entra, di quién eres y apunta lo que pilles:\n${link}\n\n` +
      'Quien tenga este enlace puede ver y cambiar la fiesta. Mándalo solo a la peña.';
  }
  if(shareType === 'list'){
    const pendingItems = S.items.filter(isUnownedItem);
    return `Faltan cosas pa «${n}»:\n` +
      pendingItems.map(i=>'· ' + i.name).join('\n') +
      `\n\nQuien pueda, que se lo pida aquí:\n${link}`;
  }
  if(shareType === 'accounts'){
    const c = accounts();
    const lines = [`Cuentas de «${n}» — A Pachas`,
      `Total de gastos: ${eur(c.total)}`, ''];
    if(S.transfers.length){
      lines.push('Bizums hechos:');
      S.transfers.forEach(transfer => lines.push(
        `✓ ${personById(transfer.fromId).name} → ${personById(transfer.toId).name}: ${eur(transfer.cents)}`));
      lines.push('');
    }
    if(!c.bizums.length){
      lines.push('Cuentas en paz. Ni pa ti ni pa mí.');
    } else {
      c.bizums.forEach(b => lines.push(
        '· ' + personById(b.fromId).name + ' → ' + personById(b.toId).name + ': ' + eur(b.cents)));
      lines.push('');
      lines.push('Consulta aquí cómo van las cuentas:');
    }
    lines.push(link);
    return lines.join('\n');
  }
  if(shareType === 'person'){
    const p = personById(pid);
    if(!p) return link; // Removed while the sheet was open.
    const c = accounts();
    const assignedItems = S.items.filter(i=>i.status==='claimed' && i.claimerId===pid);
    const lines = [`${p.name}, pa «${n}»:`];
    if(assignedItems.length){
      lines.push('');
      lines.push('Te toca traer:');
      assignedItems.forEach(i => lines.push('· ' + i.name));
    }
    const outgoingBizums = c.bizums.filter(b => b.fromId === pid);
    const incomingBizums = c.bizums.filter(b => b.toId === pid);
    if(outgoingBizums.length || incomingBizums.length){
      lines.push('');
      lines.push('De cuentas te sale:');
      outgoingBizums.forEach(b => lines.push(`· Bizum de ${eur(b.cents)} a ${personById(b.toId).name}`));
      incomingBizums.forEach(b => lines.push(`· ${personById(b.fromId).name} te debe ${eur(b.cents)}`));
    }
    if(!assignedItems.length && !outgoingBizums.length && !incomingBizums.length){
      lines.push('nada pendiente. Estás al día, máquina.');
    }
    lines.push('');
    lines.push('Lo tienes aquí:');
    lines.push(link);
    return lines.join('\n');
  }
  return link;
}

async function shareSheet(shareType, pid){
  if(isReadOnlyParty() && !['accounts','person'].includes(shareType)) shareType = 'accounts';
  if(S.localReadOnly && !S.remote){
    return toast('Esta es una copia guardada para mirar. Ya no se puede compartir en vivo.');
  }
  const readOnlyShare = shareUsesReadOnlyLink(shareType);
  const reportShareIntent = () => reportUsageEvent(readOnlyShare
    ? 'usage.accounts_share_intent' : 'usage.invite_share_intent');
  // The demoState is not shareable: its demoState flag would leave the receiver with a
  // party that can never go live.
  if(S.party.demo) return toast('La fiesta de ejemplo no se comparte: monta la tuya, que es un momento.');
  if(canGoLive()){
    openSheet(`
      <h2 class="sheet-title">Poniendo la fiesta en vivo</h2>
      <p class="sheet-sub">Un momento: así todos entran al mismo sitio y lo que apunte la peña lo ves tú también.</p>
      <div class="note">Si no hay red, paramos aquí: la fiesta compartida necesita internet para no partirse en copias.</div>
    `, true);
    if(await createRemote()){
      render();
      return shareSheet(shareType, pid);
    }
    openSheet(`
      <h2 class="sheet-title">Ahora mismo no hay manera</h2>
      <p class="sheet-sub">Necesitas internet para poner la fiesta en vivo y mandarla al grupo.</p>
      <div class="note">Así evitamos el lío de tener una fiesta distinta en cada teléfono. Con red, lo intentamos otra vez y arreando.</div>
      <div class="sheet-actions">
        <button class="btn btn-outline" id="closeShareBlockButton" type="button">Seguir aquí</button>
        <button class="btn btn-primary" id="retryLiveShareButton" type="button">Reintentar</button>
      </div>
    `);
    $('#closeShareBlockButton').onclick = closeSheet;
    $('#retryLiveShareButton').onclick = () => shareSheet(shareType, pid);
    return;
  }
  // If there are unsent changes, make one last push before composing the
  // message. Cap it so offline sharing does not hang for the full timeout.
  if(S.remote && S.pendingUpload && !S.party.demo){
    clearTimeout(sync.timer);
    if(sync.rejected && sync.uploadedJson){
      restoreSharedJson(sync.uploadedJson);
      render();
    } else {
      await Promise.race([upload(), new Promise(res => setTimeout(res, 1500))]);
    }
    if(S.pendingUpload){
      openSheet(`
        <h2 class="sheet-title">Poniendo todo al día</h2>
        <p class="sheet-sub">La fiesta está en vivo, pero la app está terminando de cuadrar el estado con el grupo.</p>
        <div class="note">No mandamos el enlace hasta que lo que ves aquí y lo que verá la peña sea lo mismo.</div>
        <div class="sheet-actions">
          <button class="btn btn-outline" id="closePendingShareButton" type="button">Seguir aquí</button>
          <button class="btn btn-primary" id="retryPendingShareButton" type="button">Reintentar</button>
        </div>
      `);
      $('#closePendingShareButton').onclick = closeSheet;
      $('#retryPendingShareButton').onclick = () => shareSheet(shareType, pid);
      return;
    }
  }
  const txt = shareMessage(shareType, pid);
  openSheet(`
    <h2 class="sheet-title">Mandar al grupo</h2>
    <p class="sheet-sub">Así queda el mensaje:</p>
    <div class="preview">${escapeHtml(txt)}</div>
    ${readOnlyShare
      ? '<div class="access-note"><strong>Enlace solo para mirar.</strong><br>Sirve para consultar estas cuentas sin cambiar la fiesta.</div>'
      : '<div class="access-note"><strong>Enlace para editar.</strong><br>Quien lo tenga puede elegir cualquier nombre y cambiar la fiesta.</div>'}
    <div class="sheet-actions">
      <button class="btn btn-outline" id="copyMessageButton" type="button">Copiar</button>
      <button class="btn btn-green" id="whatsappMessageButton" type="button">WhatsApp</button>
    </div>
    ${navigator.share ? '<button class="quiet-link centered" id="alternateAppButton" type="button">Mandar con otra app</button>' : ''}
  `);
  $('#copyMessageButton').onclick = async () => {
    const ok = await copyToClipboard(txt);
    toast(ok ? 'Copiado. Pégalo en el grupo.' : 'No se ha podido copiar');
    if(ok){
      reportShareIntent();
      closeSheet();
    }
  };
  $('#whatsappMessageButton').onclick = () => {
    reportShareIntent();
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank', 'noopener');
    closeSheet();
  };
  const alternateApp = $('#alternateAppButton');
  if(alternateApp) alternateApp.onclick = async () => {
    try {
      await navigator.share({text: txt});
      reportShareIntent();
      closeSheet();
    } catch(e){}
  };
}

      v:STATE_VERSION,
      party:{name, date: newDate || null, updatedAt:createdAt},
      me: pid, tab:'party', remote: null,
      people:[{id:pid, name:participantName, admin:true, active:true, updatedAt:createdAt}],
      items:templateNames.map(itemName => ({id:newId('i'), name:itemName, status:'pending',
        createdAt, createdBy:pid, updatedAt:createdAt, updatedBy:pid})),
      transfers:[], tombstones:[],
    };
    if(previousParty){
      S = previousParty;
      backupCurrentParty();
    }
    S = draftParty;
    const liveEnabled = await createRemote();
    if(liveEnabled){
      saveLocal(); closeSheet(); render();
      shareSheet('invite');
    } else {
      S = previousParty;
      btn.disabled = false;
      render();
      internetNeeded();
    }
  };
}

function auditChange(event, field){
  return (event.changes || []).find(change=>change.field===field);
}
function auditPersonName(id){
  const current = personById(id);
  if(current) return current.name;
  const historical = [...(S.audit || [])].reverse().find(event=>event.entityId===id && event.label);
  return historical ? historical.label : 'Alguien';
}
function auditValueFor(event, field){
  const change = auditChange(event,field);
  return change ? (change.after ?? change.before) : null;
}
function auditDescription(event){
  const actor = event.actorId ? auditPersonName(event.actorId) : 'Alguien';
  const label = event.label || 'la fiesta';
  if(event.action === 'party.created') return `${actor} creó la fiesta`;
  if(event.action === 'party.updated') return `${actor} cambió el nombre o la fecha`;
  if(event.action === 'person.created') return `${actor} añadió a ${label}`;
  if(event.action === 'person.deleted') return `${actor} borró a ${label}`;
  if(event.action === 'person.updated'){
    const name = auditChange(event,'name');
    const admin = auditChange(event,'admin');
    const active = auditChange(event,'active');
    if(active) return active.after ? `${actor} volvió a meter a ${label}` : `${actor} sacó a ${label} de futuros gastos`;
    if(admin) return admin.after ? `${actor} dio la llave a ${label}` : `${actor} quitó la llave a ${label}`;
    if(name) return `${actor} cambió el nombre de ${name.before || 'alguien'} a ${name.after || label}`;
    return `${actor} cambió a ${label}`;
  }
  if(event.action === 'item.created'){
    return auditValueFor(event,'status') === 'bought'
      ? `${actor} apuntó el gasto «${label}»` : `${actor} añadió «${label}» a la lista`;
  }
  if(event.action === 'item.deleted') return `${actor} borró «${label}»`;
  if(event.action === 'item.updated'){
    const status = auditChange(event,'status');
    if(status && status.after === 'bought') return `${actor} marcó «${label}» como comprado`;
    if(status && status.after === 'claimed') return `${actor} se pidió «${label}»`;
    if(status && status.after === 'pending') return `${actor} dejó «${label}» sin dueño`;
    return `${actor} corrigió «${label}»`;
  }
  if(event.action.startsWith('transfer.')){
    const fromId = auditValueFor(event,'fromId');
    const toId = auditValueFor(event,'toId');
    const cents = auditValueFor(event,'cents');
    const transfer = `${fromId ? auditPersonName(fromId) : '—'} → ${toId ? auditPersonName(toId) : '—'}${Number.isInteger(cents) ? ' · ' + eur(cents) : ''}`;
    if(event.action === 'transfer.created') return `${actor} marcó el Bizum ${transfer}`;
    if(event.action === 'transfer.deleted') return `${actor} deshizo el Bizum ${transfer}`;
    return `${actor} corrigió el Bizum ${transfer}`;
  }
  return `${actor} hizo un cambio`;
}

function deletePartySheet(){
  if(isReadOnlyParty()) return toast('Este enlace es solo para mirar.');
  if(!S.remote || !OWNER_KEY_RE.test(S.remote.ownerKey || '')){
    return toast('Solo el móvil que creó la fiesta puede borrarla para todos.');
  }
  const expectedName = S.party.name;
  openSheet(`
    <h2 class="sheet-title">Borrar la fiesta para todos</h2>
    <p class="sheet-sub">La fiesta dejará de abrirse para la peña. Este móvil podrá recuperarla durante 7 días.</p>
    <div class="access-note"><strong>Permiso del móvil creador.</strong><br>La llave organiza la peña, pero no identifica a quien la usa.</div>
    <label class="label" for="deletePartyNameInput">Escribe ${escapeHtml(expectedName)} para confirmar</label>
    <input type="text" id="deletePartyNameInput" autocomplete="off">
    <div class="sheet-actions">
      <button class="btn btn-outline" id="cancelDeletePartyButton" type="button">Cancelar</button>
      <button class="btn btn-danger" id="confirmDeletePartyButton" type="button">Borrar para todos</button>
    </div>
  `);
  $('#cancelDeletePartyButton').onclick = closeSheet;
  $('#confirmDeletePartyButton').onclick = async () => {
    if($('#deletePartyNameInput').value !== expectedName) return toast('Escribe el nombre tal cual.');
    const button = $('#confirmDeletePartyButton');
    await withBusyButton(button,'Borrando…',async () => {
      const remote = S && S.remote;
      if(!remote || !OWNER_KEY_RE.test(remote.ownerKey || '')){
        return abortSheet('Este móvil ya no guarda el permiso para borrarla.');
      }
      let response;
      try {
        response = await apiRequest('DELETE','/parties/' + remote.id, {
          ownerKey:remote.ownerKey, rev:remote.rev,
          deviceId:currentDeviceId(), confirmName:expectedName,
        });
      } catch(e){ return internetNeeded(); }
      if(response.status === 202 && response.body && response.body.purgeAt){
        const purgeAt = Date.parse(response.body.purgeAt);
        if(Number.isFinite(purgeAt)) rememberDeletedParty({
          id:remote.id, key:remote.key, ownerKey:remote.ownerKey,
          name:expectedName, purgeAt,
        });
        closeSheet(); clearCurrentPartyFromPhone(); render();
        return toast('Fiesta borrada. Puedes recuperarla durante 7 días.');
      }
      if(response.status === 409){ closeSheet(); await download(); return toast('La fiesta había cambiado. Revísala antes de borrarla.'); }
      if(response.status === 403) return abortSheet('Este móvil no tiene permiso para borrar esa fiesta.');
      toast('No se ha podido borrar ahora.');
    });
  };
}

async function restoreDeletedParty(entry, button){
  await withBusyButton(button,'Recuperando…',async () => {
    openingParty = true;
    render();
    let response;
    try {
      response = await apiRequest('POST','/parties/' + entry.id + '/restore', {
        ownerKey:entry.ownerKey, deviceId:currentDeviceId(),
      });
    } catch(e){
      openingParty = false;
      render();
      return internetNeeded();
    }
    openingParty = false;
    if(response.status === 200 && response.body && response.body.state){
      resetSync();
      const restored = migrateState(response.body.state);
      S = {...restored, me:null, tab:'party', remote:{
        id:entry.id, key:response.body.key, ownerKey:response.body.ownerKey,
        rev:response.body.rev,
      }, audit:normalizeAudit(response.body.audit)};
      sync.uploadedJson = stateJson();
      S.pendingUpload = false;
      forgetDeletedParty(entry.id);
      saveLocal(); markOnline(); render(); identitySheet(true);
      return toast('Fiesta recuperada. Aquí no ha pasado nada.');
    }
    if(response.status === 404 || response.status === 410){
      forgetDeletedParty(entry.id); render();
      return toast('Esa fiesta ya no se puede recuperar.');
    }
    render();
    if(response.status === 403) return toast('Este móvil ya no puede recuperar esa fiesta.');
    toast('No se ha podido recuperar ahora.');
  });
}

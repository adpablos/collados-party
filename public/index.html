      const activeIds = new Set(activePeople().map(p=>p.id));
      const allActive = n === activeIds.size && consumerIds(it).every(id=>activeIds.has(id));
      const tag = readOnly ? 'div' : 'button';
      const editAttributes = readOnly ? '' : ` data-edit="${escapeHtml(it.id)}" type="button"
        aria-label="Comprada: ${escapeHtml(it.name)}, ${eur(it.priceCents||0)}. Tocar para corregirla."`;
      return `<${tag} class="card item-card bought-card${readOnly ? ' read-only' : ''}"${editAttributes}>
        <div class="item-row" style="align-items:center">
          <span class="bought-checkIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg></span>
          <div style="flex:1;min-width:0">
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="meta" style="margin-top:1px">${eur(it.priceCents||0)} · pagó ${escapeHtml(personById(it.payerId)?.name || '—')} · entre ${allActive?'todos':n}</div>
          </div>
        </div>
      </${tag}>`;
    }

    const p = it.claimerId ? personById(it.claimerId) : null;
    const isMine = it.status==='claimed' && it.claimerId === S.me;

    let chip;
    if(isMine) chip = '<span class="status-chip chip-primary">La traes tú</span>';
    else if(p) chip = `<span class="status-chip chip-primary">La trae ${escapeHtml(p.name)}</span>`;
    else chip = '<span class="status-chip chip-neutral">Sin dueño</span>';

    const id = escapeHtml(it.id);
    let actions = '';
    if(readOnly){
      actions = '';
    } else if(isMine){
      actions = `<button class="btn btn-green btn-mini" data-buy="${id}" type="button">Ya está comprada</button>
        <button class="quiet-link" data-release="${id}" type="button">soltar</button>`;
    } else if(!p){
      actions = `<button class="btn btn-soft btn-mini" data-pillar="${id}" type="button">Me lo pido</button>
        <button class="quiet-link" data-buy="${id}" type="button">ya comprada</button>
        ${admin ? `<button class="btn btn-outline btn-mini" data-assign="${id}" type="button">Asignar</button>` : ''}`;
    } else if(admin){
      actions = `<button class="quiet-link" data-release="${id}" type="button">soltar</button>
        <button class="quiet-link" data-buy="${id}" type="button">apuntar precio</button>`;
    }

    const canRemove = !readOnly && (admin || !p);
    return `<div class="card item-card">
      <div class="item-row">
        <div style="flex:1;min-width:0">
          <div class="name">${escapeHtml(it.name)}</div>
          ${actions ? `<div class="actions">${actions}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          ${chip}
          ${canRemove ? `<button class="remove-button" data-remove-button="${id}" type="button" aria-label="Quitar ${escapeHtml(it.name)}">✕</button>` : ''}
        </div>
      </div>
    </div>`;
  };

  const toBuy = S.items.filter(i=>i.status!=='bought');
  const boughtItems = S.items.filter(i=>i.status==='bought');
  const unownedCount = S.items.filter(isUnownedItem).length;

  return `
    <div class="screen-header"><h1>La lista</h1><div class="sub">${sub}</div></div>
    ${readOnly ? '<div class="access-note"><strong>Solo lectura.</strong><br>Puedes ver la lista, pero este enlace no guarda cambios.</div>' : `<form class="add-row" id="addItemForm">
      <input type="text" id="itemInput" placeholder="¿Qué falta? (garrafón no)" maxlength="40" autocomplete="off">
      <button class="btn btn-primary" type="submit">Apuntar</button>
    </form>
    <button class="create-dashed" id="directExpenseButton" type="button" style="margin-bottom:14px">
      + Apuntar un gasto ya pagado</button>`}
    ${!total ? `<div class="empty-state">La lista está vacía.<br>${readOnly ? 'Todavía no hay nada apuntado.' : 'Apunta lo primero que haga falta.'}</div>`
      : toBuy.map(cardItem).join('')
        + (!readOnly && unownedCount ? `<div style="text-align:center;margin:2px 0 10px">
            <button class="quiet-link" id="shareListButton" type="button">Mandar lo que falta al grupo</button>
          </div>` : '')
        + (boughtItems.length && toBuy.length ? '<span class="label">Ya compradas</span>' : '')
        + boughtItems.map(cardItem).join('')}
  `;
}

function groupView(c){
  const readOnly = isReadOnlyParty();
  const participants = activePeople();
  const orderedPeople = [...S.people].sort((a,b)=>Number(b.active)-Number(a.active));
  const rows = orderedPeople.map(p => {
    const assignedItems = S.items.filter(i=>i.status==='claimed' && i.claimerId===p.id).length;
    const s = c.balance[p.id];
    const cls = balanceClass(s);
    const statusText = s>0?'le deben':(s<0?'debe':'en paz');
    const subs = [];
    if(p.admin) subs.push('Organiza la fiesta');
    if(assignedItems) subs.push(`trae ${assignedItems} cosa${assignedItems===1?'':'s'}`);
    return `
    <button class="person-row" data-person="${escapeHtml(p.id)}" type="button">
      ${avatarHtml(p.id)}
      <span class="center">
        <span class="name">${escapeHtml(p.name)}${p.id===S.me?' (tú)':''}${p.admin?KEY_ICON:''}</span>
        ${p.active && subs.length?`<span class="secondary-text">${escapeHtml(subs.join(' · '))}</span>`:''}
        ${p.active?'':'<span class="inactive-note">Ya no participa en gastos nuevos</span>'}
      </span>
      <span class="balance ${cls}">
        <span class="amount">${s>0?'+':''}${eur(s)}</span>
        <span class="status">${statusText}</span>
      </span>
    </button>`;
  }).join('');
  const inactiveCount = S.people.length - participants.length;
  return `
    <div class="screen-header"><h1>La peña</h1><div class="sub">${participants.length} en la cuadrilla${inactiveCount?` · ${inactiveCount} fuera de gastos nuevos`:''}</div></div>
    <div class="card" style="padding:4px 14px">${rows}</div>
    ${S.localReadOnly ? '' : `<button class="btn btn-primary btn-block" id="inviteButton" type="button" style="margin-top:6px">${readOnly ? 'Mandar las cuentas' : 'Mandar al grupo'}</button>`}
    ${readOnly ? '<div class="access-note"><strong>Solo lectura.</strong><br>Puedes consultar la peña y sus cuentas, pero no cambiarla.</div>' : `<form class="add-row" id="addPersonForm" style="margin-top:14px">
      <input type="text" id="personInput" placeholder="Añadir a alguien a mano" maxlength="20" autocomplete="off">
      <button class="btn btn-outline" type="submit">Añadir</button>
    </form>`}
  `;
}

function accountsView(c){
  const readOnly = isReadOnlyParty();
  if(c.total === 0 && !S.transfers.length){
    return `
      <div class="screen-header"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
      <div class="empty-state">Aún no hay gastos apuntados.<br>En cuanto la peña compre cosas, aquí salen las cuentas.</div>
      ${readOnly ? '<div class="access-note"><strong>Solo lectura.</strong><br>Este enlace no permite apuntar gastos.</div>' : '<div style="text-align:center"><button class="btn btn-green" id="directExpenseButton" type="button">Apuntar un gasto</button></div>'}`;
  }

  const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M14 6l6 6-6 6"/></svg>';
  const checkIcon = '<svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg>';

  // Your account comes first.
  let myAccount;
  if(!S.me){
    myAccount = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="my-account-action" style="border-top:none;margin-top:0;padding-top:2px">
        <span class="text">Di quién eres y te digo cómo vas.</span>
        <button class="btn btn-primary btn-mini" id="whoAmIButton" type="button">¿Quién eres?</button>
      </div>
    </div>`;
  } else {
    const s = c.balance[S.me] || 0;
    const cls = balanceClass(s);
    const title = s === 0 ? 'Estás en paz' : s > 0 ? `Te deben ${eur(s)}` : `Debes ${eur(-s)}`;
    const myBizums = c.bizums.filter(b => b.fromId === S.me || b.toId === S.me);
    const actions = myBizums.map(b => b.fromId === S.me
      ? `<div class="my-account-action">
          <span class="text">Haz bizum de <b>${eur(b.cents)}</b> a <b>${escapeHtml(personById(b.toId).name)}</b></span>
          <button class="btn btn-soft btn-mini" data-copy-bizum="${escapeHtml(b.toId)}" data-cents="${b.cents}" type="button">Copiar</button>
        </div>`
      : `<div class="my-account-action">
          <span class="text"><b>${escapeHtml(personById(b.fromId).name)}</b> te debe <b>${eur(b.cents)}</b></span>
        </div>`).join('');
    const sent = S.transfers.filter(t=>t.fromId===S.me).reduce((sum,t)=>sum+t.cents,0);
    const received = S.transfers.filter(t=>t.toId===S.me).reduce((sum,t)=>sum+t.cents,0);
    const transferBreakdown = sent || received
      ? ` · Bizums hechos: enviaste ${eur(sent)} · recibiste ${eur(received)}` : '';
    myAccount = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="my-account-amount ${cls}">${title}</div>
      <div class="my-account-breakdown">Pagaste ${eur(c.payerTotals[S.me]||0)} · te tocaba ${eur(c.owes[S.me]||0)}${transferBreakdown}</div>
      ${actions || (s === 0 ? '<div class="my-account-action"><span class="text">Ni pa ti ni pa mí. Así da gusto.</span></div>' : '')}
    </div>`;
  }

  // "Per head" only when true: all purchases consumed by everyone.
  const participants = activePeople();
  const activeIds = new Set(participants.map(p=>p.id));
  const uniform = S.items.every(item => item.status !== 'bought' ||
    (consumerIds(item).length === activeIds.size && consumerIds(item).every(id=>activeIds.has(id))));
  const subtotalText = uniform
    ? `${eur(Math.round(c.total / participants.length))} por cabeza`
    : 'repartido según quién cata cada cosa';

  const bizumsHtml = c.bizums.map(b => `
    <div class="card bizum-row">
      <div class="who">${escapeHtml(personById(b.fromId).name)}${arrow}${escapeHtml(personById(b.toId).name)}</div>
      <span class="transfer-amount">${eur(b.cents)}</span>
      ${readOnly ? '' : `<button class="checkIcon" data-bizum-from="${escapeHtml(b.fromId)}" data-bizum-to="${escapeHtml(b.toId)}"
        data-cents="${b.cents}" type="button"
        aria-label="Marcar Bizum de ${escapeHtml(personById(b.fromId).name)} a ${escapeHtml(personById(b.toId).name)} como hecho">${checkIcon}</button>`}
    </div>`).join('');
  const transfersHtml = [...S.transfers].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).map(transfer => `
    <div class="card bizum-row done">
      <div class="who">${escapeHtml(personById(transfer.fromId)?.name || '—')}${arrow}${escapeHtml(personById(transfer.toId)?.name || '—')}</div>
      <span class="transfer-amount">${eur(transfer.cents)}</span>
      ${readOnly ? `<span class="checkIcon on" aria-label="Bizum hecho">${checkIcon}</span>` : `<button class="checkIcon on" data-transfer="${escapeHtml(transfer.id)}" type="button"
        aria-label="Deshacer Bizum de ${escapeHtml(personById(transfer.fromId)?.name || '—')} a ${escapeHtml(personById(transfer.toId)?.name || '—')}">${checkIcon}</button>`}
    </div>`).join('');

  return `
    <div class="screen-header"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
    ${myAccount}
    <div class="card total-card">
      <div class="amount">${eur(c.total)}</div>
      <div class="per-head">${subtotalText}</div>
    </div>
    ${c.bizums.length ? '<span class="label">Bizums pendientes</span>' : ''}
    ${bizumsHtml}
    ${c.bizums.length ? `<div class="footnote">${readOnly ? 'Este enlace no puede marcar Bizums como hechos.' : 'Marca el círculo cuando el Bizum esté hecho.'}</div>`
      : '<div class="settled-message">Cuentas en paz. Ni pa ti ni pa mí.</div>'}
    ${S.transfers.length ? '<span class="label">Bizums hechos</span>' : ''}
    ${transfersHtml}
    ${S.localReadOnly ? '' : `<button class="btn btn-primary btn-block" id="shareAccountsButton" type="button" style="margin-top:14px;padding:14px">
      Mandar las cuentas al grupo</button>`}
  `;
}

/* ================= render ================= */
function render(){
  sync.renderLater = false; // Any render path clears the deferred-render debt.
  document.body.classList.toggle('no-party', !S);
  const v = $('#preview');
  if(!S){
    v.innerHTML = entryView();
    bindEntry(v);
    return;
  }
  document.querySelectorAll('.tab').forEach(t => {
    const active = t.dataset.tab === S.tab;
    t.classList.toggle('active',active);
    if(active) t.setAttribute('aria-current','page');
    else t.removeAttribute('aria-current');
  });
  const c = accounts();
  const pendingItems = c.bizums.length;
  const badge = $('#accountsBadge');
  badge.hidden = pendingItems===0;
  badge.textContent = pendingItems;

  v.innerHTML = (S.tab==='party' ? partyView(c)
    : S.tab==='list' ? listView()
    : S.tab==='group' ? groupView(c)
    : accountsView(c)) + footerHtml();
  bindView(v);
}

function bindEntry(v){
  bindFooter(v);
  const joinLink = v.querySelector('#joinLinkButton');
  // The transient "opening party" view has no entry controls yet.
  if(!joinLink) return;
  joinLink.onclick = () => {
    const txt = v.querySelector('#linkInput').value.trim();
    if(!txt) return joinSheet();
    if(!importParty(txt)) toast('Ahí no hay ninguna fiesta que valga');
  };
  v.querySelector('#createButton').onclick = () => createPartySheet();
  v.querySelector('#demoButton').onclick = () => {
    resetSync();
    S = demoState(); saveLocal(); render(); identitySheet(true);
  };
  const clearLocal = v.querySelector('#clearLocalDataButton');
  if(clearLocal) clearLocal.onclick = () => confirmSheet('¿Borrar los datos de este móvil?',
    'Se borran fiestas recientes, copias de recuperación, claves e identificador del dispositivo. Las fiestas en vivo siguen para la peña.', () => {
      clearAllLocalData(); render(); toast('Datos de este móvil borrados.');
    });
  const recent = loadRecentParties();
  v.querySelectorAll('[data-recent-index]').forEach(button => button.onclick = async () => {
    const party = recent[Number(button.dataset.recentIndex)];
    if(!party) return render();
    await withBusyButton(button,'Abriendo…',() => openLiveLink(party.id,party.key));
  });
  const deleted = loadDeletedParties();
  v.querySelectorAll('[data-deleted-index]').forEach(button => button.onclick = async () => {
    const party = deleted[Number(button.dataset.deletedIndex)];
    if(!party) return render();
    await restoreDeletedParty(party,button);
  });
}

function bindView(v){
  bindFooter(v);
  const on = (sel, fn) => { const el = v.querySelector(sel); if(el) el.onclick = fn; };

  /* party / home */
  on('#inviteButton', () => shareSheet(isReadOnlyParty() ? 'accounts' : 'invite'));
  on('#activityButton', activitySheet);
  on('#enableLiveButton', enableLive);
  on('#whoAmIButton', () => identitySheet(false));
  on('#myAccountButton', () => { S.tab='accounts'; saveLocal(); render(); });
  on('#actionButton', () => {
    const target = v.querySelector('#actionButton').dataset.target;
    if(target === 'identity') return identitySheet(true);
    if(target === 'buy'){
      if(!requireActivePerson()) return;
      return expenseSheet(v.querySelector('#actionButton').dataset.itemId);
    }
    if(target === 'expense'){
      if(!requireActivePerson()) return;
      expenseSheet(null);
    } else { S.tab = target; saveLocal(); render(); }
  });
  on('#renameButton', renameSheet);
  on('#repeatPartyButton', () => createPartySheet(S.items.filter(item=>item.status!=='bought')));
  on('#newPartyButton', () => confirmSheet('¿Empezar otra fiesta?',
    S.remote
      ? 'Se quita de tu móvil, pero sigue en vivo pa la peña: con el enlace del grupo vuelves cuando quieras.'
      : 'Esta se borra de tu móvil. Si quieres conservarla, copia antes el enlace de invitación: sirve de copia de seguridad.', () => {
      resetSync();
      S = null; localStorage.removeItem(STORAGE_KEY); render();
    }));
  on('#forgetPartyButton', () => confirmSheet('¿Olvidar esta fiesta en este móvil?',
    S.remote
      ? 'Se borran de este móvil la copia y la clave. La fiesta sigue en vivo para la peña.'
      : 'Se borra la copia de este móvil. Esta acción no se puede deshacer.', () => {
      clearCurrentPartyFromPhone(); render(); toast('Fiesta olvidada en este móvil.');
    }));
  on('#deletePartyButton', deletePartySheet);
  on('#demoButton', () => confirmSheet('¿Cargar la fiesta de ejemplo?',
    S.remote
      ? 'La tuya sigue en vivo pa la peña; el ejemplo va solo en este móvil.'
      : 'Se borrará la actual de este móvil (la de tus colegas no se toca).', () => {
      backupCurrentParty();
      resetSync();
      S = demoState(); saveLocal(); render(); identitySheet(true);
    }));

  /* list */
  const form = v.querySelector('#addItemForm');
  if(form) form.onsubmit = async e => {
    e.preventDefault();
    if(!requireActivePerson()) return;
    const n = v.querySelector('#itemInput').value.trim();
    if(!n) return toast('Escribe algo, que la lista no adivina.');
    if(S.items.length >= 500) return toast('La lista no da pa más (500 cosas). Quita algo primero.');
    const button = form.querySelector('button[type="submit"]');
    await withBusyButton(button,'Guardando…',() => commitSharedChange(() => {
      if(!personById(S.me)?.active) throw new Error('inactive_person');
      S.items.unshift(touch({id:newId('i'), name:n, status:'pending',
        createdAt:now(), createdBy:S.me || null}));
    }, {toast:'«' + n + '» apuntado'})).catch(err => {
      if(err.message === 'inactive_person') toast('Ya no sales en gastos nuevos. La llave puede volverte a meter.');
      else throw err;
    });
  };
  on('#directExpenseButton', () => {
    if(!requireActivePerson()) return;
    expenseSheet(null);
  });
  on('#shareListButton', () => shareSheet('list'));
  // The party may have changed underneath while rendering was deferred because
  // an input had half-written text. Every action revalidates item state so it
  // does not overwrite a purchase another phone just resolved.
  v.querySelectorAll('[data-pillar]').forEach(b => b.onclick = async () => {
    if(!requireActivePerson()) return;
    const it = itemById(b.dataset.pillar);
    if(!isUnownedItem(it)){
      render(); return toast('Alguien se ha adelantado: esa ya está resuelta.');
    }
    await withBusyButton(b,'Guardando…',() => commitSharedChange(() => {
      const live = itemById(b.dataset.pillar);
      if(!isUnownedItem(live)) throw new Error('already_taken');
      if(!personById(S.me)?.active) throw new Error('inactive_person');
      live.status='claimed'; live.claimerId=S.me;
      touch(live);
    }, {toast:'Apuntado: ' + it.name + ' corre de tu cuenta.'})).catch(err => {
      if(err.message === 'already_taken') toast('Alguien se ha adelantado: esa ya está resuelta.');
      else if(err.message === 'inactive_person') toast('Ya no sales en gastos nuevos. La llave puede volverte a meter.');
      else throw err;
    });
  });
  v.querySelectorAll('[data-release]').forEach(b => b.onclick = async () => {
    const it = itemById(b.dataset.release);
    if(!it || it.status !== 'claimed'){
      render(); return toast('Esa ya ha cambiado de manos.');
    }
    if(it.claimerId !== S.me && !isAdmin()){
      render(); return toast('Esa la trae ' + (personById(it.claimerId)?.name || 'otro') + ': soltarla es cosa suya o de la llave.');
    }
    await withBusyButton(b,'Guardando…',() => commitSharedChange(() => {
      const live = itemById(b.dataset.release);
      if(!live || live.status !== 'claimed') throw new Error('changed');
      if(live.claimerId !== S.me && !isAdmin()) throw new Error('not_allowed');
      live.status='pending'; delete live.claimerId;
      touch(live);
    }, {toast:'Suelta. A ver quién se la pide ahora.'})).catch(err => {
      if(err.message === 'changed') toast('Esa ya ha cambiado de manos.');
      else if(err.message === 'not_allowed') toast('Soltarla es cosa de quien la trae o de la llave.');
      else throw err;
    });
  });
  v.querySelectorAll('[data-assign]').forEach(b => b.onclick = () => {
    if(!isAdmin()) return toast('Eso es cosa de la llave');
    assignSheet(b.dataset.assign);
  });
  v.querySelectorAll('[data-buy]').forEach(b => b.onclick = () => {
    if(!requireActivePerson()) return;
    expenseSheet(b.dataset.buy);
  });
  v.querySelectorAll('[data-edit]').forEach(card => card.onclick = () => {
    const it = S.items.find(x=>x.id===card.dataset.edit);
    if(!it) return;
    if(!isAdmin() && it.payerId !== S.me){
      const who = personById(it.payerId);
      return toast('Solo ' + (who?who.name:'quien la pagó') + ' o la llave pueden tocarla');
    }
    expenseSheet(card.dataset.edit);
  });
  v.querySelectorAll('[data-remove-button]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    const it = itemById(b.dataset.removeButton);
    if(!it) return render();
    if(it.status === 'bought'){
      // Another phone just bought it; deleting money requires confirmation.
      render(); return toast('Esa ya está comprada: tócala si quieres corregirla.');
    }
    // Render-time permission (admin or unowned) is revalidated on tap. With
    // deferred rendering, the x button may predate someone claiming the item.
    if(!isAdmin() && it.claimerId){
      render(); return toast('Esa ya la trae ' + (personById(it.claimerId)?.name || 'alguien') + ': no se quita así como así.');
    }
    confirmSheet('¿Quitar «' + it.name + '»?', 'Se borrará de la lista para toda la peña.', async () => {
      await commitSharedChange(() => {
        const live = itemById(b.dataset.removeButton);
        if(!live) throw new Error('missing_item');
        if(live.status === 'bought') throw new Error('already_bought');
        if(!isAdmin() && live.claimerId) throw new Error('claimed');
        tombstoneEntity('items',live);
      }, {toast:'Fuera de la lista'}).catch(err => {
        if(err.message === 'missing_item') render();
        else if(err.message === 'already_bought') toast('Esa ya está comprada: tócala si quieres corregirla.');
        else if(err.message === 'claimed') toast('Esa ya la trae alguien: no se quita así como así.');
        else throw err;
      });
    });
  });

  /* group */
  const formP = v.querySelector('#addPersonForm');
  if(formP) formP.onsubmit = async e => {
    e.preventDefault();
    if(!requireActivePerson()) return;
    const n = v.querySelector('#personInput').value.trim();
    if(!n) return;
    if(personByName(n)) return toast('Ya hay alguien con ese nombre. Ponle un mote distinto.');
    if(S.people.length >= 100) return toast('La peña no da pa más (100). Menuda fiesta.');
    const button = formP.querySelector('button[type="submit"]');
    await withBusyButton(button,'Guardando…',() => commitSharedChange(() => {
      if(!personById(S.me)?.active) throw new Error('inactive_person');
      if(personByName(n)) throw new Error('duplicate_name');
      S.people.push(touch({id:newId('p'), name:n, admin:false, active:true}));
    }, {toast:n + ' se une a la peña'})).catch(err => {
      if(err.message === 'inactive_person') toast('Ya no sales en gastos nuevos. La llave puede volverte a meter.');
      else if(err.message === 'duplicate_name') toast('Ya hay alguien con ese nombre. Ponle un mote distinto.');
      else throw err;
    });
  };
  v.querySelectorAll('[data-person]').forEach(f => f.onclick = () => personSheet(f.dataset.person));

  /* accounts */
  v.querySelectorAll('[data-bizum-from]').forEach(b => b.onclick = async () => {
    if(!personById(S.me)) return identitySheet(true);
    const fromId = b.dataset.bizumFrom;
    const toId = b.dataset.bizumTo;
    const cents = Number(b.dataset.cents);
    const current = accounts().bizums.find(x =>
      x.fromId===fromId && x.toId===toId && x.cents===cents);
    if(!current) return render();
    if(S.transfers.length >= 500) return toast('Hay demasiados Bizums guardados. Corrige alguno antes.');
    await withBusyButton(b,'',() => commitSharedChange(() => {
      const liveBizum = accounts().bizums.find(item =>
        item.fromId===fromId && item.toId===toId && item.cents===cents);
      if(!liveBizum) throw new Error('changed_bizum');
      const at = now();
      S.transfers.push({id:transferCompletionId(fromId,toId,cents), fromId, toId, cents,
        createdAt:at, createdBy:S.me || null, updatedAt:at, updatedBy:S.me || null});
    }, {toast:accounts().bizums.length === 1
      ? 'Cuentas claras y el chocolate espeso.' : 'Bizum apuntado'})).catch(e => {
        if(e.message === 'changed_bizum') abortSheet('Las cuentas han cambiado: revisa el Bizum antes de marcarlo.');
        else throw e;
      });
  });
  v.querySelectorAll('[data-transfer]').forEach(b => b.onclick = () => {
    const transfer = S.transfers.find(item=>item.id===b.dataset.transfer);
    if(!transfer) return render();
    confirmSheet('¿Deshacer este Bizum?',
      `${personById(transfer.fromId)?.name || '—'} → ${personById(transfer.toId)?.name || '—'} · ${eur(transfer.cents)}. Úsalo solo si se marcó por error.`, async () => {
        await commitSharedChange(() => {
          const live = S.transfers.find(item=>item.id===transfer.id);
          if(!live) throw new Error('missing_transfer');
          tombstoneEntity('transfers',live);
        }, {toast:'Bizum corregido'}).catch(e => {
          if(e.message === 'missing_transfer') render();
          else throw e;
        });
      });
  });
  v.querySelectorAll('[data-copy-bizum]').forEach(b => b.onclick = async () => {
    const who = personById(b.dataset.copyBizum);
    const txt = `Bizum de ${eur(Number(b.dataset.cents))} a ${who ? who.name : '—'} — «${S.party.name}»`;
    const ok = await copyToClipboard(txt);
    toast(ok ? 'Copiado. Al Bizum y arreando.' : 'No se ha podido copiar');
  });
  on('#shareAccountsButton', () => shareSheet('accounts'));
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if(!S) return;
  S.tab = t.dataset.tab; saveLocal(); render();
}));

/* startup: edit link (#F:id:key), read link (#R:id), snapshot (#AP2:), or saved state */
(function(){
  let hash = location.hash || '';
  try { hash = decodeURIComponent(hash); } catch(e){ /* A stray % must not crash the app. */ }
  const clearHash = () => {
    try { history.replaceState(null,'',location.pathname + location.search); } catch(e){}
  };

  if(/^#privacidad$/i.test(hash)){
    clearHash();
    render();
    privacySheet();
    if(S && S.remote) download();
    return;
  }

  const editLink = hash.match(EDIT_LINK_RE);
  const readLink = hash.match(READ_LINK_RE);
  const live = editLink || readLink;
  if(live){
    render();
    if(!S) toast('Abriendo la fiesta del grupo…');
    // Clear the hash only if the party opens. Without network, reload retries.
    openLiveLink(live[1].toLowerCase(), editLink ? editLink[2].toLowerCase() : null)
      .then(ok => { if(ok) clearHash(); });
    return;
  }

  if(hash.length > 4){
    const obj = decodeSnapshot(hash);
    if(obj){
      clearHash();
      // An old snapshot link must not silently disconnect a live party.
      if(isRemoteParty()){
        render();
        confirmSheet('¿Abrir la fiesta del enlace?',
          'Ese enlace lleva una copia congelada. Tu fiesta en vivo se queda a salvo: vuelves a ella con el enlace del grupo.',
          () => applyImported(obj));
        download();
        return;
      }
      applyImported(obj);
      return;
    }
  }
  render();
  if(S && !S.me) identitySheet(true);
  if(S && S.remote) download();
})();

/* live parties keep themselves up to date */
setInterval(() => {
  if(document.visibilityState !== 'visible' || !S || !S.remote) return;
  refreshSync();
  if(sync.renderLater) renderNowOrLater();
  // Download first, upload after, in order. Processing a stale GET after a PUT
  // would create revision bounce.
  download().then(() => {
    if(S && S.remote && (sync.markOffline || S.pendingUpload)) upload();
  });
}, 12000);
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') download();
});
// When connectivity returns, poll first to seed the baseline, then upload.
window.addEventListener('online', async () => { flushClientEvents(); await download(); upload(); });
window.addEventListener('error', event => {
  reportClientEvent('client.error', {route:'client',
    errorType:event && event.error && event.error.name || 'Error'});
});
window.addEventListener('unhandledrejection', event => {
  reportClientEvent('client.unhandled_rejection', {route:'client',
    errorType:event && event.reason && event.reason.name || 'Error'});
});
</script>
</body>
</html>

# Server stack: nginx serves public/ and proxies /api/ to the api container for
# shared parties; cloudflared exposes it at https://apachas.alexdepablos.es.
# Intended for the Hetzner server. For local development, `node server/api.js`
# is enough. See docs/deployment.md.
name: apachas

services:
  web:
    image: nginx:1.28-alpine
    restart: unless-stopped
    environment:
      APP_RELEASE: ${APP_RELEASE:-dev}
    ports:
      # Loopback only: public access enters through the tunnel, not this port.
      - "127.0.0.1:3200:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deployment/nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    depends_on:
      # Intentionally service_started instead of healthy. If the API goes down,
      # static serving stays up, the app works in local mode, and /api returns
      # 502.
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    image: node:22-alpine
    restart: unless-stopped
    command: ["node", "/srv/api.js"]
    environment:
      DATA_DIR: /data
      APP_RELEASE: ${APP_RELEASE:-dev}
    volumes:
      - ./server/api.js:/srv/api.js:ro
      - api-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  cloudflared:
    image: cloudflare/cloudflared:2025.11.1
    restart: unless-stopped
    user: "0:0"
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ${APACHAS_CLOUDFLARED_CONFIG_DIR:-/etc/apachas/cloudflared}:/etc/cloudflared:ro
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  # Shared parties, one JSON document each. Survives redeployments and is only
  # lost with `docker compose down -v`.
  api-data:

<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Pachas — los gastos de la peña</title>
<meta name="description" content="Los gastos de la peña, a partes iguales. Ni pa ti ni pa mí.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Ccircle cx='24' cy='24' r='19' stroke='%235A50EC' stroke-width='4.5'/%3E%3Cg stroke='%235A50EC' stroke-width='4.5' stroke-linecap='round'%3E%3Cline x1='24' y1='24' x2='24' y2='5'/%3E%3Cline x1='24' y1='24' x2='42.1' y2='18.1'/%3E%3Cline x1='24' y1='24' x2='35.2' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='12.8' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='5.9' y2='18.1'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  /* v2 palette from the Claude Design redesign: bright neutral base, festive
     violet primary, green = owed to you, coral = you owe. Ink-dark mode. */
  :root{
    --bg:#F5F6FA;
    --card:#FFFFFF;
    --ink:#171A21;
    --muted:#6A7186;
    --line:#E6E8F0;
    --primary:#5A50EC;
    --onprimary:#FFFFFF;
    --primarysoft:#ECEAFE;
    --green:#0E9256;
    --greensoft:#DCF5E7;
    --coral:#E5484D;
    --coralsoft:#FDE8E8;
    --chip:#EFF1F6;
    --shadow:0 1px 2px rgba(16,18,24,.04);
    --overlay:rgba(13,15,22,.5);
    --radius:16px;
    --display:'Bricolage Grotesque',system-ui,-apple-system,sans-serif;
    --text:'Instrument Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
      --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
      --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
      --chip:#242836; --shadow:none; --overlay:rgba(13,15,22,.5);
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F6FA; --card:#FFFFFF; --ink:#171A21; --muted:#6A7186; --line:#E6E8F0;
    --primary:#5A50EC; --onprimary:#FFFFFF; --primarysoft:#ECEAFE;
    --green:#0E9256; --greensoft:#DCF5E7; --coral:#E5484D; --coralsoft:#FDE8E8;
    --chip:#EFF1F6; --shadow:0 1px 2px rgba(16,18,24,.04); --overlay:rgba(13,15,22,.5);
  }
  :root[data-theme="dark"]{
    --bg:#101218; --card:#191C25; --ink:#EDEFF6; --muted:#99A0B4; --line:#2A2E3C;
    --primary:#9D96FF; --onprimary:#1B1747; --primarysoft:#2A2750;
    --green:#45D48F; --greensoft:#17362A; --coral:#FF8080; --coralsoft:#3D2226;
    --chip:#242836; --shadow:none; --overlay:rgba(13,15,22,.5);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--text);
    font-size:15px; line-height:1.45;
    min-height:100dvh;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  main{flex:1;padding:14px 20px 104px;overflow-x:hidden}
  body.no-party #tabbar{display:none}
  body.no-party main{padding-bottom:30px}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--primary);outline-offset:2px}

  /* ---------- theme button ---------- */
  #themeButton{
    /* absolute instead of fixed: it scrolls with the page instead of floating
       over cards. */
    position:absolute;top:14px;right:14px;z-index:50;
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--muted);
  }
  #themeButton svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- screen headers ---------- */
  .screen-header{margin:18px 2px 16px}
  .screen-header h1{font-family:var(--display);font-size:26px;font-weight:700;margin:0;line-height:1.15}
  .screen-header .sub{color:var(--muted);font-size:13px;margin-top:3px}

  /* ---------- party hero ---------- */
  .hero{text-align:center;padding:34px 0 6px}
  .hero .logo{color:var(--primary)}
  .hero .logo svg{width:76px;height:76px}
  .hero h1{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.5px;margin:10px 0 6px}
  .hero .tagline{color:var(--muted);font-size:14px;line-height:1.5;margin:0 auto 24px;max-width:34ch}

  /* ---------- common ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);display:block;margin:16px 0 7px}
  .card .label:first-child, .field .label{margin-top:0}
  .btn{border:none;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--primary);color:var(--onprimary)}
  .btn-green{background:var(--green);color:var(--onprimary)}
  .btn-soft{background:var(--primarysoft);color:var(--primary)}
  .btn-outline{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn-mini{padding:8px 13px;font-size:13.5px;border-radius:9px}
  .btn-block{width:100%}
  .quiet-link{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 2px}
  input[type=text],input[type=tel],input[type=date],textarea{
    font-family:inherit;font-size:16px;background:var(--card);color:var(--ink);
    border:1px solid var(--line);border-radius:11px;padding:12px 13px;width:100%;
  }
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.75}
  input:focus,textarea:focus{outline:none;border-color:var(--primary)}
  input[type=date]{min-height:47px}
  textarea{resize:vertical;min-height:90px}
  .add-row{display:flex;gap:8px;margin-bottom:14px}
  .add-row input{flex:1;min-width:0}
  .field{margin-bottom:16px}
  .empty-state{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px;line-height:1.6}
  .avatar{
    width:40px;height:40px;border-radius:999px;background:var(--primarysoft);flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:16px;color:var(--primary);
  }
  .avatar.mini{width:24px;height:24px;font-size:11px}
  .status-chip{font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px;white-space:nowrap}
  .chip-neutral{background:var(--chip);color:var(--muted)}
  .chip-primary{background:var(--primarysoft);color:var(--primary)}
  .key-icon{width:13px;height:13px;color:var(--muted);flex:none}

  /* ---------- party card (brand violet, same in both themes) ---------- */
  .party-card{position:relative;overflow:hidden;background:#5A50EC;border-color:#5A50EC;color:#fff}
  .party-card .label{color:#fff;opacity:.72}
  .party-card .title{font-family:var(--display);font-weight:700;font-size:21px;margin:2px 0 3px}
  .party-card .meta{font-size:13px;opacity:.82;margin-bottom:10px}
  .party-card .brand-mark{position:absolute;right:-42px;top:-34px;width:200px;height:200px;
    color:#fff;opacity:.16;pointer-events:none}
  .party-card .brand-mark svg{width:100%;height:100%}
  .btn-white{background:var(--card);color:var(--primary)}
  .btn-live{background:rgba(255,255,255,.16);color:#fff}
  .party-card .sync-status{color:#fff;opacity:.95;font-weight:600;font-size:13px}
  .sync-status.live::before{content:'';display:inline-block;width:8px;height:8px;
    border-radius:999px;background:#3DDC84;margin-right:7px}
  .next-action-text{margin:0 0 12px;font-family:var(--display);font-weight:700;font-size:18px;line-height:1.3}
  .create-dashed{
    width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
    color:var(--muted);font-size:14px;font-weight:600;padding:14px;cursor:pointer;
  }
  /* Compact row inside .card. It comes later in the cascade, so it owns its
     spacing; 2px left the text pressed against the border. */
  .identity-row{display:flex;align-items:center;gap:10px;padding:11px 14px}
  .identity-row .who{flex:1;font-size:14px;color:var(--muted)}
  .identity-row b{color:var(--ink)}

  /* ---------- list ---------- */
  .item-card .item-row{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
  .item-card .name{font-weight:600;font-size:15px;line-height:1.35;padding-top:2px}
  .item-card .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .item-card .actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:11px}
  .remove-button{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
    padding:4px 6px;line-height:1;opacity:.6;flex:none}
  .bought-card{cursor:pointer}
  .bought-card:active{filter:brightness(.97)}
  .bought-checkIcon{width:26px;height:26px;border-radius:999px;background:var(--greensoft);
    color:var(--green);display:inline-flex;align-items:center;justify-content:center;
    flex:none;margin-top:1px}
  .bought-checkIcon svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.6;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- group ---------- */
  .person-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .person-row:last-child{border-bottom:none}
  .person-row .center{flex:1;min-width:0}
  .person-row .name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
  .person-row .secondary-text{color:var(--muted);font-size:13px;margin-top:1px}
  .person-row .balance{text-align:right;font-variant-numeric:tabular-nums}
  .person-row .balance .amount{font-weight:600;font-size:14.5px}
  .person-row .balance .status{display:block;font-size:11px;color:var(--muted)}
  .balance-green{color:var(--green)}
  .balance-coral{color:var(--coral)}
  .balance-neutral{color:var(--muted)}

  /* ---------- accounts ---------- */
  .total-card{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
    padding:18px 16px;text-align:left}
  .total-card .amount{font-family:var(--display);font-weight:800;font-size:28px;letter-spacing:-.5px;
    font-variant-numeric:tabular-nums}
  .total-card .per-head{color:var(--muted);font-size:13px;text-align:right}
  .bizum-row{display:flex;align-items:center;gap:11px}
  .bizum-row.done{opacity:.55}
  .bizum-row .who{flex:1;font-size:14.5px;font-weight:600;min-width:0}
  .bizum-row .who svg{width:14px;height:14px;color:var(--muted);vertical-align:-2px;margin:0 3px}
  .bizum-row .transfer-amount{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .checkIcon{
    width:30px;height:30px;border-radius:999px;border:1.5px solid var(--line);
    background:transparent;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;justify-content:center;color:transparent;
  }
  .checkIcon.on{background:var(--green);border-color:var(--green);color:var(--onprimary)}
  .checkIcon svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round}
  .settled-message{color:var(--green);text-align:center;font-weight:600;font-size:14.5px;padding:18px 10px 6px}
  .footnote{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .my-account-amount{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.5px;
    line-height:1.1;font-variant-numeric:tabular-nums}
  .my-account-breakdown{color:var(--muted);font-size:13px;margin-top:3px}
  .my-account-action{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);
    margin-top:12px;padding-top:11px;font-size:14px}
  .my-account-action .text{flex:1;min-width:0}
  .my-account-action .btn{flex:none}

  /* ---------- actionable home / sharing ---------- */
  .hero-mini{display:flex;align-items:center;gap:8px;padding:14px 2px 12px;color:var(--primary)}
  .hero-mini svg{width:24px;height:24px}
  .hero-mini .wordmark{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.3px;color:var(--ink)}
  .sync-status{color:var(--muted);font-size:12.5px;margin-top:10px}
  .balance-card{display:flex;align-items:center;gap:10px}
  .balance-card .center{flex:1;min-width:0}
  .balance-card .label{margin:0 0 1px}
  .balance-card .amount{font-family:var(--display);font-weight:800;font-size:24px;
    letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1.15}
  .btn-text{background:none;border:none;color:var(--primary);font-weight:600;font-size:14.5px;cursor:pointer;padding:6px 4px}
  .preview{white-space:pre-wrap;overflow-wrap:break-word;background:var(--bg);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;font-size:13px;line-height:1.55;max-height:36dvh;overflow-y:auto}
  .history-line{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .centered{display:block;margin:10px auto 0;text-align:center}

  /* ---------- tab bar ---------- */
  nav#tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar-in{max-width:480px;margin:0 auto;display:flex}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;padding:7px 4px 4px;cursor:pointer;position:relative;
  }
  .tab svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--primary)}
  .tab .badge{
    position:absolute;top:3px;right:calc(50% - 24px);
    background:var(--coral);color:var(--onprimary);font-size:9.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .tab .badge[hidden]{display:none}

  /* ---------- sheet ---------- */
  #overlay{position:fixed;inset:0;background:var(--overlay);z-index:60;opacity:0;
    pointer-events:none;transition:opacity .2s}
  #overlay.open{opacity:1;pointer-events:auto}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:480px;margin:0 auto;transform:translateY(105%);transition:transform .25s;
    max-height:85dvh;overflow-y:auto;
  }
  #sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 16px}
  .sheet-title{font-family:var(--display);font-size:20px;font-weight:700;margin:0 0 4px;text-wrap:balance}
  .sheet-sub{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.5}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--card);border-radius:999px;padding:6px 13px 6px 6px;
    font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .pill .avatar{width:24px;height:24px;font-size:11px}
  .pill.on{border-color:var(--green);background:var(--greensoft)}
  .pill.off{opacity:.4}
  .pill.text-only{padding:6px 13px}
  .pill.on.pill-primary{border-color:var(--primary);background:var(--primarysoft)}
  .price-input{display:flex;align-items:center;gap:10px}
  .price-input input{font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
  .price-input .eur{font-size:19px;font-weight:600;color:var(--muted)}
  .sheet-actions{display:flex;gap:10px;margin-top:22px}
  .sheet-actions .btn{flex:1}
  .delete-link{background:none;border:none;color:var(--coral);font-size:13.5px;
    font-weight:600;margin:16px auto 0;display:block;cursor:pointer}
  .menu-option{
    display:block;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:11px;
    font-size:14.5px;font-weight:600;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;
  }
  .menu-option small{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px}
  .note{border:1px solid var(--line);border-left:3px solid var(--primary);
    border-radius:9px;padding:11px 13px;font-size:13px;color:var(--muted);line-height:1.5;margin-top:16px}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;bottom:92px;left:50%;transform:translate(-50%,16px);z-index:70;
    background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:500;
    padding:10px 17px;border-radius:10px;opacity:0;transition:.25s;pointer-events:none;
    max-width:86vw;text-align:center;
  }
  #toast.visible{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>

<button id="themeButton" type="button" aria-label="Cambiar entre modo claro y oscuro">
  <svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
</button>

<div id="app">
  <main id="preview"></main>
  <nav id="tabbar">
    <div class="tabbar-in">
      <button class="tab" data-tab="party" type="button">
        <svg viewBox="0 0 48 48" stroke-width="3.4"><circle cx="24" cy="24" r="19"/><g stroke-linecap="round"><line x1="24" y1="24" x2="24" y2="5"/><line x1="24" y1="24" x2="42.1" y2="18.1"/><line x1="24" y1="24" x2="35.2" y2="39.4"/><line x1="24" y1="24" x2="12.8" y2="39.4"/><line x1="24" y1="24" x2="5.9" y2="18.1"/></g></svg>
        Fiesta</button>
      <button class="tab" data-tab="list" type="button">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
        Lista</button>
      <button class="tab" data-tab="group" type="button">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.8-4.8 5.5-4.8s4.9 1.8 5.5 4.8"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.4c2.3.2 4 1.7 4.5 4.1"/></svg>
        Peña</button>
      <button class="tab" data-tab="accounts" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 7h13M17 7l-3-3M17 7l-3 3"/><path d="M20 17H7M7 17l3-3M7 17l3 3"/></svg>
        Cuentas<span class="badge" id="accountsBadge" hidden></span></button>
    </div>
  </nav>
</div>

<div id="overlay"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toast" role="status"></div>

<script>
'use strict';
/* ================= state ================= */
const STORAGE_KEY = 'a-pachas-v2';
const THEME_KEY = 'a-pachas-theme';
const API = '/api';
const now = () => Date.now();

// Normalize current v5 state loaded from localStorage, AP2 links, or the server.
// IDs are sanitized because they eventually get interpolated into DOM attributes;
// a poisoned state cannot smuggle a weird ID into HTML.
const ID_RE = /^[A-Za-z0-9_-]{1,40}$/;
const SETTLED_KEY_RE = /^[A-Za-z0-9_-]{1,40}>[A-Za-z0-9_-]{1,40}$/;
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
function migrateState(o){
  if(!o) return o;
  o.v = 5;
  if(!o.party || typeof o.party !== 'object') o.party = {name:'A Pachas', date:null, updatedAt:0};
  if(!o.party.updatedAt) o.party.updatedAt = 0;
  // The date ends up in value="...": it is YYYY-MM-DD or nothing.
  if(o.party.date != null && !DATE_RE.test(o.party.date)) o.party.date = null;
  o.people = (o.people || []).filter(p => p && typeof p.id === 'string' && ID_RE.test(p.id));
  o.people.forEach((p,i) => {
    if(p.admin === undefined) p.admin = i < 2;
    if(!p.updatedAt) p.updatedAt = 0;
  });
  o.items = (o.items || []).filter(it => it && typeof it.id === 'string' && ID_RE.test(it.id));
  o.items.forEach(it => { if(!it.updatedAt) it.updatedAt = 0; });
  o.settled = o.settled || {};
  for(const k in o.settled){
    if(!SETTLED_KEY_RE.test(k)){ delete o.settled[k]; continue; }
    if(!o.settled[k] || typeof o.settled[k] !== 'object') delete o.settled[k];
    else if(!o.settled[k].at) o.settled[k].at = 0;
  }
  o.tombstones = (o.tombstones || []).filter(l => l && typeof l.id === 'string' && ID_RE.test(l.id));
  o.tombstones.forEach(l => {
    if(!l.at) l.at = 0;
    if(l.seenAt == null) l.seenAt = l.at;
  });
  return o;
}

// The mark stores the amount that was actually paid; if later accounts change
// the Bizum between the same pair, the new amount becomes pending again.
const bizumKey = b => b.de + '>' + b.a;
const isBizumDone = b => {
  const v = S.settled[bizumKey(b)];
  return !!(v && v.done && (v.cents == null || v.cents === b.cents));
};

// Last-edit stamp: cross-phone merging depends on this. It is monotonic against
// the edited entity, so even if this phone's clock moves backwards, a real edit
// always lands above the version and tombstone it overwrites.
function touch(x){ x.updatedAt = Math.max(now(), (x.updatedAt || 0) + 1); x.updatedBy = S.me || null; return x; }

// Protocol delete: remove from the collection and add an informed tombstone
// (`seenAt`), keeping a local tombstone cap because the server rejects runaway
// states.
function tombstoneEntity(collection, entity){
  S[collection] = S[collection].filter(x => x.id !== entity.id);
  S.tombstones.push({id: entity.id, at: now(), seenAt: entity.updatedAt || 0});
  if(S.tombstones.length > 300) S.tombstones = S.tombstones.slice(-300);
}

const itemById = id => S && S.items.find(x => x.id === id);

// Remove deleted people from split lists. If an expense would be left with no
// consumers, fall back to "everyone" rather than breaking accounts. No new edit
// stamp: this is derived cleanup, not an edit, so merging never lets it
// overwrite something this phone has not seen.
function normalizeSplits(items, people){
  const liveIds = new Set(people.map(p => p.id));
  for(let i = 0; i < items.length; i++){
    const it = items[i];
    if(!it.consumers) continue;
    const liveConsumerIds = it.consumers.filter(id => liveIds.has(id));
    if(liveConsumerIds.length !== it.consumers.length){
      items[i] = {...it, consumers: liveConsumerIds.length ? liveConsumerIds : null};
    }
  }
}

// Bizum marks cannot grow without bound or reference removed people; the server
// rejects states with more than 500 keys. Prune both while merging and while
// marking, because the normal single-phone path never merges.
// Deterministic: the same state prunes the same way on every phone.
function pruneSettled(settled, people){
  const liveIds = new Set(people.map(p => p.id));
  for(const k of Object.keys(settled)){
    const pair = k.split('>');
    if(!liveIds.has(pair[0]) || !liveIds.has(pair[1])) delete settled[k];
  }
  const keys = Object.keys(settled);
  if(keys.length > 400){
    keys.sort((x, y) => ((settled[x].at || 0) - (settled[y].at || 0)));
    for(const k of keys.slice(0, keys.length - 400)) delete settled[k];
  }
}

// Parse price into cents using Spanish notation: comma decimals and dot
// thousands ("1.000" is one thousand euros, not one euro).
function parsePriceCents(txt){
  let s = String(txt).trim().replace(/[€\s]/g,'');
  if(!s) return NaN;
  if(s.includes(',')) s = s.replace(/\./g,'').replace(',', '.');
  else if(/^\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g,'');
  if(!/^\d+(\.\d+)?$/.test(s)) return NaN;
  return Math.round(parseFloat(s)*100);
}

function timeAgo(t){
  if(!t) return 'hace nada';
  const s = Math.max(0, Math.round((now() - t) / 1000));
  if(s < 45) return 'hace un momento';
  if(s < 3600) return `hace ${Math.round(s/60)} min`;
  if(s < 86400) return `hace ${Math.round(s/3600)} h`;
  return `hace ${Math.round(s/86400)} día${Math.round(s/86400)===1?'':'s'}`;
}

const LIVE_LINK_RE = /F:([a-z0-9]{6,}):([a-z0-9]{6,})/i;

function partyCode(){

  // field can never accidentally leak into snapshot links.

  accounts().bizums.forEach(b => {

  });
  const json = JSON.stringify(snapshot);

    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

function decodeSnapshot(text){
  const m = String(text).match(/AP2:([A-Za-z0-9_-]+)/);
  if(!m) return null;
  try {
    let b64 = m[1].replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const obj = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!obj || !obj.people || !obj.items || !obj.party) return null;
    obj.me = null; obj.tab = 'party'; obj.remote = null;
    return migrateState(obj);
  } catch(e){ return null; }

const sync = {

  timer: null,
  uploading: false,
  uploadAgain: false,     // A change arrived while an upload was in flight.
  renderLater: false, // New state exists but repaint is deferred.

  rejected: false,   // Server rejected state (400/413): do not retry blindly.

async function apiRequest(method, route, body){
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), 8000);
  try {
    const r = await fetch(API + route, {
      method: method,
      headers: body ? {'Content-Type':'application/json'} : undefined,
      body: body ? JSON.stringify(body) : undefined,
      cache: 'no-store',
      signal: ctl.signal,
    });
    let data = null;
    try { data = await r.json(); } catch(e){}
    return {status: r.status, body: data};
  } finally { clearTimeout(t); }
}

// What travels to the server and in links: the party without local fields
// (me, tab, remote). sharedFrom also canonicalizes key order because
// comparisons are JSON-based.
const sharedFrom = o => ({v:5, party:o.party, people:o.people, items:o.items,
  settled:o.settled, tombstones:o.tombstones});
const sharedState = () => sharedFrom(S);
const stateJson = () => JSON.stringify(sharedState());

// A real (non-demo) party with a server-backed remote. Does not imply sync is
// currently succeeding; see isLiveSyncing for that.
function isRemoteParty(){ return !!(S && S.remote && !S.party.demo); }
// Genuinely live right now: remote, not a demo, and not currently offline or rejected.
function isLiveSyncing(){ return isRemoteParty() && !sync.markOffline && !sync.rejected; }
// Local-only party that could still be switched on.
function canGoLive(){ return !S.remote && !S.party.demo; }

// Entity merge: latest edit wins by `mod`, and the tombstone list prevents
// deleted entities from coming back. A tombstone only buries an entity if it is
// newer than that entity's latest edit; if someone re-saves a purchase after
// someone else deleted it, the real payment survives and the losing tombstone is
// discarded. a is usually server state, b is local state.
function mergeStates(a, b){
  const mod = x => (x && x.updatedAt) || 0;
  const byLowestId = (x,y) => x.id < y.id ? -1 : 1;
  // For two tombstones with the same ID, keep the one that saw the highest
  // version, not the latest wall-clock timestamp. A later blind delete cannot
  // degrade an informed one.
  const strength = l => l.seenAt != null ? l.seenAt : (l.at || 0);
  const tombstoneMap = new Map();
  [...(a.tombstones||[]), ...(b.tombstones||[])].forEach(p => {
    const previous = tombstoneMap.get(p.id);
    if(!previous || strength(p) > strength(previous) ||
       (strength(p) === strength(previous) && (p.at||0) > (previous.at||0))) tombstoneMap.set(p.id, p);
  });
  // The tombstone stores the version seen by the deleter. It can only bury what
  // it knew. A blind delete cannot remove a purchase saved in a revision it
  // never downloaded.
  const isBuried = x => {
    const l = tombstoneMap.get(x.id);
    return !!l && strength(l) >= mod(x);
  };
  const mergeEntities = (la, lb) => {
    const inA = new Map(la.map(x=>[x.id,x]));
    const inB = new Map(lb.map(x=>[x.id,x]));
    const res = [];
    for(const x of lb) if(!inA.has(x.id) && !isBuried(x)) res.push(x);
    for(const x of la){
      const y = inB.get(x.id);
      const winner = y && mod(y) > mod(x) ? y : x;
      if(!isBuried(winner)) res.push(winner);
    }
    return res;
  };
  const settled = {...a.settled};
  for(const k in (b.settled||{})){
    const va = settled[k], vb = b.settled[k];
    if(!va || ((vb && vb.at) || 0) > ((va && va.at) || 0)) settled[k] = vb;
  }
  const people = mergeEntities(a.people, b.people);
  const items = mergeEntities(a.items, b.items);
  // Person-deletion cleanup is derived here, not written at delete time. A
  // rewrite from a stale view would overwrite unseen edits. First: a payer of a
  // surviving expense cannot disappear because their credit would vanish; and
  // if removing someone would leave an expense with no consumers, recover them.
  const presentIds = new Set(people.map(p => p.id));
  const candidates = new Map();
  [...(a.people||[]), ...(b.people||[])].forEach(p => {
    const prev = candidates.get(p.id);
    if(!prev || mod(p) > mod(prev)) candidates.set(p.id, p);
  });
  const restoreIds = new Set();
  for(const it of items){
    if(it.payerId && !presentIds.has(it.payerId)) restoreIds.add(it.payerId);
    if(it.consumers && it.consumers.length && it.consumers.every(id => !presentIds.has(id))){
      it.consumers.forEach(id => restoreIds.add(id));
    }
  }
  for(const id of restoreIds){
    if(!presentIds.has(id) && candidates.has(id)){
      people.push(candidates.get(id));
      presentIds.add(id);
    }
  }
  // The group cannot become empty. Two key holders deleting in parallel can bury
  // everyone while each local guard passes on its own phone. That is never the
  // intent, so restore the lowest ID deterministically.
  if(!people.length && candidates.size){
    const survivor = [...candidates.values()].sort(byLowestId)[0];
    people.push(survivor);
    presentIds.add(survivor.id);
  }
  // The admin role cannot disappear. If two admins demote each other at the
  // same time, merging would leave nobody able to fix the party. The lowest ID
  // inherits the role deterministically.
  if(people.length && !people.some(p => p.admin)){
    [...people].sort(byLowestId)[0].admin = true;
  }
  // Once the people set is settled, including resurrections and fallback
  // restores, remove people whose deletion consolidated from split lists.
  normalizeSplits(items, people);
  // Prune settled after resurrections so settled marks for restored people are
  // not deleted and shown as pending again.
  pruneSettled(settled, people);
  const liveIds = new Set([...people, ...items].map(x => x.id));
  return {
    v: 5,
    party: mod(b.party) > mod(a.party) ? b.party : a.party,
    people,
    items,
    settled,
    // Drop tombstones that lost to a newer edit. The cap removes the oldest
    // tombstones, not the most recently arrived ones.
    tombstones: [...tombstoneMap.values()].filter(l => !liveIds.has(l.id))
      .sort((x,y)=>(x.at||0)-(y.at||0)).slice(-300),
  };
}

function adoptSharedState(c){
  S.v = 5; S.party = c.party; S.people = c.people; S.items = c.items;
  S.settled = c.settled; S.tombstones = c.tombstones;
  if(S.me && !personById(S.me)) S.me = null;
}

const isSheetOpen = () => $('#sheet').classList.contains('open');
// Do not repaint under someone's fingers: open sheet or half-written text.
// Inputs from a closed sheet do not count, even though their DOM remains.
function isBusy(){
  const a = document.activeElement;
  if(a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA') &&
     (!$('#sheet').contains(a) || isSheetOpen())) return true;
  return [...document.querySelectorAll('#preview input, #preview textarea')].some(el => el.value);
}
// Repaint immediately if possible; otherwise repaint once the user lets go.
function renderNowOrLater(){
  if(!isSheetOpen() && !isBusy()){ sync.renderLater = false; render(); }
  else sync.renderLater = true;
}

function scheduleUpload(){
  clearTimeout(sync.timer);
  sync.timer = setTimeout(upload, 600);
}

async function upload(){
  if(!S || !S.remote || S.party.demo || sync.rejected) return;
  // Without a server baseline and without truly pending changes, a PUT would be
  // blind churn. Let the first poll seed sync.uploadedJson first.
  if(sync.uploadedJson === null && !S.pendingUpload) return;
  if(sync.uploading){ sync.uploadAgain = true; return; }
  sync.uploading = true;
  let requestedPartyId = null;
  try {
    for(let attempt = 0; attempt < 4; attempt++){
      requestedPartyId = S.remote.id;
      const state = sharedState();
      const json = JSON.stringify(state);
      if(json === sync.uploadedJson){
        // Everything is confirmed; clear the persisted pending mark too.
        if(S.pendingUpload){ S.pendingUpload = false; saveLocal(); }
        break;
      }
      const r = await apiRequest('PUT', '/parties/' + requestedPartyId,
        {key: S.remote.key, rev: S.remote.rev, state});
      // If the party changed during the request, this response is irrelevant.
      if(!S || !S.remote || S.remote.id !== requestedPartyId) break;
      if(r.status === 200){
        S.remote.rev = r.body.rev; sync.uploadedJson = json;
        const current = stateJson();
        if(json === current) S.pendingUpload = false;
        saveLocal(); markOnline();
        break;
      } else if(r.status === 409 && r.body && r.body.state){
        // Merge against the CURRENT shared state, not the pre-PUT snapshot. Edits
        // made while the request was in flight must not be lost.
        adoptSharedState(mergeStates(migrateState(r.body.state), sharedState()));
        S.remote.rev = r.body.rev;
        saveLocal();
        renderNowOrLater();
        // The next loop uploads the merged state.
      } else if(r.status === 404){
        disconnectRemote('Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 403){
        disconnectRemote('Este enlace ya no puede editar la fiesta. Sigues con la copia de tu móvil.');
        break;
      } else if(r.status === 429){
        break; // Server throttle; the interval will retry soon.
      } else if(r.status === 400 || r.status === 413){
        // The server rejects this state, likely shape or size. This is not a
        // network issue, and blind retries will not fix it.
        sync.rejected = true;
        toast('No se ha podido guardar ese cambio.');
        refreshSync();
        break;
      } else { markOffline(); break; }
    }
  } catch(e){
    // Same stale-rejection guard as download(): don't mark a party the user
    // has since switched away from as offline.
    if(S && S.remote && S.remote.id === requestedPartyId) markOffline();
  }
  sync.uploading = false;
  if(sync.uploadAgain){ sync.uploadAgain = false; scheduleUpload(); }
}

async function download(){
  if(!S || !S.remote || S.party.demo) return;
  const requestedPartyId = S.remote.id;
  try {
    const r = await apiRequest('GET', '/parties/' + requestedPartyId + '?rev=' + S.remote.rev);
    // If the party changed during the request, this response belongs to the old one.
    if(!S || !S.remote || S.remote.id !== requestedPartyId) return;
    if(r.status === 204){
      // The server is at our revision. If no pending local changes exist, local
      // state is the uploaded state; this avoids churn PUTs on reopen.
      if(sync.uploadedJson === null && !S.pendingUpload) sync.uploadedJson = stateJson();
      markOnline(); return;
    }
    if(r.status === 200 && r.body && r.body.state){
      // Stale response: one of our PUTs already advanced the revision. Ignore it
      // to avoid a rev/state bounce and re-upload loop.
      if(!(r.body.rev > S.remote.rev)){ markOnline(); return; }
      const beforeJson = stateJson();
      const remoteState = migrateState(r.body.state);
      adoptSharedState(mergeStates(remoteState, sharedState()));
      S.remote.rev = r.body.rev;
      const afterJson = stateJson();
      if(afterJson === JSON.stringify(sharedFrom(remoteState))){
        sync.uploadedJson = afterJson;
        S.pendingUpload = false;
      } else {
        S.pendingUpload = true;
        scheduleUpload(); // The merge has local changes the server has not seen.
      }
      markOnline();
      saveLocal();
      if(afterJson !== beforeJson) renderNowOrLater();
    } else if(r.status === 404){
      disconnectRemote('Esa fiesta ya no está en vivo. Sigues con la copia de tu móvil.');
    } else if(r.status === 429 || r.status >= 500){
      markOffline(); // Saturation or outage: same honest treatment as no coverage.
    }
  } catch(e){
    // A stale rejection (the user switched parties before this GET failed) must
    // not mark the newly opened party offline.
    if(S && S.remote && S.remote.id === requestedPartyId) markOffline();
  }
}

let creatingRemote = false; // A double tap must not create two parties.
async function createRemote(){
  if(!S || S.party.demo || S.remote) return !!(S && S.remote); // The demoState never uploads.
  if(creatingRemote) return false;
  creatingRemote = true;
  const localParty = S; // If S changes during the POST, the response is stale.
  const state = sharedState();
  const json = JSON.stringify(state); // Snapshot of what we actually send.
  try {
    const r = await apiRequest('POST', '/parties', {state});
    if(S !== localParty) return false;
    if(r.status === 201 && r.body && r.body.id){
      resetSync();
      S.remote = {id: r.body.id, key: r.body.key, rev: r.body.rev};
      sync.uploadedJson = json;
      // Upload edits made while the POST was in flight.
      const current = stateJson();
      if(current !== json){ S.pendingUpload = true; scheduleUpload(); }
      else S.pendingUpload = false;
      saveLocal(); markOnline();
      return true;
    }
  } catch(e){}
  finally { creatingRemote = false; }
  return false;
}

function disconnectRemote(msg){
  S.remote = null;
  resetSync();
  saveLocal(); toast(msg);
  renderNowOrLater();
}

function restoreSharedJson(json){
  const restored = migrateState(JSON.parse(json));
  adoptSharedState(restored);
  S.pendingUpload = false;
  sync.rejected = false;
  saveLocal();
}

function internetNeeded(){
  toast('Necesitas internet para cambiar la fiesta. Conéctate y prueba otra vez.');
}

function toastCommitMessage(message){
  if(message) toast(typeof message === 'function' ? message() : message);
}

async function syncBeforeSharedChange(){
  if(!S || !S.remote) return false;
  const partyId = S.remote.id;
  clearTimeout(sync.timer);
  await download();
  if(!S || !S.remote || S.remote.id !== partyId) return false;
  if(S.pendingUpload && !sync.rejected && !sync.markOffline){
    await upload();
    while(sync.uploading) await new Promise(res => setTimeout(res, 50));
  }
  return !!(S && S.remote && S.remote.id === partyId &&
    !S.pendingUpload && !sync.markOffline && !sync.rejected);
}

let commitQueue = Promise.resolve();
async function commitSharedChange(mutator, options){
  const queued = commitQueue.catch(() => {}).then(() => commitSharedChangeNow(mutator, options));
  commitQueue = queued.catch(() => {});
  return queued;
}

async function commitSharedChangeNow(mutator, options){
  options = options || {};
  if(S.party.demo){
    mutator();
    saveLocal();
    if(options.close) closeSheet();
    if(options.render !== false) render();
    toastCommitMessage(options.toast);
    return true;
  }

  if(!S.remote && !(await createRemote())){
    internetNeeded();
    return false;
  }
  if(sync.rejected){
    if(sync.uploadedJson) restoreSharedJson(sync.uploadedJson);
    else { sync.rejected = false; S.pendingUpload = false; saveLocal(); refreshSync(); }
  }
  if(!await syncBeforeSharedChange()){
    if(S && S.remote) internetNeeded();
    return false;
  }

  const beforeJson = stateJson();
  const beforeRev = S.remote && S.remote.rev;
  try {
    mutator();
  } catch(e){
    restoreSharedJson(beforeJson);
    throw e;
  }
  S.pendingUpload = true;
  sync.rejected = false;
  clearTimeout(sync.timer);
  await upload();
  const confirmed = !S.pendingUpload && !sync.markOffline && !sync.rejected;
  if(!confirmed){
    const rejected = sync.rejected;
    const stillRemote = !!(S && S.remote);
    if(stillRemote) S.remote.rev = beforeRev;
    if(stillRemote) restoreSharedJson(beforeJson);
    else saveLocal();
    if(options.render !== false) render();
    if(!rejected && stillRemote) internetNeeded();
    return false;
  }

  if(options.close) closeSheet();
  if(options.render !== false) render();
  toastCommitMessage(options.toast);
  return true;
}

async function enableLive(){
  if(S.remote) return shareSheet('invite');
  if(creatingRemote) return; // Already in progress, likely a double tap.
  const btn = $('#enableLiveButton');
  if(btn) btn.disabled = true;
  if(await createRemote()){

  } else {
    if(btn) btn.disabled = false;

}

async function openLiveLink(id, key){
  const openParty = S; // If S changes during the GET, the response is stale.
  const r = await apiRequest('GET', '/parties/' + id).catch(() => ({status: 0}));
  if(S !== openParty) return false;
  if(r.status !== 200 || !r.body || !r.body.state){
    toast(r.status === 404
      ? 'Ese enlace ya no lleva a ninguna fiesta.'
      : 'No se ha podido abrir la fiesta del enlace. ¿Hay red?');
    render();
    return false;
  }
  const remoteState = migrateState(r.body.state);
  const isSameParty = S && S.remote && S.remote.id === id;
  if(!isSameParty) backupCurrentParty();
  const me = isSameParty ? S.me : null;
  // If this is already the open party, merge pending local state instead of
  // overwriting it.
  const base = isSameParty ? mergeStates(remoteState, sharedState()) : remoteState;
  resetSync();
  S = {...base, me, tab:'party', remote:{id, key, rev:r.body.rev}};
  // The opener may have been removed from the group; do not let them act as a
  // ghost participant.
  if(S.me && !personById(S.me)) S.me = null;
  const json = stateJson();
  if(json === JSON.stringify(sharedFrom(remoteState))){
    sync.uploadedJson = json;
    S.pendingUpload = false;
  } else {
    sync.uploadedJson = JSON.stringify(sharedFrom(remoteState));
    S.pendingUpload = true;
    scheduleUpload();
  }
  saveLocal(); markOnline(); render();
  if(!S.me) identitySheet(true);
  return true;
}

/* ================= account calculation ================= */
function accounts(){
  const payerTotals = {}, owes = {};
  S.people.forEach(p => { payerTotals[p.id]=0; owes[p.id]=0; });
  let total = 0;
  for(const it of S.items){
    if(it.status !== 'bought' || !it.priceCents) continue;
    total += it.priceCents;
    if(payerTotals[it.payerId] !== undefined) payerTotals[it.payerId] += it.priceCents;
    const cons = consumerIds(it).filter(id => owes[id] !== undefined);
    if(!cons.length) continue;
    const base = Math.floor(it.priceCents / cons.length);
    let remainder = it.priceCents - base*cons.length;
    for(const id of cons){ owes[id] += base + (remainder-- > 0 ? 1 : 0); }
  }
  const balance = {};
  S.people.forEach(p => balance[p.id] = payerTotals[p.id] - owes[p.id]);

  const debtors = S.people.filter(p=>balance[p.id]<0).map(p=>({id:p.id, v:-balance[p.id]})).sort((a,b)=>b.v-a.v);
  const creditors = S.people.filter(p=>balance[p.id]>0).map(p=>({id:p.id, v:balance[p.id]})).sort((a,b)=>b.v-a.v);
  const bizums = [];
  let i=0, j=0;
  while(i<debtors.length && j<creditors.length){
    const m = Math.min(debtors[i].v, creditors[j].v);
    if(m>0) bizums.push({de:debtors[i].id, a:creditors[j].id, cents:m});
    debtors[i].v -= m; creditors[j].v -= m;
    if(debtors[i].v===0) i++;
    if(creditors[j].v===0) j++;
  }
  return {total, payerTotals, owes, balance, bizums};
}

/* ================= sheet ================= */
function openSheet(html, locked){
  $('#sheet').innerHTML = '<div class="sheet-handle"></div>' + html;
  $('#sheet').classList.add('open');
  $('#overlay').classList.add('open');
  $('#overlay').onclick = locked ? null : closeSheet;
}
function closeSheet(){
  $('#sheet').classList.remove('open');
  $('#overlay').classList.remove('open');
  // Without this, a sheet input keeps focus and leaves the keyboard open.
  const a = document.activeElement;
  if(a && a.blur && $('#sheet').contains(a)) a.blur();
  if(sync.renderLater) renderNowOrLater();
}

  openSheet(`

      S.people.push(p); S.me = p.id;
    }, {close:true, toast:'Bienvenido, ' + n});
  };
}

/* --- expense: direct, mark bought, or edit in one sheet --- */
function expenseSheet(itemId){
  const it = itemId ? itemById(itemId) : null;
  if(itemId && !it){ render(); return toast('Esa ya no está en la lista.'); }
  const direct = !it;
  const editing = !!(it && it.status === 'bought');
  let touchedConsumers = false; // If pills are never touched, "everyone" means everyone.
  const selectedIds = new Set(it ? consumerIds(it) : S.people.map(p=>p.id));
  let selectedPayerId = editing ? it.payerId : ((it && it.claimerId) || S.me);
  if(!personById(selectedPayerId)) selectedPayerId = personById(S.me) ? S.me : null;

  const consumerPills = S.people.map(p =>
    personPill(p, 'consumer', selectedIds.has(p.id)?'on':'off')).join('');
  const payerPills = S.people.map(p =>
    personPill(p, 'payer', 'pill-primary ' + (p.id===selectedPayerId?'on':''))).join('');

  let history = '';
  if(editing){
    const creator = it.createdBy && personById(it.createdBy);
    const editor = it.updatedBy && it.updatedBy !== it.createdBy && personById(it.updatedBy);
    const parts = [];
    if(creator) parts.push(`La apuntó ${escapeHtml(creator.name)}${it.createdAt ? ' ' + timeAgo(it.createdAt) : ''}`);
    if(editor) parts.push(`tocada por ${escapeHtml(editor.name)} ${timeAgo(it.updatedAt)}`);
    if(parts.length) history = `<div class="history-line">${parts.join(' · ')}</div>`;
  }

  const title = direct ? 'Apuntar un gasto' : escapeHtml(it.name);
  const sub = direct ? 'Qué fue, cuánto costó y quiénes lo catan.'
    : editing ? 'Corrige lo que haga falta.'
    : 'Apunta lo que ha costado y quién la cata.';
  const initialPrice = editing && it.priceCents ? (it.priceCents/100).toFixed(2).replace('.',',') : '';
  openSheet(`
    <h2 class="sheet-title">${title}</h2>
    <p class="sheet-sub">${sub}</p>
    <label class="label" for="expenseNameInput" style="margin-top:0">Qué</label>
    <input type="text" id="expenseNameInput" placeholder="Hielo, pan, el bar…" maxlength="40"
      autocomplete="off" value="${it ? escapeHtml(it.name) : ''}">
    <label class="label" for="priceInput">Precio</label>
    <div class="price-input">
      <input type="tel" id="priceInput" inputmode="decimal" placeholder="0,00" value="${initialPrice}" autocomplete="off">
      <span class="eur">€</span>
    </div>
    <span class="label">Pagó</span>
    <div class="pills">${payerPills}</div>
    <span class="label">¿Quiénes lo catan?</span>
    <div class="pills">${consumerPills}</div>
    <div class="sheet-actions">
      <button class="btn btn-outline" id="cancelButton" type="button">Cancelar</button>
      <button class="btn btn-green" id="saveExpenseButton" type="button">
        ${editing ? 'Guardar' : direct ? 'Apuntar el gasto' : 'Apuntar la compra'}</button>
    </div>
    ${editing ? '<button class="delete-link" id="deleteItemButton" type="button">Borrar esta compra</button>' : ''}
    ${history}
  `);
  document.querySelectorAll('[data-consumer]').forEach(b => b.onclick = () => {
    const id = b.dataset.consumer;
    touchedConsumers = true; // No longer an intentional "everyone" split.
    if(selectedIds.has(id)){
      if(selectedIds.size === 1) return toast('Alguien lo catará, digo yo.');
      selectedIds.delete(id);
    } else selectedIds.add(id);
    b.classList.toggle('on', selectedIds.has(id));
    b.classList.toggle('off', !selectedIds.has(id));
  });
  document.querySelectorAll('[data-payer]').forEach(b => b.onclick = () => {
    selectedPayerId = b.dataset.payer;
    document.querySelectorAll('[data-payer]').forEach(x =>
      x.classList.toggle('on', x.dataset.payer === selectedPayerId));
  });
  $('#cancelButton').onclick = closeSheet;
  $('#saveExpenseButton').onclick = async () => {
    const name = $('#expenseNameInput').value.trim();
    if(!name) return toast('Pon qué fue.');
    const priceCents = parsePriceCents($('#priceInput').value);
    if(isNaN(priceCents) || priceCents<=0) return toast('Ponle precio, que gratis no fue.');
    if(priceCents > 100000000) return toast('¿' + eur(priceCents) + '? Repasa ese precio, anda.');
    if(!personById(selectedPayerId)) return toast('¿Quién lo pagó?');
    // The group may have changed while the sheet was open. A removed ID in
    // consumers would resurrect that person in the next merge. If the user never
    // touched the pills from an "everyone" starting point, the intent is still
    // EVERYONE, so a new joiner during the sheet is included.
    let consumers;
    if(!touchedConsumers && (!it || !it.consumers)){
      consumers = null;
    } else {
      const liveSelectedIds = [...selectedIds].filter(id => personById(id));
      if(!liveSelectedIds.length){
        return abortSheet('La peña ha cambiado por debajo: revisa quiénes lo catan.');
      }
      consumers = liveSelectedIds.length === S.people.length ? null : liveSelectedIds;
    }
    let successMessage = '';
    await commitSharedChange(() => {
      if(direct){
        if(S.items.length >= 500) throw new Error('too_many_items');
        S.items.unshift(touch({id:newId('i'), name, status:'bought', priceCents:priceCents,
          payerId:selectedPayerId, consumers,
          createdAt:now(), createdBy:S.me || null}));
        successMessage = 'Apuntado. Las cuentas ya lo saben.';
      } else {
        // Find by ID again: the party may have refreshed while the sheet was
        // open. Permission is revalidated before anything else, including the
        // resurrection path, so someone who lost admin cannot revive another
        // person's purchase.
        let live = S.items.find(x=>x.id===itemId);
        const target = live || it;
        if(editing && !isAdmin() && target.payerId !== S.me){
          throw new Error('payer_changed');
        }
        if(live && !editing && live.status === 'bought'){
          // Someone else bought it while the sheet was open; do not overwrite
          // their payment with this form.
          throw new Error('already_bought');
        }
        if(!live){
          // If someone else deleted it, add it again: the payment was real.
          live = it;
          S.items.unshift(live);
          S.tombstones = S.tombstones.filter(t=>t.id!==itemId);
        }
        live.name = name;
        live.priceCents = priceCents;
        live.consumers = consumers;
        live.payerId = selectedPayerId;
        touch(live);
        if(!editing){
          live.status = 'bought';
          delete live.claimerId;
          successMessage = 'Apuntada. Las cuentas ya lo saben.';
        } else {
          successMessage = 'Guardado';
        }
      }
    }, {close:true, toast:() => successMessage}).catch(e => {
      if(e.message === 'too_many_items') toast('La lista no da pa más (500 cosas). Quita algo primero.');
      else if(e.message === 'payer_changed') abortSheet('Esa compra acaba de cambiar de manos: solo quien la pagó o la llave pueden tocarla.');
      else if(e.message === 'already_bought') abortSheet('Alguien la ha apuntado ya como comprada: revísala antes de corregirla.');
      else throw e;
    });
  };
  const del = $('#deleteItemButton');
  if(del) del.onclick = () => {
    confirmSheet('¿Borrar esta compra?',
      `«${it.name}» (${eur(it.priceCents||0)}) se quita de la lista y de las cuentas.`, async () => {
        // Revalidate against live state; the party may have changed underneath.
        const live = itemById(itemId);
        if(!live){ render(); return toast('Ya no está: alguien la ha quitado antes.'); }
        if(!isAdmin() && live.payerId !== S.me){
          render(); return toast('Esa compra ha cambiado de manos: solo quien la pagó o la llave pueden borrarla.');
        }
        await commitSharedChange(() => {
          const latest = itemById(itemId);
          if(!latest) throw new Error('missing_item');
          tombstoneEntity('items', latest);
        }, {toast:'Fuera de la lista'}).catch(e => {
          if(e.message === 'missing_item') abortSheet('Esa compra ya no está en la lista.');
          else throw e;
        });
      });
  };
  setTimeout(()=>$(direct ? '#expenseNameInput' : '#priceInput').focus(), 250);
}

/* --- assign, admins only --- */
function assignSheet(itemId){
  const it = S.items.find(x=>x.id===itemId); if(!it) return;
  const pills = S.people.map(p =>
    personPill(p, 'assign-person', 'pill-primary ' + (it.claimerId===p.id?'on':''))).join('');
  openSheet(`
    <h2 class="sheet-title">¿Quién trae «${escapeHtml(it.name)}»?</h2>
    <p class="sheet-sub">Le saldrá como suya en la lista.</p>
    <div class="pills">
      ${pills}
      <button class="pill text-only ${!it.claimerId?'on':''}" type="button" data-assign-person="">Sin dueño</button>
    </div>
  `);
  document.querySelectorAll('[data-assign-person]').forEach(b => b.onclick = async () => {
    if(!requireAdmin()) return;
    const who = personById(b.dataset.assignPerson);
    // data-assign-person="" intentionally means "unowned". A person removed underneath
    // must not be confused with that, because it would release the item.
    if(b.dataset.assignPerson && !who) return abortSheet('Esa persona ya no está en la peña.');
    let live = itemById(itemId);
    if(!live) return abortSheet('Esa cosa ya no está en la lista.');
    if(live.status === 'bought') return abortSheet('Esa ya está comprada: no hay nada que asignar.');
    await commitSharedChange(() => {
      live = itemById(itemId);
      if(!live) throw new Error('missing_item');
      if(live.status === 'bought') throw new Error('already_bought');
      if(who){ live.status='claimed'; live.claimerId=who.id; }
      else { live.status='pending'; delete live.claimerId; }
      touch(live);
    }, {close:true, toast: who ? 'Se la lleva ' + who.name : 'Suelta. A ver quién se la pide ahora.'}).catch(e => {
      if(e.message === 'missing_item') abortSheet('Esa cosa ya no está en la lista.');
      else if(e.message === 'already_bought') abortSheet('Esa ya está comprada: no hay nada que asignar.');
      else throw e;
    });
  });
}

function personSheet(pid){
  const p = personById(pid); if(!p) return;
  const c = accounts();
  const assignedItems = S.items.filter(i=>i.status==='claimed' && i.claimerId===pid);
  const purchases = S.items.filter(i=>i.status==='bought' && i.payerId===pid);
  const isMe = pid === S.me;
  const canManage = isAdmin() && !isMe;
  const canRename = isMe || isAdmin();

  const assignedList = assignedItems.length
    ? assignedItems.map(i=>`<li>${escapeHtml(i.name)}</li>`).join('')
    : '<li style="color:var(--muted)">Nada pendiente</li>';

  const s = c.balance[pid] || 0;
  const balanceText = s === 0 ? 'está en paz' : s > 0 ? `le deben ${eur(s)}` : `debe ${eur(-s)}`;

  openSheet(`
    <h2 class="sheet-title">${escapeHtml(p.name)}${p.admin?' '+KEY_ICON:''}${isMe?' <span class="status-chip chip-primary">tú</span>':''}</h2>
    <p class="sheet-sub">Ha pagado <strong>${eur(c.payerTotals[pid]||0)}</strong> en ${purchases.length} compra${purchases.length===1?'':'s'} ·
      le tocaba ${eur(c.owes[pid]||0)} · ${balanceText}.</p>
    <span class="label">Le toca traer</span>
    <ul style="margin:0 0 6px;padding-left:20px;font-size:14px;line-height:1.7">${assignedList}</ul>
    ${!isMe ? `<button class="btn btn-outline btn-mini" id="remindButton" type="button" style="margin-top:6px">Mandarle un recordatorio</button>` : ''}
    ${canRename ? `
      <span class="label">Nombre</span>
      <button class="menu-option" id="renamePersonButton" type="button">
        Cambiar nombre
        <small>Pa corregir un mote torcido antes de que se quede pa siempre.</small>
      </button>` : ''}
    ${canManage ? `
      <span class="label">Gestión</span>
      <button class="menu-option" id="toggleAdminButton" type="button">
        ${p.admin ? 'Quitarle la llave' : 'Darle la llave (admin)'}
        <small>Los de la llave asignan cosas, corrigen precios y gestionan la peña.</small>
      </button>
      <button class="menu-option" id="removePersonButton" type="button">
        Quitar de la peña
        <small>Solo si no tiene compras apuntadas.</small>
      </button>` : ''}
  `);
  const rec = $('#remindButton');
  if(rec) rec.onclick = () => {
    if(!personById(pid)) return abortSheet('Esa persona ya no está en la peña.');
    shareSheet('person', pid);
  };
  const ren = $('#renamePersonButton');
  if(ren) ren.onclick = () => renamePersonSheet(pid);
  // Handlers re-find by ID and reconfirm admin status; the party may have
  // merged underneath while the sheet was open.
  const tog = $('#toggleAdminButton');
  if(tog) tog.onclick = async () => {
    if(!requireAdmin()) return;
    const q = personById(pid);
    if(!q) return abortSheet('Esa persona ya no está en la peña.');
    if(q.admin && adminCount() === 1) return toast('Alguien tiene que quedarse con la llave');
    const nextAdmin = !q.admin;
    await commitSharedChange(() => {
      const live = personById(pid);
      if(!live) throw new Error('missing_person');
      live.admin = nextAdmin;
      touch(live);
    }, {close:true, toast:() => {
      const live = personById(pid);
      return nextAdmin ? (live ? live.name : q.name) + ' tiene la llave' : (live ? live.name : q.name) + ' ya no tiene la llave';
    }}).catch(e => {
      if(e.message === 'missing_person') abortSheet('Esa persona ya no está en la peña.');
      else throw e;
    });
  };
  const eli = $('#removePersonButton');
  if(eli) eli.onclick = async () => {
    if(!requireAdmin()) return;
    const q = personById(pid);
    if(!q) return abortSheet('Esa persona ya no está en la peña.');
    if(S.items.some(i=>i.status==='bought' && i.payerId===pid))
      return toast('Tiene compras apuntadas: reasígnalas antes');
    // If this person is the sole explicit consumer of a purchase, removing them
    // would leave consumers empty, which means "everyone"; the expense would
    // silently reallocate itself.
    if(S.items.some(i=>i.status==='bought' && i.consumers &&
        i.consumers.length === 1 && i.consumers[0] === pid))
      return toast('Hay compras que solo cata esa persona: corrígelas antes');
    if(q.admin && adminCount() === 1) return toast('Alguien tiene que quedarse con la llave');
    // Do NOT rewrite this person's items with a new stamp here. Their claims
    // become orphaned; the UI treats them as "unowned", and splits are cleaned
    // by the derived pass. The same pass runs during merge and only applies if
    // the deletion truly consolidates. If the person is resurrected because they
    // bought something this phone had not seen, their shares remain intact.
    await commitSharedChange(() => {
      const live = personById(pid);
      if(!live) throw new Error('missing_person');
      tombstoneEntity('people', live);
      normalizeSplits(S.items, S.people);
    }, {close:true, toast:q.name + ' ya no está en la peña'}).catch(e => {
      if(e.message === 'missing_person') abortSheet('Esa persona ya no está en la peña.');
      else throw e;
    });
  };
}

/* --- share with the group: moment-specific messages --- */
function shareMessage(shareType, pid){
  const link = partyLink();
  const n = S.party.name;
  if(shareType === 'invite'){
    return `A pachas con los gastos de «${n}».\n` +
      `Entra, di quién eres y apunta lo que pilles:\n${link}`;
  }
  if(shareType === 'list'){
    const pendingItems = S.items.filter(isUnownedItem);
    return `Faltan cosas pa «${n}»:\n` +
      pendingItems.map(i=>'· ' + i.name).join('\n') +
      `\n\nQuien pueda, que se lo pida aquí:\n${link}`;
  }
  if(shareType === 'accounts'){
    const c = accounts();
    const pending = pendingBizums(c);
    const lines = [`Cuentas de «${n}» — A Pachas`,
      `Total: ${eur(c.total)} entre ${S.people.length}`, ''];
    if(!c.bizums.length){
      lines.push('Cuentas en paz. Ni pa ti ni pa mí.');
    } else {
      c.bizums.forEach(b => lines.push(
        (isBizumDone(b) ? '✓ ' : '· ') +
        personById(b.de).name + ' → ' + personById(b.a).name + ': ' + eur(b.cents)));
      lines.push('');
      lines.push(pending.length
        ? 'Marca el tuyo cuando lo hagas:' : 'Todo saldado. Cuentas claras y el chocolate espeso.');
    }
    lines.push(link);
    return lines.join('\n');
  }
  if(shareType === 'person'){
    const p = personById(pid);
    if(!p) return link; // Removed while the sheet was open.
    const c = accounts();
    const assignedItems = S.items.filter(i=>i.status==='claimed' && i.claimerId===pid);
    const lines = [`${p.name}, pa «${n}»:`];
    if(assignedItems.length){
      lines.push('');
      lines.push('Te toca traer:');
      assignedItems.forEach(i => lines.push('· ' + i.name));
    }
    const outgoingBizums = pendingBizums(c).filter(b => b.de === pid);
    const isOwed = pendingBizums(c).filter(b => b.a === pid);
    if(outgoingBizums.length || isOwed.length){
      lines.push('');
      lines.push('De cuentas te sale:');
      outgoingBizums.forEach(b => lines.push(`· Bizum de ${eur(b.cents)} a ${personById(b.a).name}`));
      isOwed.forEach(b => lines.push(`· ${personById(b.de).name} te debe ${eur(b.cents)}`));
    }
    if(!assignedItems.length && !outgoingBizums.length && !isOwed.length){
      lines.push('nada pendiente. Estás al día, máquina.');
    }
    lines.push('');
    lines.push('Lo tienes aquí:');
    lines.push(link);
    return lines.join('\n');
  }
  return link;
}

async function shareSheet(shareType, pid){
  // The demoState is not shareable: its demoState flag would leave the receiver with a
  // party that can never go live.
  if(S.party.demo) return toast('La fiesta de ejemplo no se comparte: monta la tuya, que es un momento.');
  if(canGoLive()){
    openSheet(`
      <h2 class="sheet-title">Poniendo la fiesta en vivo</h2>
      <p class="sheet-sub">Un momento: así todos entran al mismo sitio y lo que apunte la peña lo ves tú también.</p>
      <div class="note">Si no hay red, paramos aquí: la fiesta compartida necesita internet para no partirse en copias.</div>
    `, true);
    if(await createRemote()){
      render();
      return shareSheet(shareType, pid);
    }
    openSheet(`
      <h2 class="sheet-title">Ahora mismo no hay manera</h2>
      <p class="sheet-sub">Necesitas internet para poner la fiesta en vivo y mandarla al grupo.</p>
      <div class="note">Así evitamos el lío de tener una fiesta distinta en cada teléfono. Con red, lo intentamos otra vez y arreando.</div>
      <div class="sheet-actions">
        <button class="btn btn-outline" id="closeShareBlockButton" type="button">Seguir aquí</button>
        <button class="btn btn-primary" id="retryLiveShareButton" type="button">Reintentar</button>
      </div>
    `);
    $('#closeShareBlockButton').onclick = closeSheet;
    $('#retryLiveShareButton').onclick = () => shareSheet(shareType, pid);
    return;
  }
  // If there are unsent changes, make one last push before composing the
  // message. Cap it so offline sharing does not hang for the full timeout.
  if(S.remote && S.pendingUpload && !S.party.demo){
    clearTimeout(sync.timer);
    if(sync.rejected && sync.uploadedJson){
      restoreSharedJson(sync.uploadedJson);
      render();
    } else {
      await Promise.race([upload(), new Promise(res => setTimeout(res, 1500))]);
    }
    if(S.pendingUpload){
      openSheet(`
        <h2 class="sheet-title">Poniendo todo al día</h2>
        <p class="sheet-sub">La fiesta está en vivo, pero la app está terminando de cuadrar el estado con el grupo.</p>
        <div class="note">No mandamos el enlace hasta que lo que ves aquí y lo que verá la peña sea lo mismo.</div>
        <div class="sheet-actions">
          <button class="btn btn-outline" id="closePendingShareButton" type="button">Seguir aquí</button>
          <button class="btn btn-primary" id="retryPendingShareButton" type="button">Reintentar</button>
        </div>
      `);
      $('#closePendingShareButton').onclick = closeSheet;
      $('#retryPendingShareButton').onclick = () => shareSheet(shareType, pid);
      return;
    }
  }
  const txt = shareMessage(shareType, pid);
  openSheet(`
    <h2 class="sheet-title">Mandar al grupo</h2>
    <p class="sheet-sub">Así queda el mensaje:</p>
    <div class="preview">${escapeHtml(txt)}</div>
    <div class="sheet-actions">
      <button class="btn btn-outline" id="copyMessageButton" type="button">Copiar</button>
      <button class="btn btn-green" id="whatsappMessageButton" type="button">WhatsApp</button>
    </div>
    ${navigator.share ? '<button class="quiet-link centered" id="alternateAppButton" type="button">Mandar con otra app</button>' : ''}
  `);
  $('#copyMessageButton').onclick = async () => {
    const ok = await copyToClipboard(txt);
    toast(ok ? 'Copiado. Pégalo en el grupo.' : 'No se ha podido copiar');
    if(ok) closeSheet();
  };
  $('#whatsappMessageButton').onclick = () => {
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank', 'noopener');
    closeSheet();
  };
  const alternateApp = $('#alternateAppButton');
  if(alternateApp) alternateApp.onclick = async () => {
    try { await navigator.share({text: txt}); closeSheet(); } catch(e){}
  };
}

function createPartySheet(){
  openSheet(`
    <h2 class="sheet-title">Fiesta nueva</h2>
    <div class="field" style="margin-top:14px">
      <label class="label" for="newPartyNameInput">Nombre de la fiesta</label>

    </div>

      <label class="label" for="participantNameInput">Tu nombre (te quedas la llave)</label>
      <input type="text" id="participantNameInput" placeholder="Paco" maxlength="20" autocomplete="off">
    </div>
    <div class="field">
      <label class="label" for="newPartyDateInput">Fecha (opcional)</label>
      <input type="date" id="newPartyDateInput">
    </div>
    <button class="btn btn-primary btn-block" id="createPartyButton" type="button" style="padding:14px">Crear la fiesta</button>
  `);
  $('#createPartyButton').onclick = async () => {
    const name = $('#newPartyNameInput').value.trim();
    const participantName = $('#participantNameInput').value.trim();
    if(!name) return toast('Ponle nombre a la fiesta');
    if(!participantName) return toast('Falta tu nombre');
    const newDate = $('#newPartyDateInput').value;
    if(newDate && !DATE_RE.test(newDate))
      return toast('Esa fecha no cuadra: ponla normal o déjala en blanco.');
    const btn = $('#createPartyButton');
    btn.disabled = true;
    const pid = newId('p');
    const previousParty = S;
    const draftParty = {
      v:5,
      party:{name, date: newDate || null, updatedAt:now()},
      me: pid, tab:'party', remote: null,
      people:[{id:pid, name:participantName, admin:true, updatedAt:now()}],
      items:[], settled:{}, tombstones:[],
    };
    if(previousParty){
      S = previousParty;
      backupCurrentParty();
    }
    S = draftParty;
    const liveEnabled = await createRemote();
    if(liveEnabled){
      saveLocal(); closeSheet(); render();
      shareSheet('invite');
    } else {
      S = previousParty;
      btn.disabled = false;
      render();
      internetNeeded();
    }
  };
}

function partyView(c){

  // Current next step: exactly one action based on party state.
  let action;
  if(!S.items.length && !c.total){
    action = {txt:'La lista está vacía. Apunta lo que hace falta pa la fiesta.',
      btn:'Apuntar lo que falta', target:'list'};

    action = {txt:`Hay ${unownedCount === 1 ? 'una cosa' : unownedCount + ' cosas'} sin dueño en la lista.`,
      btn:'Ver la lista', target:'list'};

    action = {txt:'Todo comprado. Solo quedan los bizums pa quedar en paz.',
      btn:'A las cuentas', target:'accounts'};

      <button class="btn btn-white btn-block" id="inviteButton" type="button">Mandar al grupo</button>
      ${canGoLive() ? `

    </div>

      <button class="btn ${action.target==='expense'?'btn-green':'btn-soft'} btn-block" id="actionButton"
        data-target="${action.target}" type="button">${action.btn}</button>

    ${myLine}
    <div class="card identity-row">
      ${me ? avatarHtml(S.me) : ''}
      <span class="who">${me ? `Eres <b>${escapeHtml(me.name)}</b>` : 'Aún no has dicho quién eres'}</span>

function listView(){
  const total = S.items.length;
  const openItems = S.items.filter(i=>i.status!=='bought').length;
  const sub = !total ? 'Apunta lo que haga falta'
    : openItems === 0 ? 'Todo comprado. Vaya máquinas.'
    : openItems === 1 ? `1 cosa por resolver de ${total}`
    : `${openItems} cosas por resolver de ${total}`;
  const admin = isAdmin();

  const cardItem = it => {
    const isBought = it.status === 'bought';

    // Bought item: green checkIcon on the left, tap to edit.
    if(isBought){
      const n = consumerIds(it).length;
      return `<div class="card item-card bought-card" data-edit="${escapeHtml(it.id)}" role="button" tabindex="0"
        aria-label="Comprada: ${escapeHtml(it.name)}, ${eur(it.priceCents||0)}. Tocar para corregirla.">
        <div class="item-row" style="align-items:center">
          <span class="bought-checkIcon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg></span>
          <div style="flex:1;min-width:0">
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="meta" style="margin-top:1px">${eur(it.priceCents||0)} · pagó ${escapeHtml(personById(it.payerId)?.name || '—')} · entre ${n===S.people.length?'todos':n}</div>
          </div>
        </div>
      </div>`;
    }

    const p = it.claimerId ? personById(it.claimerId) : null;
    const isMine = it.status==='claimed' && it.claimerId === S.me;

    let chip;
    if(isMine) chip = '<span class="status-chip chip-primary">La traes tú</span>';
    else if(p) chip = `<span class="status-chip chip-primary">La trae ${escapeHtml(p.name)}</span>`;
    else chip = '<span class="status-chip chip-neutral">Sin dueño</span>';

    const id = escapeHtml(it.id);
    let actions = '';
    if(isMine){
      actions = `<button class="btn btn-green btn-mini" data-buy="${id}" type="button">Ya está comprada</button>
        <button class="quiet-link" data-release="${id}" type="button">soltar</button>`;
    } else if(!p){
      actions = `<button class="btn btn-soft btn-mini" data-pillar="${id}" type="button">Me lo pido</button>
        <button class="quiet-link" data-buy="${id}" type="button">ya comprada</button>
        ${admin ? `<button class="btn btn-outline btn-mini" data-assign="${id}" type="button">Asignar</button>` : ''}`;
    } else if(admin){
      actions = `<button class="quiet-link" data-release="${id}" type="button">soltar</button>
        <button class="quiet-link" data-buy="${id}" type="button">apuntar precio</button>`;
    }

    const canRemove = admin || !p;
    return `<div class="card item-card">
      <div class="item-row">
        <div style="flex:1;min-width:0">
          <div class="name">${escapeHtml(it.name)}</div>

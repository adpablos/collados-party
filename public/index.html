<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>El Bote — cuentas de la peña</title>
<style>
  :root{
    --bg:#F7F6F3;
    --surface:#FFFFFF;
    --ink:#1C1B18;
    --sub:#75726B;
    --line:#E6E3DC;
    --line-suave:#EFEDE8;
    --accent:#136A52;
    --accent-tenue:#E3EDE9;
    --neg:#A8433C;
    --inverso:#FFFFFF;
    --sombra:0 1px 2px rgba(28,27,24,.05);
    --radius:12px;
    --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
    --av0:#E7E0D1;--av1:#D9E3DC;--av2:#DDE1E9;--av3:#EADDD6;--av4:#E3DEE9;--av5:#E5E8D8;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#151512;
      --surface:#1E1D1A;
      --ink:#EFEDE7;
      --sub:#9B978D;
      --line:#2F2D28;
      --line-suave:#282622;
      --accent:#5CB89A;
      --accent-tenue:#20302B;
      --neg:#D1786F;
      --inverso:#151512;
      --sombra:none;
      --av0:#3A362C;--av1:#2E3830;--av2:#2F333C;--av3:#3C322D;--av4:#353040;--av5:#343827;
    }
  }
  :root[data-theme="dark"]{
    --bg:#151512;--surface:#1E1D1A;--ink:#EFEDE7;--sub:#9B978D;--line:#2F2D28;
    --line-suave:#282622;--accent:#5CB89A;--accent-tenue:#20302B;--neg:#D1786F;
    --inverso:#151512;--sombra:none;
    --av0:#3A362C;--av1:#2E3830;--av2:#2F333C;--av3:#3C322D;--av4:#353040;--av5:#343827;
  }
  :root[data-theme="light"]{
    --bg:#F7F6F3;--surface:#FFFFFF;--ink:#1C1B18;--sub:#75726B;--line:#E6E3DC;
    --line-suave:#EFEDE8;--accent:#136A52;--accent-tenue:#E3EDE9;--neg:#A8433C;
    --inverso:#FFFFFF;--sombra:0 1px 2px rgba(28,27,24,.05);
    --av0:#E7E0D1;--av1:#D9E3DC;--av2:#DDE1E9;--av3:#EADDD6;--av4:#E3DEE9;--av5:#E5E8D8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    min-height:100dvh;
    font-size:15px;
    line-height:1.45;
  }
  #app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  body.modo-crear #tabbar,
  body.modo-crear .yo-chip,
  body.modo-crear .menu-btn,
  body.modo-crear .fiesta-nombre,
  body.modo-crear .fiesta-sub{display:none}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- cabecera ---------- */
  header{padding:22px 20px 8px}
  .fila-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .fila-acciones-top{display:flex;gap:8px;align-items:center}
  .marca{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
  .fiesta-nombre{
    font-size:clamp(22px,6vw,27px);font-weight:700;letter-spacing:-.02em;
    line-height:1.15;margin:14px 0 3px;text-wrap:balance;
  }
  .fiesta-sub{color:var(--sub);font-size:13.5px}
  .fiesta-sub b{color:var(--ink);font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600}
  .yo-chip{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--surface);border-radius:999px;
    padding:4px 12px 4px 5px;font-size:13px;font-weight:600;cursor:pointer;
  }
  .yo-chip .avatar{width:22px;height:22px;font-size:10px}
  .menu-btn{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:var(--surface);cursor:pointer;line-height:1;padding:0;
    display:inline-flex;align-items:center;justify-content:center;color:var(--sub);
  }

  /* ---------- pestañas ---------- */
  main{flex:1;padding:4px 20px 104px;overflow-x:hidden}
  body.modo-crear main{padding-bottom:30px}
  nav#tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:var(--surface);
    border-top:1px solid var(--line);
    padding:6px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar-in{max-width:520px;margin:0 auto;display:flex}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--sub);
    font-size:11px;font-weight:600;padding:8px 4px 5px;cursor:pointer;position:relative;
  }
  .tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.activa{color:var(--accent)}
  .tab .badge{
    position:absolute;top:4px;right:calc(50% - 24px);
    background:var(--accent);color:var(--inverso);font-size:9.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
  }

  /* ---------- comunes ---------- */
  .seccion{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--sub);margin:26px 2px 10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:8px;box-shadow:var(--sombra)}
  .avatar{
    width:30px;height:30px;border-radius:999px;display:inline-flex;align-items:center;
    justify-content:center;font-weight:700;font-size:11.5px;color:var(--ink);flex:none;
    background:var(--line-suave);
  }
  .av-0{background:var(--av0)}.av-1{background:var(--av1)}.av-2{background:var(--av2)}
  .av-3{background:var(--av3)}.av-4{background:var(--av4)}.av-5{background:var(--av5)}
  .btn{
    border:none;border-radius:10px;padding:10px 15px;font-size:14px;
    font-weight:600;cursor:pointer;
  }
  .btn-primario{background:var(--ink);color:var(--inverso)}
  .btn-acento{background:var(--accent);color:var(--inverso)}
  .btn-fantasma{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn-mini{padding:7px 12px;font-size:13px;border-radius:9px}
  .btn-block{width:100%}
  input[type=text],input[type=tel],input[type=date],textarea{
    font-family:inherit;font-size:16px;background:var(--surface);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:11px 13px;width:100%;
  }
  input[type=date]{min-height:46px}
  textarea{resize:vertical;min-height:96px}
  input::placeholder,textarea::placeholder{color:var(--sub);opacity:.7}
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .fila-add{display:flex;gap:8px;margin-bottom:6px}
  .fila-add input{flex:1;min-width:0}
  .campo{margin-bottom:16px}
  .campo-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--sub);display:block;margin:18px 0 7px}
  .campo .campo-label{margin-top:0}
  .tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid var(--line);border-radius:5px;padding:2px 6px;color:var(--sub)}
  .tag-acento{border-color:transparent;background:var(--accent-tenue);color:var(--accent)}

  /* ---------- crear ---------- */
  .crear{padding:34px 0 10px}
  .crear h1{font-size:clamp(24px,7vw,30px);font-weight:700;letter-spacing:-.02em;
    margin:0 0 10px;line-height:1.15;text-wrap:balance;max-width:22ch}
  .crear .intro{color:var(--sub);font-size:15px;margin:0 0 30px;max-width:44ch}
  .crear .alt{display:flex;flex-direction:column;gap:10px;margin-top:28px}
  .link-suave{background:none;border:none;color:var(--sub);
    font-size:14px;font-weight:600;cursor:pointer;text-decoration:underline;
    text-underline-offset:3px;padding:6px}

  /* ---------- lista ---------- */
  .progreso{margin:14px 2px 0}
  .progreso .txt{display:flex;justify-content:space-between;font-size:13px;color:var(--sub);margin-bottom:7px}
  .progreso .txt b{color:var(--ink);font-weight:600}
  .barra{height:4px;background:var(--line);border-radius:99px;overflow:hidden}
  .barra > i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .4s}
  .item{display:flex;align-items:center;gap:12px}
  .item .info{flex:1;min-width:0}
  .item .nombre{font-weight:600;font-size:15px;line-height:1.3}
  .item .meta{font-size:13px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .item .precio{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;
    font-size:14.5px;white-space:nowrap}
  .item .acciones{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .card.comprada-card{cursor:pointer}
  .card.comprada-card:active{background:var(--line-suave)}
  .mini-avatares{display:flex}
  .mini-avatares .avatar{width:18px;height:18px;font-size:8px;margin-left:-5px;border:2px solid var(--surface)}
  .mini-avatares .avatar:first-child{margin-left:0}
  .quitar{background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;
    padding:6px;line-height:1;opacity:.7}
  .vacio{text-align:center;color:var(--sub);padding:38px 20px;font-size:14px;line-height:1.55}

  /* ---------- peña ---------- */
  .persona{display:flex;align-items:center;gap:12px}
  .persona .info{flex:1;min-width:0}
  .persona .nombre{font-weight:600;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .persona .meta{font-size:13px;color:var(--sub)}
  .persona .meta b{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600}
  .card.persona-card{cursor:pointer}
  .card.persona-card:active{background:var(--line-suave)}
  .flecha{color:var(--sub);font-size:16px}
  .invitar{
    width:100%;border:1px dashed var(--line);background:transparent;border-radius:var(--radius);
    color:var(--accent);font-size:14px;font-weight:600;padding:14px;cursor:pointer;margin-top:6px;
  }

  /* ---------- cuentas ---------- */
  .resumen{padding:4px 16px}
  .res-fila{display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:12px 0;border-bottom:1px solid var(--line-suave)}
  .res-fila:last-child{border-bottom:none}
  .res-fila .l{min-width:0}
  .res-fila .l small{display:block;color:var(--sub);font-size:12px;margin-top:1px}
  .res-fila .r{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;
    font-size:14.5px;white-space:nowrap}
  .res-fila.total{padding:14px 0}
  .res-fila.total .l{font-weight:600}
  .res-fila.total .r{font-size:17px;font-weight:700}
  .sube{color:var(--accent)}
  .baja{color:var(--neg)}
  .neutro{color:var(--sub)}

  .bizum{display:flex;align-items:center;gap:11px}
  .bizum .quien{flex:1;font-size:14.5px;font-weight:600;line-height:1.3;min-width:0}
  .bizum .quien .fl{color:var(--sub);font-weight:400;padding:0 2px}
  .bizum .cuanto{font-family:var(--mono);font-variant-numeric:tabular-nums;font-weight:600;font-size:15px}
  .bizum.hecho .quien,.bizum.hecho .cuanto{text-decoration:line-through;opacity:.4}
  .enpaz{
    background:var(--accent-tenue);border:1px solid transparent;
    border-radius:var(--radius);padding:16px;margin-bottom:8px;
  }
  .enpaz .t{font-size:15px;font-weight:700;color:var(--accent)}
  .enpaz .s{font-size:13.5px;color:var(--sub);margin-top:2px}

  /* ---------- sheet ---------- */
  #velo{position:fixed;inset:0;background:rgba(20,18,14,.45);z-index:60;opacity:0;
    pointer-events:none;transition:opacity .2s}
  #velo.abierto{opacity:1;pointer-events:auto}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--surface);
    border-radius:16px 16px 0 0;border-top:1px solid var(--line);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:520px;margin:0 auto;transform:translateY(105%);transition:transform .25s;
    max-height:85dvh;overflow-y:auto;
  }
  #sheet.abierto{transform:translateY(0)}
  .asa{width:36px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 16px}
  .sheet-titulo{font-size:18px;font-weight:700;letter-spacing:-.01em;margin:0 0 3px;text-wrap:balance}
  .sheet-sub{color:var(--sub);font-size:13.5px;margin:0 0 14px;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--surface);border-radius:999px;padding:6px 13px 6px 6px;
    font-size:13.5px;font-weight:600;cursor:pointer;transition:border-color .12s,background .12s;
  }
  .chip .avatar{width:22px;height:22px;font-size:9.5px}
  .chip.on{border-color:var(--accent);background:var(--accent-tenue)}
  .chip.off{opacity:.4}
  .chip.solo-texto{padding:6px 13px}
  .precio-input{display:flex;align-items:center;gap:10px}
  .precio-input input{font-family:var(--mono);font-size:24px;font-weight:600;text-align:right;
    font-variant-numeric:tabular-nums}
  .precio-input .eur{font-size:19px;font-weight:600;color:var(--sub)}
  .sheet-botones{display:flex;gap:10px;margin-top:22px}
  .sheet-botones .btn{flex:1}
  .link-borrar{background:none;border:none;color:var(--neg);font-size:13.5px;
    font-weight:600;margin:16px auto 0;display:block;cursor:pointer}
  .opcion-menu{
    display:block;width:100%;background:var(--surface);
    border:1px solid var(--line);border-radius:10px;
    font-size:14.5px;font-weight:600;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;
  }
  .opcion-menu small{display:block;font-weight:400;color:var(--sub);font-size:12.5px;margin-top:2px}
  .nota{border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:11px 13px;font-size:13px;color:var(--sub);line-height:1.5;margin-top:16px}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;bottom:92px;left:50%;transform:translate(-50%,16px);z-index:70;
    background:var(--ink);color:var(--inverso);font-size:13.5px;font-weight:500;
    padding:10px 17px;border-radius:9px;opacity:0;transition:.25s;pointer-events:none;
    max-width:86vw;text-align:center;
  }
  #toast.ver{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="fila-top">
      <span class="marca">El Bote</span>
      <div class="fila-acciones-top">
        <button class="yo-chip" id="yoChip" type="button"></button>
        <button class="menu-btn" id="btnMenu" type="button" aria-label="Menú">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="1.4"/><circle cx="8" cy="8" r="1.4"/><circle cx="13" cy="8" r="1.4"/></svg>
        </button>
      </div>
    </div>
    <div class="fiesta-nombre" id="fiestaNombre"></div>
    <div class="fiesta-sub" id="fiestaSub"></div>
  </header>
  <main id="vista"></main>
  <nav id="tabbar">
    <div class="tabbar-in">
      <button class="tab" data-tab="lista" type="button">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
        Lista</button>
      <button class="tab" data-tab="pena" type="button">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.8-4.8 5.5-4.8s4.9 1.8 5.5 4.8"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.4c2.3.2 4 1.7 4.5 4.1"/></svg>
        Peña</button>
      <button class="tab" data-tab="cuentas" type="button">
        <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-2-1.4L14 21l-2-1.4L10 21l-2-1.4L6 21z"/><path d="M9.5 8.5h5M9.5 12.5h5"/></svg>
        Cuentas<span class="badge" id="badgeCuentas" hidden></span></button>
    </div>
  </nav>
</div>

<div id="velo"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toast" role="status"></div>

<script>
'use strict';
/* ================= estado ================= */
const CLAVE = 'el-bote-proto-v2';
const CLAVE_V1 = 'el-bote-proto-v1';

function demo(){
  return {
    v:2,
    fiesta: {nombre:'Piscina en casa de Edu', fecha:null, ejemplo:true},
    yo: null,
    tab: 'lista',
    gente: [
      {id:'p1', nombre:'Edu',    admin:true},
      {id:'p2', nombre:'Marta',  admin:true},
      {id:'p3', nombre:'Paco',   admin:false},
      {id:'p4', nombre:'Lucía',  admin:false},
      {id:'p5', nombre:'Andrés', admin:false},
    ],
    items: [
      {id:'i1', nombre:'Hielo (3 bolsas)',            estado:'comprada',  compradorId:'p3', precio:450,  consumen:null},
      {id:'i2', nombre:'Cervezas (2 cajas)',          estado:'comprada',  compradorId:'p1', precio:1840, consumen:['p1','p2','p3','p5']},
      {id:'i3', nombre:'Carbón y pastillas',          estado:'comprada',  compradorId:'p5', precio:995,  consumen:null},
      {id:'i4', nombre:'Vasos, platos y servilletas', estado:'comprada',  compradorId:'p2', precio:620,  consumen:null},
      {id:'i5', nombre:'Sandía',                      estado:'pillada',   pilladorId:'p2'},
      {id:'i6', nombre:'Carne para la barbacoa',      estado:'pillada',   pilladorId:'p1'},
      {id:'i7', nombre:'Tinto de verano (5 L)',       estado:'pendiente'},
      {id:'i8', nombre:'Panes de hamburguesa',        estado:'pendiente'},
      {id:'i9', nombre:'Nachos y guacamole',          estado:'pendiente'},
    ],
    saldados: {},
  };
}

let S = null;
try {
  S = JSON.parse(localStorage.getItem(CLAVE));
  if(!S){
    const v1 = JSON.parse(localStorage.getItem(CLAVE_V1));
    if(v1 && v1.gente){
      v1.v = 2;
      v1.fiesta = {nombre: String(v1.fiesta || 'Nuestra fiesta'), fecha:null, ejemplo:true};
      v1.gente.forEach((p,i) => p.admin = i < 2);
      S = v1;
    }
  }
} catch(e){ S = null; }

function guardar(){ try{ localStorage.setItem(CLAVE, JSON.stringify(S)); }catch(e){} }

/* ================= utilidades ================= */
const $ = sel => document.querySelector(sel);
const eur = c => (c/100).toLocaleString('es-ES',{style:'currency',currency:'EUR'});
const persona = id => S && S.gente.find(p=>p.id===id);
const iniciales = n => n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const consumidores = it => (it.consumen && it.consumen.length ? it.consumen : S.gente.map(p=>p.id));
const soyAdmin = () => { const p = persona(S && S.yo); return !!(p && p.admin); };
const numAdmins = () => S.gente.filter(p=>p.admin).length;
let uid = 0;
const nuevoId = pre => pre + Date.now().toString(36) + (uid++);

function fechaBonita(f){
  if(!f) return null;
  try {
    const d = new Date(f + 'T12:00:00');
    if(isNaN(d)) return null;
    return d.toLocaleDateString('es-ES',{weekday:'long', day:'numeric', month:'long'});
  } catch(e){ return null; }
}

function avatarHtml(id, cls){
  const p = persona(id); if(!p) return '';
  const idx = Math.max(0, S.gente.findIndex(x=>x.id===id)) % 6;
  return `<span class="avatar av-${idx} ${cls||''}">${esc(iniciales(p.nombre))}</span>`;
}
const tagAdmin = p => p.admin ? '<span class="tag">Admin</span>' : '';

let toastTimer;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('ver');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('ver'), 2400);
}

async function copiar(txt){
  try { await navigator.clipboard.writeText(txt); return true; }
  catch(e){
    try {
      const ta = document.createElement('textarea');
      ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy');
      ta.remove(); return ok;
    } catch(e2){ return false; }
  }
}

/* ================= código de fiesta (compartir) ================= */
function codigoFiesta(){
  const limpio = {...S, yo:null, tab:'lista'};
  const json = JSON.stringify(limpio);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return 'EB1:' + b64;
}
function decodificar(texto){
  const m = String(texto).match(/EB1:([A-Za-z0-9_-]+)/);
  if(!m) return null;
  try {
    let b64 = m[1].replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const obj = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!obj || !obj.gente || !obj.items || !obj.fiesta) return null;
    obj.yo = null; obj.tab = 'lista'; obj.v = 2;
    return obj;
  } catch(e){ return null; }
}
function importarCodigo(texto){
  const obj = decodificar(texto);
  if(!obj) return false;
  S = obj; guardar(); pintar(); sheetIdentidad(true);
  return true;
}

/* ================= cálculo de cuentas ================= */
function cuentas(){
  const pagado = {}, debe = {};
  S.gente.forEach(p => { pagado[p.id]=0; debe[p.id]=0; });
  let total = 0;
  for(const it of S.items){
    if(it.estado !== 'comprada' || !it.precio) continue;
    total += it.precio;
    if(pagado[it.compradorId] !== undefined) pagado[it.compradorId] += it.precio;
    const cons = consumidores(it).filter(id => debe[id] !== undefined);
    if(!cons.length) continue;
    const base = Math.floor(it.precio / cons.length);
    let resto = it.precio - base*cons.length;
    for(const id of cons){ debe[id] += base + (resto-- > 0 ? 1 : 0); }
  }
  const saldo = {};
  S.gente.forEach(p => saldo[p.id] = pagado[p.id] - debe[p.id]);

  const deudores = S.gente.filter(p=>saldo[p.id]<0).map(p=>({id:p.id, v:-saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const acreedores = S.gente.filter(p=>saldo[p.id]>0).map(p=>({id:p.id, v:saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const bizums = [];
  let i=0, j=0;
  while(i<deudores.length && j<acreedores.length){
    const m = Math.min(deudores[i].v, acreedores[j].v);
    if(m>0) bizums.push({de:deudores[i].id, a:acreedores[j].id, cents:m});
    deudores[i].v -= m; acreedores[j].v -= m;
    if(deudores[i].v===0) i++;
    if(acreedores[j].v===0) j++;
  }
  return {total, pagado, debe, saldo, bizums};
}

       <div class="chips" id="chipsComprador">${S.gente.map(p => `

  const precioIni = editando && it.precio ? (it.precio/100).toFixed(2).replace('.',',') : '';

    <p class="sheet-sub">${editando ? 'Corrige el precio, quién lo pagó o quién lo consume.' : 'Apunta lo que ha costado.'}</p>

      <input type="tel" id="inPrecio" inputmode="decimal" placeholder="0,00" value="${precioIni}" autocomplete="off">
      <span class="eur">EUR</span>
    </div>
    <span class="campo-label">Lo consumen</span>
    <div class="chips" id="chipsCons">${chipsCons}</div>
    ${filaComprador}
    <div class="sheet-botones">
      <button class="btn btn-fantasma" id="btnCancelar" type="button">Cancelar</button>
      <button class="btn btn-primario" id="btnGuardarCompra" type="button">${editando?'Guardar':'Apuntar compra'}</button>
    </div>
    ${editando ? '<button class="link-borrar" id="btnBorrarItem" type="button">Borrar este artículo</button>' : ''}
  `);
  document.querySelectorAll('[data-cons]').forEach(b => b.onclick = () => {
    const id = b.dataset.cons;
    if(marcados.has(id)){
      if(marcados.size === 1) return toast('Tiene que consumirlo al menos una persona');
      marcados.delete(id);
    } else marcados.add(id);
    b.classList.toggle('on', marcados.has(id));
    b.classList.toggle('off', !marcados.has(id));
  });
  document.querySelectorAll('[data-comp]').forEach(b => b.onclick = () => {
    compradorSel = b.dataset.comp;
    document.querySelectorAll('[data-comp]').forEach(x =>
      x.classList.toggle('on', x.dataset.comp === compradorSel));
  });
  $('#btnCancelar').onclick = cerrarSheet;
  $('#btnGuardarCompra').onclick = () => {
    const bruto = $('#inPrecio').value.trim().replace(',','.');
    const val = Math.round(parseFloat(bruto)*100);
    if(!bruto || isNaN(val) || val<=0) return toast('Falta el precio');
    it.precio = val;
    it.consumen = marcados.size === S.gente.length ? null : [...marcados];
    it.compradorId = compradorSel;
    if(!editando){
      it.estado = 'comprada';
      delete it.pilladorId;
      toast('Apuntado: ' + eur(val));
    } else {
      toast('Guardado');
    }
    guardar(); cerrarSheet(); pintar();
  };
  const del = $('#btnBorrarItem');
  if(del) del.onclick = () => {
    S.items = S.items.filter(x=>x.id!==itemId);
    guardar(); cerrarSheet(); pintar(); toast('Artículo borrado');
  };
  setTimeout(()=>$('#inPrecio').focus(), 250);
}

    ${puedoGestionar ? `

      <button class="opcion-menu" id="btnToggleAdmin" type="button">
        ${p.admin ? 'Quitarle el rol de admin' : 'Hacer admin'}
        <small>Los admins asignan compras, corrigen precios y gestionan la peña.</small>
      </button>
      <button class="opcion-menu" id="btnEliminar" type="button">
        Quitar de la peña
        <small>Solo si no tiene compras apuntadas.</small>
      </button>` : ''}
  `);
  const rec = $('#btnRecordar');
  if(rec) rec.onclick = async () => {
    const txt = `${p.nombre}, para «${S.fiesta.nombre}» te toca traer:\n` +
      asignadas.map(i=>'· '+i.nombre).join('\n');
    await copiar(txt);
    toast('Recordatorio copiado');
  };
  const tog = $('#btnToggleAdmin');
  if(tog) tog.onclick = () => {
    if(p.admin && numAdmins() === 1) return toast('Tiene que quedar al menos un admin');
    p.admin = !p.admin;
    guardar(); cerrarSheet(); pintar();
    toast(p.admin ? p.nombre + ' ahora es admin' : p.nombre + ' ya no es admin');
  };
  const eli = $('#btnEliminar');
  if(eli) eli.onclick = () => {
    if(compras.length) return toast('Tiene compras apuntadas: reasígnalas antes');
    if(p.admin && numAdmins() === 1) return toast('Tiene que quedar al menos un admin');
    S.items.forEach(i => {
      if(i.pilladorId === pid){ i.estado='pendiente'; delete i.pilladorId; }
      if(i.consumen) i.consumen = i.consumen.filter(x=>x!==pid);
    });
    S.gente = S.gente.filter(x=>x.id!==pid);
    guardar(); cerrarSheet(); pintar();
    toast(p.nombre + ' ya no está en la peña');
  };
}

    <form class="fila-add" id="formAddItem">
      <input type="text" id="inItem" placeholder="¿Qué falta?" maxlength="40" autocomplete="off">
      <button class="btn btn-primario" type="submit">Añadir</button>
    </form>
    ${S.items.length ? `<div class="seccion">Por comprar · ${porComprar.length}</div>` : ''}
    ${!S.items.length
      ? '<div class="vacio">La lista está vacía.<br>Añade lo primero que haga falta para la fiesta.</div>'
      : (porComprar.length ? porComprar.map(cardPend).join('')
        : '<div class="vacio">Todo comprado.</div>')}
    ${compradas.length ? `<div class="seccion">Compradas · ${compradas.length}</div>` + compradas.map(cardComp).join('') : ''}
  `;
}

function vistaPena(){
  const c = cuentas();
  const filas = S.gente.map(p => {
    const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===p.id).length;
    return `
    <div class="card persona-card" data-persona="${p.id}"><div class="persona">
      ${avatarHtml(p.id)}
      <div class="info">
        <div class="nombre">${esc(p.nombre)}
          ${tagAdmin(p)}
          ${p.id===S.yo?'<span class="tag tag-acento">Tú</span>':''}</div>
        <div class="meta">ha pagado <b>${eur(c.pagado[p.id]||0)}</b>${asignadas?` · le toca traer ${asignadas}`:''}</div>
      </div>
      <span class="flecha">›</span>
    </div></div>`;
  }).join('');
  return `
    <div class="seccion">La peña · ${S.gente.length}</div>
    ${filas}
    <form class="fila-add" id="formAddPersona" style="margin-top:16px">
      <input type="text" id="inPersona" placeholder="Añadir a alguien" maxlength="20" autocomplete="off">
      <button class="btn btn-primario" type="submit">Añadir</button>
    </form>
    <button class="invitar" id="btnInvitar" type="button">Invitar a la peña por WhatsApp</button>
  `;
}

function vistaCuentas(){
  const c = cuentas();
  if(c.total === 0){
    return `<div class="vacio">Aún no hay gastos apuntados.<br>
      En cuanto la peña compre cosas, aquí salen las cuentas.</div>`;
  }
  const filas = S.gente.map(p => {
    const s = c.saldo[p.id];
    const cls = s>0?'sube':(s<0?'baja':'neutro');
    const signo = s>0?'+':'';
    return `<div class="res-fila">
      <span class="l">${esc(p.nombre)}<small>pagó ${eur(c.pagado[p.id])} · le toca ${eur(c.debe[p.id])}</small></span>
      <span class="r ${cls}">${signo}${eur(s)}</span>
    </div>`;
  }).join('');

  const pendientes = c.bizums.filter(b => !S.saldados[b.de+'>'+b.a]);
  const bizumsHtml = c.bizums.length ? c.bizums.map(b => {
    const key = b.de+'>'+b.a, hecho = !!S.saldados[key];
    return `<div class="card bizum ${hecho?'hecho':''}">
      ${avatarHtml(b.de)}
      <div class="quien">${esc(persona(b.de).nombre)}<span class="fl">→</span>${esc(persona(b.a).nombre)}</div>
      <span class="cuanto">${eur(b.cents)}</span>
      <button class="btn ${hecho?'btn-fantasma':'btn-acento'} btn-mini" data-bizum="${key}" type="button">
        ${hecho?'Deshacer':'Pagado'}</button>
    </div>`;
  }).join('') : '';

  const enPaz = c.bizums.length>0 && pendientes.length===0;

  return `
    <div class="seccion">Resumen</div>
    <div class="card resumen">
      <div class="res-fila total"><span class="l">Total de la fiesta</span><span class="r">${eur(c.total)}</span></div>
      ${filas}
    </div>
    ${enPaz ? `<div class="enpaz" style="margin-top:16px"><div class="t">Cuentas en paz</div>
      <div class="s">Nadie debe nada a nadie.</div></div>` : ''}
    ${c.bizums.length ? `<div class="seccion">Pagos para quedar en paz · ${pendientes.length}</div>${bizumsHtml}` : ''}
    <button class="btn btn-fantasma btn-block" id="btnCompartirCuentas" type="button" style="margin-top:10px">
      Compartir cuentas por WhatsApp</button>
  `;
}

/* ================= pintar ================= */
function pintar(){
  document.body.classList.toggle('modo-crear', !S);
  const v = $('#vista');
  if(!S){
    $('#fiestaNombre').textContent = '';
    $('#fiestaSub').textContent = '';
    v.innerHTML = vistaCrear();
    conectarCrear(v);
    return;
  }
  const c = cuentas();
  $('#fiestaNombre').textContent = S.fiesta.nombre;
  const f = fechaBonita(S.fiesta.fecha);
  $('#fiestaSub').innerHTML =
    `${f ? esc(f) + ' · ' : ''}${S.gente.length} en la peña · <b>${eur(c.total)}</b> en total`;
  const yo = persona(S.yo);
  $('#yoChip').innerHTML = yo
    ? `${avatarHtml(yo.id)} ${esc(yo.nombre)}`
    : '¿Quién eres?';

  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('activa', t.dataset.tab === S.tab));
  const pend = c.bizums.filter(b=>!S.saldados[b.de+'>'+b.a]).length;
  const badge = $('#badgeCuentas');
  badge.hidden = pend===0;
  badge.textContent = pend;

  v.innerHTML = S.tab==='lista' ? vistaLista() : S.tab==='pena' ? vistaPena() : vistaCuentas();
  conectar(v);
}

function conectarCrear(v){
  v.querySelector('#btnCrearFiesta').onclick = () => {
    const nombre = v.querySelector('#inFiestaNueva').value.trim();
    const tu = v.querySelector('#inTuNombre').value.trim();
    if(!nombre) return toast('Ponle nombre a la fiesta');
    if(!tu) return toast('Falta tu nombre');
    const pid = nuevoId('p');
    S = {
      v:2,
      fiesta:{nombre, fecha: v.querySelector('#inFechaNueva').value || null},
      yo: pid, tab:'lista',
      gente:[{id:pid, nombre:tu, admin:true}],
      items:[], saldados:{},
    };
    guardar(); pintar();
    toast('Fiesta creada. Añade la lista e invita a la peña');
  };
  v.querySelector('#btnTengoInv').onclick = () => sheetInvitacion();
  v.querySelector('#btnVerEjemplo').onclick = () => {
    S = demo(); guardar(); pintar(); sheetIdentidad(true);
  };
}

function conectar(v){
  const on = (sel, ev, fn) => { const el = v.querySelector(sel); if(el) el.addEventListener(ev, fn); };

  on('#formAddItem','submit', e => {
    e.preventDefault();
    const n = v.querySelector('#inItem').value.trim();
    if(!n) return;
    S.items.unshift({id:nuevoId('i'), nombre:n, estado:'pendiente'});
    guardar(); pintar(); toast('«' + n + '» añadido');
  });
  on('#formAddPersona','submit', e => {
    e.preventDefault();
    const n = v.querySelector('#inPersona').value.trim();
    if(!n) return;
    S.gente.push({id:nuevoId('p'), nombre:n, admin:false});
    guardar(); pintar(); toast(n + ' se une a la peña');
  });
  on('#btnInvitar','click', () => sheetCompartir());
  on('#btnCompartirCuentas','click', async () => {
    const c = cuentas();
    const lineas = ['Cuentas de «' + S.fiesta.nombre + '» — El Bote',
      'Total: ' + eur(c.total) + ' entre ' + S.gente.length, ''];
    c.bizums.forEach(b => lineas.push(
      (S.saldados[b.de+'>'+b.a]?'✓ ':'· ') +
      persona(b.de).nombre + ' → ' + persona(b.a).nombre + ': ' + eur(b.cents)));
    if(!c.bizums.length) lineas.push('Cuentas en paz.');
    const txt = lineas.join('\n');
    let compartido = false;
    if(navigator.share){
      try { await navigator.share({text: txt}); compartido = true; } catch(e){}
    }
    if(!compartido){
      const ok = await copiar(txt);
      toast(ok ? 'Cuentas copiadas' : 'No se ha podido copiar');
    }
  });

  v.querySelectorAll('[data-pillar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    const it = S.items.find(x=>x.id===b.dataset.pillar);
    it.estado='pillada'; it.pilladorId=S.yo;
    guardar(); pintar(); toast('Apuntado: lo traes tú');
  });
  v.querySelectorAll('[data-soltar]').forEach(b => b.onclick = () => {
    const it = S.items.find(x=>x.id===b.dataset.soltar);
    it.estado='pendiente'; delete it.pilladorId;
    guardar(); pintar();
  });
  v.querySelectorAll('[data-asignar]').forEach(b => b.onclick = () => {
    if(!soyAdmin()) return toast('Solo los admins pueden asignar');
    sheetAsignar(b.dataset.asignar);
  });
  v.querySelectorAll('[data-comprar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    sheetCompra(b.dataset.comprar);
  });
  v.querySelectorAll('[data-editar]').forEach(card => card.onclick = () => {
    const it = S.items.find(x=>x.id===card.dataset.editar);
    if(!it) return;
    if(!soyAdmin() && it.compradorId !== S.yo){
      const quien = persona(it.compradorId);
      return toast('Solo ' + (quien?quien.nombre:'quien lo pagó') + ' o un admin pueden editarlo');
    }
    sheetCompra(card.dataset.editar);
  });
  v.querySelectorAll('[data-quitar]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    S.items = S.items.filter(x=>x.id!==b.dataset.quitar);
    guardar(); pintar();
  });
  v.querySelectorAll('[data-persona]').forEach(card => card.onclick = () => sheetPersona(card.dataset.persona));
  v.querySelectorAll('[data-bizum]').forEach(b => b.onclick = () => {
    const key = b.dataset.bizum;
    if(S.saldados[key]) delete S.saldados[key];
    else {
      S.saldados[key] = true;
      const c = cuentas();
      if(c.bizums.every(x=>S.saldados[x.de+'>'+x.a])) toast('Cuentas en paz');
      else toast('Pago apuntado');
    }
    guardar(); pintar();
  });
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if(!S) return;
  S.tab = t.dataset.tab; guardar(); pintar();
}));
$('#yoChip').addEventListener('click', () => { if(S) sheetIdentidad(false); });
$('#btnMenu').addEventListener('click', () => { if(S) sheetMenu(); });

/* invitación por enlace (#f=…) por si el navegador conserva el hash */
(function(){
  if(location.hash && location.hash.length > 4){
    const obj = decodificar(decodeURIComponent(location.hash.slice(1)));
    if(obj){
      S = obj; guardar();
      try { history.replaceState(null,'',location.pathname + location.search); } catch(e){}
    }
  }
})();

pintar();
if(S && !S.yo) sheetIdentidad(true);
</script>
</body>
</html>

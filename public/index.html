<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>A Pachas — los gastos de la peña</title>
<meta name="description" content="Los gastos de la peña, a partes iguales. Ni pa ti ni pa mí.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Ccircle cx='24' cy='24' r='19' stroke='%232E6E9E' stroke-width='4.5'/%3E%3Cg stroke='%232E6E9E' stroke-width='4.5' stroke-linecap='round'%3E%3Cline x1='24' y1='24' x2='24' y2='5'/%3E%3Cline x1='24' y1='24' x2='42.1' y2='18.1'/%3E%3Cline x1='24' y1='24' x2='35.2' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='12.8' y2='39.4'/%3E%3Cline x1='24' y1='24' x2='5.9' y2='18.1'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EFE7D8;
    --card:#FBF7ED;
    --ink:#2B251C;
    --muted:#80735C;
    --line:#E0D5BE;
    --sky:#2E6E9E;
    --onsky:#FFFFFF;
    --skysoft:#DCE7EE;
    --green:#57704E;
    --greensoft:#E3E9DA;
    --terra:#A64B2A;
    --terrasoft:#F1E0D3;
    --chip:#E8DDC5;
    --velo:rgba(24,19,11,.45);
    --radius:14px;
    --display:'Bricolage Grotesque',system-ui,-apple-system,sans-serif;
    --texto:'Instrument Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1D1811; --card:#292219; --ink:#F0E8D6; --muted:#A2947B; --line:#3B3224;
      --sky:#7FB0D9; --onsky:#14212C; --skysoft:#26333E;
      --green:#98B089; --greensoft:#2B3524; --terra:#D98F66; --terrasoft:#3B2A1E;
      --chip:#352D1F; --velo:rgba(0,0,0,.55);
    }
  }
  :root[data-theme="light"]{
    --bg:#EFE7D8; --card:#FBF7ED; --ink:#2B251C; --muted:#80735C; --line:#E0D5BE;
    --sky:#2E6E9E; --onsky:#FFFFFF; --skysoft:#DCE7EE;
    --green:#57704E; --greensoft:#E3E9DA; --terra:#A64B2A; --terrasoft:#F1E0D3;
    --chip:#E8DDC5; --velo:rgba(24,19,11,.45);
  }
  :root[data-theme="dark"]{
    --bg:#1D1811; --card:#292219; --ink:#F0E8D6; --muted:#A2947B; --line:#3B3224;
    --sky:#7FB0D9; --onsky:#14212C; --skysoft:#26333E;
    --green:#98B089; --greensoft:#2B3524; --terra:#D98F66; --terrasoft:#3B2A1E;
    --chip:#352D1F; --velo:rgba(0,0,0,.55);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:var(--texto);
    font-size:15px; line-height:1.45;
    min-height:100dvh;
  }
  #app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
  main{flex:1;padding:14px 20px 104px;overflow-x:hidden}
  body.sin-fiesta #tabbar{display:none}
  body.sin-fiesta main{padding-bottom:30px}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--sky);outline-offset:2px}

  /* ---------- botón tema ---------- */
  #btnTema{
    /* absolute y no fixed: al hacer scroll se va con la página en vez de
       quedarse flotando encima de las cards */
    position:absolute;top:14px;right:14px;z-index:50;
    width:38px;height:38px;border-radius:999px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--muted);
  }
  #btnTema svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round}

  /* ---------- cabeceras de pantalla ---------- */
  .cabecera{margin:18px 2px 16px}
  .cabecera h1{font-family:var(--display);font-size:26px;font-weight:700;margin:0;line-height:1.15}
  .cabecera .sub{color:var(--muted);font-size:13px;margin-top:3px}

  /* ---------- hero (Fiesta) ---------- */
  .hero{text-align:center;padding:34px 0 6px}
  .hero .logo{color:var(--sky)}
  .hero .logo svg{width:76px;height:76px}
  .hero h1{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.5px;margin:10px 0 6px}
  .hero .lema{color:var(--muted);font-size:14px;line-height:1.5;margin:0 auto 24px;max-width:34ch}

  /* ---------- comunes ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px}
  .label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);display:block;margin:16px 0 7px}
  .card .label:first-child, .campo .label{margin-top:0}
  .btn{border:none;border-radius:11px;padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer}
  .btn-sky{background:var(--sky);color:var(--onsky)}
  .btn-green{background:var(--green);color:var(--onsky)}
  .btn-soft{background:var(--skysoft);color:var(--sky)}
  .btn-borde{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn-mini{padding:8px 13px;font-size:13.5px;border-radius:9px}
  .btn-block{width:100%}
  .link-quieto{background:none;border:none;color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 2px}
  input[type=text],input[type=tel],input[type=date],textarea{
    font-family:inherit;font-size:16px;background:var(--card);color:var(--ink);
    border:1px solid var(--line);border-radius:11px;padding:12px 13px;width:100%;
  }
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:.75}
  input:focus,textarea:focus{outline:none;border-color:var(--sky)}
  input[type=date]{min-height:47px}
  textarea{resize:vertical;min-height:90px}
  .fila-add{display:flex;gap:8px;margin-bottom:14px}
  .fila-add input{flex:1;min-width:0}
  .campo{margin-bottom:16px}
  .vacio{text-align:center;color:var(--muted);padding:36px 20px;font-size:14px;line-height:1.6}
  .avatar{
    width:40px;height:40px;border-radius:999px;background:var(--chip);flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:16px;
  }
  .avatar.mini{width:24px;height:24px;font-size:11px}
  .chip-estado{font-size:12px;font-weight:600;border-radius:999px;padding:4px 10px;white-space:nowrap}
  .chip-neutro{background:var(--chip);color:var(--muted)}
  .chip-sky{background:var(--skysoft);color:var(--sky)}
  .chip-green{background:var(--greensoft);color:var(--green)}
  .llave{width:13px;height:13px;color:var(--muted);flex:none}

  /* ---------- fiesta ---------- */
  .fiesta-card .titulo{font-family:var(--display);font-weight:700;font-size:20px;margin:2px 0 3px}
  .fiesta-card .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
  .separador-o{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:18px 0}
  .separador-o::before,.separador-o::after{content:'';flex:1;height:1px;background:var(--line)}
  .crear-dashed{
    width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:var(--radius);
    color:var(--muted);font-size:14px;font-weight:600;padding:14px;cursor:pointer;
  }
  /* fila compacta dentro de .card: va después en la cascada, así que fija
     su propio aire (2px dejaba el texto pegado al borde) */
  .yo-fila{display:flex;align-items:center;gap:10px;padding:11px 14px}
  .yo-fila .quien{flex:1;font-size:14px;color:var(--muted)}
  .yo-fila b{color:var(--ink)}

  /* ---------- lista ---------- */
  .item-card .fila{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
  .item-card .nombre{font-weight:600;font-size:15px;line-height:1.35;padding-top:2px}
  .item-card .meta{color:var(--muted);font-size:13px;margin-top:3px}
  .item-card .acciones{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:11px}
  .quitar{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;
    padding:4px 6px;line-height:1;opacity:.6;flex:none}
  .comprada-card{cursor:pointer}
  .comprada-card:active{filter:brightness(.97)}

  /* ---------- peña ---------- */
  .persona-fila{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer}
  .persona-fila:last-child{border-bottom:none}
  .persona-fila .centro{flex:1;min-width:0}
  .persona-fila .nombre{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px}
  .persona-fila .subtexto{color:var(--muted);font-size:13px;margin-top:1px}
  .persona-fila .saldo{text-align:right;font-variant-numeric:tabular-nums}
  .persona-fila .saldo .cifra{font-weight:600;font-size:14.5px}
  .persona-fila .saldo .estado{display:block;font-size:11px;color:var(--muted)}
  .saldo-verde{color:var(--green)}
  .saldo-terra{color:var(--terra)}
  .saldo-neutro{color:var(--muted)}

  /* ---------- cuentas ---------- */
  .total-card{text-align:center;padding:20px 14px}
  .total-card .cifra{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.5px}
  .total-card .porcabeza{color:var(--muted);font-size:13px;margin-top:3px}
  .bizum-fila{display:flex;align-items:center;gap:11px}
  .bizum-fila.hecho{opacity:.55}
  .bizum-fila .quien{flex:1;font-size:14.5px;font-weight:600;min-width:0}
  .bizum-fila .quien svg{width:14px;height:14px;color:var(--muted);vertical-align:-2px;margin:0 3px}
  .bizum-fila .cuanto{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .check{
    width:30px;height:30px;border-radius:999px;border:1.5px solid var(--line);
    background:transparent;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;justify-content:center;color:transparent;
  }
  .check.on{background:var(--green);border-color:var(--green);color:var(--onsky)}
  .check svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round}
  .enpaz{color:var(--green);text-align:center;font-weight:600;font-size:14.5px;padding:18px 10px 6px}
  .pie-nota{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .micuenta-cifra{font-family:var(--display);font-weight:800;font-size:26px;letter-spacing:-.4px;line-height:1.1}
  .micuenta-desglose{color:var(--muted);font-size:13px;margin-top:3px}
  .micuenta-accion{display:flex;align-items:center;gap:10px;border-top:1px solid var(--line);
    margin-top:12px;padding-top:11px;font-size:14px}
  .micuenta-accion .texto{flex:1;min-width:0}
  .micuenta-accion .btn{flex:none}

  /* ---------- inicio accionable / compartir ---------- */
  .hero-mini{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 0 4px;color:var(--sky)}
  .hero-mini svg{width:26px;height:26px}
  .hero-mini .marca{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:-.3px;color:var(--ink)}
  .estado-sync{color:var(--muted);font-size:12.5px;margin-top:8px}
  .previo{white-space:pre-wrap;overflow-wrap:break-word;background:var(--bg);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;font-size:13px;line-height:1.55;max-height:36dvh;overflow-y:auto}
  .historial-linea{color:var(--muted);font-size:12.5px;text-align:center;margin-top:14px}
  .centrado{display:block;margin:10px auto 0;text-align:center}

  /* ---------- tab bar ---------- */
  nav#tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:var(--card);border-top:1px solid var(--line);
    padding:6px 10px calc(8px + env(safe-area-inset-bottom));
  }
  .tabbar-in{max-width:480px;margin:0 auto;display:flex}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--muted);
    font-size:11px;font-weight:600;padding:7px 4px 4px;cursor:pointer;position:relative;
  }
  .tab svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round}
  .tab.activa{color:var(--sky)}
  .tab .badge{
    position:absolute;top:3px;right:calc(50% - 24px);
    background:var(--terra);color:var(--onsky);font-size:9.5px;font-weight:700;
    min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .tab .badge[hidden]{display:none}

  /* ---------- sheet ---------- */
  #velo{position:fixed;inset:0;background:var(--velo);z-index:60;opacity:0;
    pointer-events:none;transition:opacity .2s}
  #velo.abierto{opacity:1;pointer-events:auto}
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);
    border-radius:18px 18px 0 0;border-top:1px solid var(--line);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:480px;margin:0 auto;transform:translateY(105%);transition:transform .25s;
    max-height:85dvh;overflow-y:auto;
  }
  #sheet.abierto{transform:translateY(0)}
  .asa{width:36px;height:4px;border-radius:99px;background:var(--line);margin:6px auto 16px}
  .sheet-titulo{font-family:var(--display);font-size:20px;font-weight:700;margin:0 0 4px;text-wrap:balance}
  .sheet-sub{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.5}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--card);border-radius:999px;padding:6px 13px 6px 6px;
    font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .pill .avatar{width:24px;height:24px;font-size:11px}
  .pill.on{border-color:var(--green);background:var(--greensoft)}
  .pill.off{opacity:.4}
  .pill.solo-texto{padding:6px 13px}
  .pill.on.pill-sky{border-color:var(--sky);background:var(--skysoft)}
  .precio-input{display:flex;align-items:center;gap:10px}
  .precio-input input{font-size:24px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
  .precio-input .eur{font-size:19px;font-weight:600;color:var(--muted)}
  .sheet-botones{display:flex;gap:10px;margin-top:22px}
  .sheet-botones .btn{flex:1}
  .link-borrar{background:none;border:none;color:var(--terra);font-size:13.5px;
    font-weight:600;margin:16px auto 0;display:block;cursor:pointer}
  .opcion-menu{
    display:block;width:100%;background:var(--card);
    border:1px solid var(--line);border-radius:11px;
    font-size:14.5px;font-weight:600;padding:13px 14px;margin-bottom:8px;cursor:pointer;text-align:left;
  }
  .opcion-menu small{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px}
  .nota{border:1px solid var(--line);border-left:3px solid var(--sky);
    border-radius:9px;padding:11px 13px;font-size:13px;color:var(--muted);line-height:1.5;margin-top:16px}

  /* ---------- toast ---------- */
  #toast{
    position:fixed;bottom:92px;left:50%;transform:translate(-50%,16px);z-index:70;
    background:var(--ink);color:var(--bg);font-size:13.5px;font-weight:500;
    padding:10px 17px;border-radius:10px;opacity:0;transition:.25s;pointer-events:none;
    max-width:86vw;text-align:center;
  }
  #toast.ver{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>

<button id="btnTema" type="button" aria-label="Cambiar entre modo claro y oscuro">
  <svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
</button>

<div id="app">
  <main id="vista"></main>
  <nav id="tabbar">
    <div class="tabbar-in">
      <button class="tab" data-tab="fiesta" type="button">
        <svg viewBox="0 0 48 48" stroke-width="3.4"><circle cx="24" cy="24" r="19"/><g stroke-linecap="round"><line x1="24" y1="24" x2="24" y2="5"/><line x1="24" y1="24" x2="42.1" y2="18.1"/><line x1="24" y1="24" x2="35.2" y2="39.4"/><line x1="24" y1="24" x2="12.8" y2="39.4"/><line x1="24" y1="24" x2="5.9" y2="18.1"/></g></svg>
        Fiesta</button>
      <button class="tab" data-tab="lista" type="button">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>
        Lista</button>
      <button class="tab" data-tab="pena" type="button">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.6-3 2.8-4.8 5.5-4.8s4.9 1.8 5.5 4.8"/><circle cx="17" cy="9" r="2.4"/><path d="M16 14.4c2.3.2 4 1.7 4.5 4.1"/></svg>
        Peña</button>
      <button class="tab" data-tab="cuentas" type="button">
        <svg viewBox="0 0 24 24"><path d="M4 7h13M17 7l-3-3M17 7l-3 3"/><path d="M20 17H7M7 17l3-3M7 17l3 3"/></svg>
        Cuentas<span class="badge" id="badgeCuentas" hidden></span></button>
    </div>
  </nav>
</div>

<div id="velo"></div>
<div id="sheet" role="dialog" aria-modal="true"></div>
<div id="toast" role="status"></div>

<script>
'use strict';
/* ================= estado ================= */
const CLAVE = 'a-pachas-v1';
const CLAVES_VIEJAS = ['el-bote-proto-v2', 'el-bote-proto-v1'];
const CLAVE_TEMA = 'a-pachas-tema';
const API = '/api';
const ahora = () => Date.now();

// v3 -> v4: timestamps de edición (mod) para fusionar sin pisarse, saldados
// como objetos {hecho,t,por} y papelera de ids borrados. Acepta cualquier
// estado viejo (localStorage, enlaces AP1/EB1 o el propio servidor).
function migrar(o){
  if(!o) return o;
  o.v = 4;
  if(typeof o.fiesta === 'string') o.fiesta = {nombre:o.fiesta, fecha:null};
  if(!o.fiesta.mod) o.fiesta.mod = 0;
  (o.gente || []).forEach((p,i) => {
    if(p.admin === undefined) p.admin = i < 2;
    if(!p.mod) p.mod = 0;
  });
  (o.items || []).forEach(it => { if(!it.mod) it.mod = 0; });
  o.saldados = o.saldados || {};
  for(const k in o.saldados){
    if(o.saldados[k] === true) o.saldados[k] = {hecho:true, t:0};
  }
  o.papelera = o.papelera || [];
  return o;
}

const LOGO = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="4.5"><circle cx="24" cy="24" r="19"/><g stroke-linecap="round"><line x1="24" y1="24" x2="24" y2="5"/><line x1="24" y1="24" x2="42.1" y2="18.1"/><line x1="24" y1="24" x2="35.2" y2="39.4"/><line x1="24" y1="24" x2="12.8" y2="39.4"/><line x1="24" y1="24" x2="5.9" y2="18.1"/></g></svg>`;
const LLAVE = `<svg class="llave" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Admin"><circle cx="8" cy="8" r="4.5"/><path d="M11 11l9 9M17 17l2.5-2.5M14 14l2.5-2.5"/></svg>`;

function demo(){
  return migrar({
    fiesta: {nombre:'Fiestas de Collado 2026', fecha:null, ejemplo:true},
    yo: null,
    tab: 'fiesta',
    remota: null,
    gente: [
      {id:'p1', nombre:'Edu',    admin:true},
      {id:'p2', nombre:'Marta',  admin:true},
      {id:'p3', nombre:'Paco',   admin:false},
      {id:'p4', nombre:'Lucía',  admin:false},
      {id:'p5', nombre:'Andrés', admin:false},
    ],
    items: [

// precio a céntimos entendiendo la notación española: coma decimal y
// puntos de miles («1.000» son mil euros, no uno)
function precioACentimos(txt){
  let s = String(txt).trim().replace(/[€\s]/g,'');
  if(!s) return NaN;
  if(s.includes(',')) s = s.replace(/\./g,'').replace(',', '.');
  else if(/^\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g,'');
  if(!/^\d+(\.\d+)?$/.test(s)) return NaN;
  return Math.round(parseFloat(s)*100);
}

function haceCuanto(t){
  if(!t) return 'hace nada';
  const s = Math.max(0, Math.round((ahora() - t) / 1000));
  if(s < 45) return 'hace un momento';
  if(s < 3600) return `hace ${Math.round(s/60)} min`;
  if(s < 86400) return `hace ${Math.round(s/3600)} h`;
  return `hace ${Math.round(s/86400)} día${Math.round(s/86400)===1?'':'s'}`;
}

// Enlace vivo: #F:<id>:<clave>. Va en el hash a propósito: ni nginx ni
// Cloudflare ven la clave de escritura. AP1:/EB1: (estado entero embebido)
// se mantienen como copia local y compatibilidad con enlaces viejos.
const RE_VIVO = /F:([a-z2-9]{6,}):([a-z2-9]{6,})/i;

function codigoFiesta(){
  const limpio = {...S, yo:null, tab:'fiesta'};
  delete limpio.remota;
  // los AP1 los leen también clientes viejos cacheados: saldados en su
  // formato (solo claves hechas, a true), que un {hecho:false} les sale ✓
  limpio.saldados = {};
  for(const k in S.saldados){ if(hechoBizum(k)) limpio.saldados[k] = true; }
  const json = JSON.stringify(limpio);
  const b64 = btoa(unescape(encodeURIComponent(json)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return 'AP1:' + b64;
}
function enlaceFiesta(){
  if(S.remota) return location.origin + location.pathname + '#F:' + S.remota.id + ':' + S.remota.clave;
  return location.origin + location.pathname + '#' + codigoFiesta();
}
function decodificar(texto){
  const m = String(texto).match(/(?:AP1|EB1):([A-Za-z0-9_-]+)/);
  if(!m) return null;
  try {
    let b64 = m[1].replace(/-/g,'+').replace(/_/g,'/');
    while(b64.length % 4) b64 += '=';
    const obj = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!obj || !obj.gente || !obj.items || !obj.fiesta) return null;
    obj.yo = null; obj.tab = 'fiesta'; obj.remota = null;
    return migrar(obj);
  } catch(e){ return null; }
}
// Antes de pisar la fiesta actual con otra, deja una copia en localStorage
// (red de seguridad silenciosa; las vivas siguen en el servidor de todos modos).
function respaldarActual(){
  if(S && !S.fiesta.ejemplo && (S.items.length || S.gente.length > 1)){
    try{ localStorage.setItem(CLAVE + '-anterior', JSON.stringify(S)); }catch(e){}
  }
}
function importar(texto){
  const mv = String(texto).match(RE_VIVO);
  if(mv){
    cerrarSheet();
    abrirEnlaceVivo(mv[1].toLowerCase(), mv[2].toLowerCase());
    return true;
  }
  const obj = decodificar(texto);
  if(!obj) return false;
  respaldarActual();
  S = obj; guardarLocal(); pintar(); sheetIdentidad(true);
  return true;
}

/* ================= fiesta viva (sincronización) ================= */
const sync = {
  subido: null,       // JSON del último estado compartido confirmado en el server
  timer: null,
  subiendo: false,
  otraVez: false,     // llegó un cambio mientras subíamos
  pintarLuego: false, // hay estado nuevo sin repintar (sheet abierto o texto a medias)
  ultimo: 0,          // última vez que hablamos con el server con éxito
  sinRed: false,
  avisado: false,
  rechazado: false,   // el server no acepta el estado (400/413): no reintentar a lo loco
};

async function pedir(metodo, ruta, cuerpo){
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), 8000);
  try {
    const r = await fetch(API + ruta, {
      method: metodo,
      headers: cuerpo ? {'Content-Type':'application/json'} : undefined,
      body: cuerpo ? JSON.stringify(cuerpo) : undefined,
      cache: 'no-store',
      signal: ctl.signal,
    });
    let datos = null;
    try { datos = await r.json(); } catch(e){}
    return {status: r.status, cuerpo: datos};
  } finally { clearTimeout(t); }
}

// Lo que viaja al servidor y en enlaces: la fiesta sin lo local (yo, tab, remota).
// compartidoDe canoniza también el orden de claves, que las comparaciones son por JSON.
const compartidoDe = o => ({v:4, fiesta:o.fiesta, gente:o.gente, items:o.items,
  saldados:o.saldados, papelera:o.papelera});
const estadoCompartido = () => compartidoDe(S);
const estadoJson = () => JSON.stringify(estadoCompartido());

// Fusión por entidad: última edición gana (mod), y la papelera evita que un
// borrado resucite. a = normalmente el servidor, b = lo local.
function fusionar(a, b){
  const mod = x => (x && x.mod) || 0;
  const pap = new Map();
  [...(a.papelera||[]), ...(b.papelera||[])].forEach(p => {
    const previa = pap.get(p.id);
    if(!previa || p.t > previa.t) pap.set(p.id, p);
  });
  const mezcla = (la, lb) => {
    const enA = new Map(la.map(x=>[x.id,x]));
    const enB = new Map(lb.map(x=>[x.id,x]));
    const res = [];
    for(const x of lb) if(!enA.has(x.id) && !pap.has(x.id)) res.push(x);
    for(const x of la){
      if(pap.has(x.id)) continue;
      const y = enB.get(x.id);
      res.push(y && mod(y) > mod(x) ? y : x);
    }
    return res;
  };
  const saldados = {...a.saldados};
  for(const k in (b.saldados||{})){
    const va = saldados[k], vb = b.saldados[k];
    if(!va || ((vb && vb.t) || 0) > ((va && va.t) || 0)) saldados[k] = vb;
  }
  return {
    v: 4,
    fiesta: mod(b.fiesta) > mod(a.fiesta) ? b.fiesta : a.fiesta,
    gente: mezcla(a.gente, b.gente),
    items: mezcla(a.items, b.items),
    saldados,
    // el tope se come las lápidas más viejas, no las últimas en llegar
    papelera: [...pap.values()].sort((x,y)=>(x.t||0)-(y.t||0)).slice(-300),
  };
}

function adoptar(c){
  S.v = 4; S.fiesta = c.fiesta; S.gente = c.gente; S.items = c.items;
  S.saldados = c.saldados; S.papelera = c.papelera;
  if(S.yo && !persona(S.yo)) S.yo = null;
}

function alDia(){
  sync.ultimo = ahora(); sync.sinRed = false; sync.avisado = false;
  refrescarSync();
}
function sinRed(){
  sync.sinRed = true;
  if(!sync.avisado && S && S.remota){
    sync.avisado = true;
    toast('Sin red. Tus cambios quedan apuntados y se subirán solos.');
  }
  refrescarSync();
}
function textoSync(){
  if(!S) return '';
  if(S.fiesta.ejemplo) return 'Fiesta de ejemplo · solo en este móvil';
  if(!S.remota) return 'Solo en este móvil';
  if(sync.rechazado) return 'En vivo · hay cambios que no se han podido subir';
  if(sync.sinRed) return 'Sin red · los cambios se subirán solos';
  if(!sync.ultimo) return 'En vivo · poniéndose al día…';
  return 'En vivo con la peña · al día ' + haceCuanto(sync.ultimo);
}
function refrescarSync(){
  const el = $('#syncEstado');
  if(el) el.textContent = textoSync();
}

const sheetAbierto = () => $('#sheet').classList.contains('abierto');
// No repintamos debajo de los dedos de nadie: sheet abierto o texto a medias.
// Los inputs de un sheet ya cerrado no cuentan (su DOM se queda ahí).
function ocupado(){
  const a = document.activeElement;
  if(a && (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA') &&
     (!$('#sheet').contains(a) || sheetAbierto())) return true;
  return [...document.querySelectorAll('#vista input, #vista textarea')].some(el => el.value);
}
// Repinta ya si se puede; si no, en cuanto el usuario suelte los dedos.
function pintarOLuego(){
  if(!sheetAbierto() && !ocupado()){ sync.pintarLuego = false; pintar(); }
  else sync.pintarLuego = true;
}

function programarSubida(){
  clearTimeout(sync.timer);
  sync.timer = setTimeout(subir, 600);
}

async function subir(){
  if(!S || !S.remota || S.fiesta.ejemplo || sync.rechazado) return;
  if(sync.subiendo){ sync.otraVez = true; return; }
  sync.subiendo = true;
  try {
    for(let intento = 0; intento < 4; intento++){
      const estado = estadoCompartido();
      const json = JSON.stringify(estado);
      if(json === sync.subido) break;
      const r = await pedir('PUT', '/fiestas/' + S.remota.id,
        {clave: S.remota.clave, rev: S.remota.rev, estado});
      if(r.status === 200){
        S.remota.rev = r.cuerpo.rev; sync.subido = json;
        guardarLocal(); alDia();
        break;
      } else if(r.status === 409 && r.cuerpo && r.cuerpo.estado){
        adoptar(fusionar(migrar(r.cuerpo.estado), estado));
        S.remota.rev = r.cuerpo.rev;
        guardarLocal();
        pintarOLuego();
        // y a la siguiente vuelta subimos lo fusionado
      } else if(r.status === 404){
        desconectarRemota('Esa fiesta ya no está en el servidor. Sigues con tu copia local.');
        break;
      } else if(r.status === 403){
        desconectarRemota('Este enlace ya no puede editar la fiesta. Sigues con tu copia local.');
        break;
      } else if(r.status === 429){
        break; // frenazo del servidor: el intervalo lo reintenta enseguida
      } else if(r.status === 400 || r.status === 413){
        // el servidor no quiere este estado (¿demasiado grande?): no es un
        // problema de red y reintentar a ciegas no lo arregla
        sync.rechazado = true;
        toast('El servidor no ha aceptado los últimos cambios. Se quedan en este móvil.');
        refrescarSync();
        break;
      } else { sinRed(); break; }
    }
  } catch(e){ sinRed(); }
  sync.subiendo = false;
  if(sync.otraVez){ sync.otraVez = false; programarSubida(); }
}

async function bajar(){
  if(!S || !S.remota || S.fiesta.ejemplo) return;
  try {
    const r = await pedir('GET', '/fiestas/' + S.remota.id + '?rev=' + S.remota.rev);
    if(!S || !S.remota) return; // la fiesta cambió mientras esperábamos
    if(r.status === 204){ alDia(); return; }
    if(r.status === 200 && r.cuerpo && r.cuerpo.estado){
      const antes = estadoJson();
      const remoto = migrar(r.cuerpo.estado);
      adoptar(fusionar(remoto, estadoCompartido()));
      S.remota.rev = r.cuerpo.rev;
      const despues = estadoJson();
      if(despues === JSON.stringify(compartidoDe(remoto))) sync.subido = despues;
      else programarSubida(); // la fusión tiene cosas nuestras que el server no vio
      alDia();
      if(despues !== antes){ guardarLocal(); pintarOLuego(); }
    } else if(r.status === 404){
      desconectarRemota('Esa fiesta ya no está en el servidor. Sigues con tu copia local.');
    } else if(r.status >= 500){
      sinRed(); // el server no está fino: mismo trato que sin cobertura
    }
  } catch(e){ sinRed(); }
}

async function crearRemota(){
  if(!S || S.fiesta.ejemplo || S.remota) return !!(S && S.remota); // la demo jamás se sube
  const estado = estadoCompartido();
  const json = JSON.stringify(estado); // foto de lo que de verdad mandamos
  try {
    const r = await pedir('POST', '/fiestas', {estado});
    if(r.status === 201 && r.cuerpo && r.cuerpo.id){
      S.remota = {id: r.cuerpo.id, clave: r.cuerpo.clave, rev: r.cuerpo.rev};
      sync.subido = json;
      guardarLocal(); alDia();
      // lo editado mientras el POST volaba se sube ahora
      if(estadoJson() !== json) programarSubida();
      return true;
    }
  } catch(e){}
  return false;
}

function desconectarRemota(msg){
  S.remota = null; sync.subido = null;
  guardarLocal(); toast(msg);
  pintarOLuego();
}

async function activarVivo(){
  if(S.remota) return sheetCompartir('invitar');
  if(await crearRemota()){
    pintar(); sheetCompartir('invitar');
  } else {
    toast('Ahora mismo no hay manera (¿sin red?). La fiesta sigue en tu móvil; prueba luego.');
  }
}

async function abrirEnlaceVivo(id, clave){
  const r = await pedir('GET', '/fiestas/' + id).catch(() => ({status: 0}));
  if(r.status !== 200 || !r.cuerpo || !r.cuerpo.estado){
    toast(r.status === 404
      ? 'Esa fiesta ya no está en el servidor.'
      : 'No se ha podido abrir la fiesta del enlace. ¿Hay red?');
    pintar();
    return false;
  }
  const remoto = migrar(r.cuerpo.estado);
  const mismo = S && S.remota && S.remota.id === id;
  if(!mismo) respaldarActual();
  const yo = mismo ? S.yo : null;
  // si ya estábamos en esta fiesta, lo local pendiente se fusiona, no se pisa
  const base = mismo ? fusionar(remoto, estadoCompartido()) : remoto;
  S = {...base, yo, tab:'fiesta', remota:{id, clave, rev:r.cuerpo.rev}};
  const json = estadoJson();
  if(json === JSON.stringify(compartidoDe(remoto))) sync.subido = json;
  else { sync.subido = JSON.stringify(compartidoDe(remoto)); programarSubida(); }
  guardarLocal(); alDia(); pintar();
  if(!S.yo) sheetIdentidad(true);
  return true;
}

/* ================= cálculo de cuentas ================= */
function cuentas(){
  const pagado = {}, debe = {};
  S.gente.forEach(p => { pagado[p.id]=0; debe[p.id]=0; });
  let total = 0;
  for(const it of S.items){
    if(it.estado !== 'comprada' || !it.precio) continue;
    total += it.precio;
    if(pagado[it.compradorId] !== undefined) pagado[it.compradorId] += it.precio;
    const cons = consumidores(it).filter(id => debe[id] !== undefined);
    if(!cons.length) continue;
    const base = Math.floor(it.precio / cons.length);
    let resto = it.precio - base*cons.length;
    for(const id of cons){ debe[id] += base + (resto-- > 0 ? 1 : 0); }
  }
  const saldo = {};
  S.gente.forEach(p => saldo[p.id] = pagado[p.id] - debe[p.id]);

  const deudores = S.gente.filter(p=>saldo[p.id]<0).map(p=>({id:p.id, v:-saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const acreedores = S.gente.filter(p=>saldo[p.id]>0).map(p=>({id:p.id, v:saldo[p.id]})).sort((a,b)=>b.v-a.v);
  const bizums = [];
  let i=0, j=0;
  while(i<deudores.length && j<acreedores.length){
    const m = Math.min(deudores[i].v, acreedores[j].v);
    if(m>0) bizums.push({de:deudores[i].id, a:acreedores[j].id, cents:m});
    deudores[i].v -= m; acreedores[j].v -= m;
    if(deudores[i].v===0) i++;
    if(acreedores[j].v===0) j++;
  }
  return {total, pagado, debe, saldo, bizums};
}

/* --- gasto: directo, marcar comprada o editar (un solo sheet) --- */
function sheetGasto(itemId){
  const it = itemId ? S.items.find(x=>x.id===itemId) : null;
  if(itemId && !it) return;
  const directo = !it;
  const editando = !!(it && it.estado === 'comprada');
  const marcados = new Set(it ? consumidores(it) : S.gente.map(p=>p.id));
  let compradorSel = editando ? it.compradorId : ((it && it.pilladorId) || S.yo);
  if(!persona(compradorSel)) compradorSel = persona(S.yo) ? S.yo : null;

  const pillsCons = S.gente.map(p =>
    pillPersona(p, 'cons', marcados.has(p.id)?'on':'off')).join('');
  const pillsComp = S.gente.map(p =>
    pillPersona(p, 'comp', 'pill-sky ' + (p.id===compradorSel?'on':''))).join('');

  let historial = '';
  if(editando){
    const creador = it.creadoPor && persona(it.creadoPor);
    const editor = it.modPor && it.modPor !== it.creadoPor && persona(it.modPor);
    const trozos = [];
    if(creador) trozos.push(`La apuntó ${esc(creador.nombre)}${it.creadoEn ? ' ' + haceCuanto(it.creadoEn) : ''}`);
    if(editor) trozos.push(`tocada por ${esc(editor.nombre)} ${haceCuanto(it.mod)}`);
    if(trozos.length) historial = `<div class="historial-linea">${trozos.join(' · ')}</div>`;
  }

  const titulo = directo ? 'Apuntar un gasto' : esc(it.nombre);
  const sub = directo ? 'Qué fue, cuánto costó y quiénes lo catan.'
    : editando ? 'Corrige lo que haga falta.'
    : 'Apunta lo que ha costado y quién la cata.';
  const precioIni = editando && it.precio ? (it.precio/100).toFixed(2).replace('.',',') : '';
  abrirSheet(`
    <h2 class="sheet-titulo">${titulo}</h2>
    <p class="sheet-sub">${sub}</p>
    <label class="label" for="inConcepto" style="margin-top:0">Qué</label>
    <input type="text" id="inConcepto" placeholder="Hielo, pan, el bar…" maxlength="40"
      autocomplete="off" value="${it ? esc(it.nombre) : ''}">
    <label class="label" for="inPrecio">Precio</label>
    <div class="precio-input">
      <input type="tel" id="inPrecio" inputmode="decimal" placeholder="0,00" value="${precioIni}" autocomplete="off">
      <span class="eur">€</span>
    </div>
    <span class="label">Pagó</span>
    <div class="pills">${pillsComp}</div>
    <span class="label">¿Quiénes lo catan?</span>
    <div class="pills">${pillsCons}</div>
    <div class="sheet-botones">
      <button class="btn btn-borde" id="btnCancelar" type="button">Cancelar</button>
      <button class="btn btn-green" id="btnGuardarCompra" type="button">
        ${editando ? 'Guardar' : directo ? 'Apuntar el gasto' : 'Apuntar la compra'}</button>
    </div>
    ${editando ? '<button class="link-borrar" id="btnBorrarItem" type="button">Borrar esta compra</button>' : ''}
    ${historial}
  `);
  document.querySelectorAll('[data-cons]').forEach(b => b.onclick = () => {
    const id = b.dataset.cons;
    if(marcados.has(id)){
      if(marcados.size === 1) return toast('Alguien lo catará, digo yo.');
      marcados.delete(id);
    } else marcados.add(id);
    b.classList.toggle('on', marcados.has(id));
    b.classList.toggle('off', !marcados.has(id));
  });
  document.querySelectorAll('[data-comp]').forEach(b => b.onclick = () => {
    compradorSel = b.dataset.comp;
    document.querySelectorAll('[data-comp]').forEach(x =>
      x.classList.toggle('on', x.dataset.comp === compradorSel));
  });
  $('#btnCancelar').onclick = cerrarSheet;
  $('#btnGuardarCompra').onclick = () => {
    const nombre = $('#inConcepto').value.trim();
    if(!nombre) return toast('Pon qué fue.');
    const val = precioACentimos($('#inPrecio').value);
    if(isNaN(val) || val<=0) return toast('Ponle precio, que gratis no fue.');
    if(!persona(compradorSel)) return toast('¿Quién lo pagó?');
    const consumen = marcados.size === S.gente.length ? null : [...marcados];
    if(directo){
      S.items.unshift(tocar({id:nuevoId('i'), nombre, estado:'comprada', precio:val,
        compradorId:compradorSel, consumen,
        creadoEn:ahora(), creadoPor:S.yo || null}));
      toast('Apuntado. Las cuentas ya lo saben.');
    } else {
      // buscar por id otra vez: la fiesta puede haberse refrescado mientras.
      // Si otro la borró, se vuelve a apuntar: el pago fue real
      let vivo = S.items.find(x=>x.id===itemId);
      if(!vivo){
        vivo = it;
        S.items.unshift(vivo);
        S.papelera = S.papelera.filter(t=>t.id!==itemId);
      }
      vivo.nombre = nombre;
      vivo.precio = val;
      vivo.consumen = consumen;
      vivo.compradorId = compradorSel;
      tocar(vivo);
      if(!editando){
        vivo.estado = 'comprada';
        delete vivo.pilladorId;
        toast('Apuntada. Las cuentas ya lo saben.');
      } else {
        toast('Guardado');
      }
    }
    guardar(); cerrarSheet(); pintar();
  };
  const del = $('#btnBorrarItem');
  if(del) del.onclick = () => {
    sheetConfirmar('¿Borrar esta compra?',
      `«${it.nombre}» (${eur(it.precio||0)}) se quita de la lista y de las cuentas.`, () => {
        S.items = S.items.filter(x=>x.id!==itemId);
        S.papelera.push({id:itemId, t:ahora()});
        guardar(); pintar(); toast('Fuera de la lista');
      });
  };
  setTimeout(()=>$(directo ? '#inConcepto' : '#inPrecio').focus(), 250);
}

/* --- ficha de persona --- */
function sheetPersona(pid){
  const p = persona(pid); if(!p) return;
  const c = cuentas();
  const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===pid);
  const compras = S.items.filter(i=>i.estado==='comprada' && i.compradorId===pid);
  const esYo = pid === S.yo;
  const puedoGestionar = soyAdmin() && !esYo;

  const listaAsig = asignadas.length
    ? asignadas.map(i=>`<li>${esc(i.nombre)}</li>`).join('')
    : '<li style="color:var(--muted)">Nada pendiente</li>';

  const s = c.saldo[pid] || 0;
  const saldoTxt = s === 0 ? 'está en paz' : s > 0 ? `le deben ${eur(s)}` : `debe ${eur(-s)}`;

  abrirSheet(`
    <h2 class="sheet-titulo">${esc(p.nombre)}${p.admin?' '+LLAVE:''}${esYo?' <span class="chip-estado chip-sky">tú</span>':''}</h2>
    <p class="sheet-sub">Ha pagado <strong>${eur(c.pagado[pid]||0)}</strong> en ${compras.length} compra${compras.length===1?'':'s'} ·
      le tocaba ${eur(c.debe[pid]||0)} · ${saldoTxt}.</p>
    <span class="label">Le toca traer</span>
    <ul style="margin:0 0 6px;padding-left:20px;font-size:14px;line-height:1.7">${listaAsig}</ul>
    ${!esYo ? `<button class="btn btn-borde btn-mini" id="btnRecordar" type="button" style="margin-top:6px">Mandarle un recordatorio</button>` : ''}
    ${puedoGestionar ? `
      <span class="label">Gestión</span>
      <button class="opcion-menu" id="btnToggleAdmin" type="button">
        ${p.admin ? 'Quitarle la llave' : 'Darle la llave (admin)'}
        <small>Los de la llave asignan cosas, corrigen precios y gestionan la peña.</small>
      </button>
      <button class="opcion-menu" id="btnEliminar" type="button">
        Quitar de la peña
        <small>Solo si no tiene compras apuntadas.</small>
      </button>` : ''}
  `);
  const rec = $('#btnRecordar');
  if(rec) rec.onclick = () => sheetCompartir('persona', pid);
  // los handlers rebuscan por id: la fiesta puede haberse fusionado mientras
  const tog = $('#btnToggleAdmin');
  if(tog) tog.onclick = () => {
    const q = persona(pid);
    if(!q){ cerrarSheet(); pintar(); return toast('Esa persona ya no está en la peña.'); }
    if(q.admin && numAdmins() === 1) return toast('Alguien tiene que quedarse con la llave');
    q.admin = !q.admin;
    tocar(q);
    guardar(); cerrarSheet(); pintar();
    toast(q.admin ? q.nombre + ' tiene la llave' : q.nombre + ' ya no tiene la llave');
  };
  const eli = $('#btnEliminar');
  if(eli) eli.onclick = () => {
    const q = persona(pid);
    if(!q){ cerrarSheet(); pintar(); return toast('Esa persona ya no está en la peña.'); }
    if(S.items.some(i=>i.estado==='comprada' && i.compradorId===pid))
      return toast('Tiene compras apuntadas: reasígnalas antes');
    if(q.admin && numAdmins() === 1) return toast('Alguien tiene que quedarse con la llave');
    S.items.forEach(i => {
      if(i.pilladorId === pid){ i.estado='pendiente'; delete i.pilladorId; tocar(i); }
      if(i.consumen && i.consumen.includes(pid)){ i.consumen = i.consumen.filter(x=>x!==pid); tocar(i); }
    });
    S.gente = S.gente.filter(x=>x.id!==pid);
    S.papelera.push({id:pid, t:ahora()});
    guardar(); cerrarSheet(); pintar();
    toast(q.nombre + ' ya no está en la peña');
  };
}

/* --- mandar al grupo: mensajes por momento --- */
function mensajeCompartir(tipo, pid){
  const enlace = enlaceFiesta();
  const n = S.fiesta.nombre;
  if(tipo === 'invitar'){
    return `A pachas con los gastos de «${n}».\n` +
      `Entra, di quién eres y apunta lo que pilles:\n${enlace}`;
  }
  if(tipo === 'lista'){
    const pend = S.items.filter(i=>i.estado==='pendiente');
    return `Faltan cosas pa «${n}»:\n` +
      pend.map(i=>'· ' + i.nombre).join('\n') +
      `\n\nQuien pueda, que se lo pida aquí:\n${enlace}`;
  }
  if(tipo === 'cuentas'){
    const c = cuentas();
    const pendientes = bizumsPendientes(c);
    const lineas = [`Cuentas de «${n}» — A Pachas`,
      `Total: ${eur(c.total)} entre ${S.gente.length}`, ''];
    if(!c.bizums.length){
      lineas.push('Cuentas en paz. Ni pa ti ni pa mí.');
    } else {
      c.bizums.forEach(b => lineas.push(
        (hechoBizum(claveBizum(b)) ? '✓ ' : '· ') +
        persona(b.de).nombre + ' → ' + persona(b.a).nombre + ': ' + eur(b.cents)));
      lineas.push('');
      lineas.push(pendientes.length
        ? 'Marca el tuyo cuando lo hagas:' : 'Todo saldado. Cuentas claras y el chocolate espeso.');
    }
    lineas.push(enlace);
    return lineas.join('\n');
  }
  if(tipo === 'persona'){
    const p = persona(pid);
    const c = cuentas();
    const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===pid);
    const lineas = [`${p.nombre}, pa «${n}»:`];
    if(asignadas.length){
      lineas.push('');
      lineas.push('Te toca traer:');
      asignadas.forEach(i => lineas.push('· ' + i.nombre));
    }
    const debe = bizumsPendientes(c).filter(b => b.de === pid);
    const leDeben = bizumsPendientes(c).filter(b => b.a === pid);
    if(debe.length || leDeben.length){
      lineas.push('');
      lineas.push('De cuentas te sale:');
      debe.forEach(b => lineas.push(`· Bizum de ${eur(b.cents)} a ${persona(b.a).nombre}`));
      leDeben.forEach(b => lineas.push(`· ${persona(b.de).nombre} te debe ${eur(b.cents)}`));
    }
    if(!asignadas.length && !debe.length && !leDeben.length){
      lineas.push('nada pendiente. Estás al día, máquina.');
    }
    lineas.push('');
    lineas.push('Lo tienes aquí:');
    lineas.push(enlace);
    return lineas.join('\n');
  }
  return enlace;
}

function sheetCompartir(tipo, pid){
  const txt = mensajeCompartir(tipo, pid);
  const puedeVivo = !S.remota && !S.fiesta.ejemplo;
  // en modo local el enlace lleva la fiesta entera dentro: en la vista
  // previa se abrevia (lo que se manda/copia lleva el enlace completo)
  const vista = txt.replace(/(#(?:AP1|EB1):)[A-Za-z0-9_-]{24,}/g,
    '$1… (enlace largo: lleva dentro la copia de la fiesta)');
  abrirSheet(`
    <h2 class="sheet-titulo">Mandar al grupo</h2>
    <p class="sheet-sub">Así queda el mensaje:</p>
    <div class="previo">${esc(vista)}</div>
    ${puedeVivo ? `<div class="nota">Esta fiesta va solo en este móvil: el enlace lleva una copia
      congelada. Ponla en vivo y todos apuntarán en la misma.</div>
      <button class="btn btn-soft btn-block" id="btnVivoDesdeCompartir" type="button"
        style="margin-top:10px">Ponerla en vivo primero</button>` : ''}
    <div class="sheet-botones">
      <button class="btn btn-borde" id="btnCopiarMsg" type="button">Copiar</button>
      <button class="btn btn-green" id="btnWhatsAppMsg" type="button">WhatsApp</button>
    </div>
    ${navigator.share ? '<button class="link-quieto centrado" id="btnOtraApp" type="button">Mandar con otra app</button>' : ''}
  `);
  $('#btnCopiarMsg').onclick = async () => {
    const ok = await copiar(txt);
    toast(ok ? 'Copiado. Pégalo en el grupo.' : 'No se ha podido copiar');
    if(ok) cerrarSheet();
  };
  $('#btnWhatsAppMsg').onclick = () => {
    window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank', 'noopener');
    cerrarSheet();
  };
  const vivo = $('#btnVivoDesdeCompartir');
  if(vivo) vivo.onclick = async () => {
    vivo.disabled = true;
    if(await crearRemota()){ pintar(); sheetCompartir(tipo, pid); }
    else { vivo.disabled = false; toast('Ahora mismo no hay manera (¿sin red?). Prueba luego.'); }
  };
  const otra = $('#btnOtraApp');
  if(otra) otra.onclick = async () => {
    try { await navigator.share({text: txt}); cerrarSheet(); } catch(e){}
  };
}

function vistaFiesta(c){
  const yo = persona(S.yo);
  const f = fechaBonita(S.fiesta.fecha);
  const sinDueno = S.items.filter(i=>i.estado==='pendiente').length;
  const porResolver = S.items.filter(i=>i.estado!=='comprada').length;
  const pendBizums = bizumsPendientes(c).length;

  // qué toca ahora: UNA acción según el estado de la fiesta
  let accion;
  if(!S.items.length && !c.total){
    accion = {txt:'La lista está vacía. Apunta lo que hace falta pa la fiesta.',
      btn:'Apuntar lo que falta', ir:'lista'};
  } else if(sinDueno){
    accion = {txt:`Hay ${sinDueno === 1 ? 'una cosa' : sinDueno + ' cosas'} sin dueño en la lista.`,
      btn:'Ver la lista', ir:'lista'};
  } else if(porResolver === 0 && pendBizums){
    accion = {txt:'Todo comprado. Solo quedan los bizums pa quedar en paz.',
      btn:'A las cuentas', ir:'cuentas'};
  } else if(porResolver === 0 && !pendBizums && c.total){
    accion = {txt:'Todo comprado y todo saldado. Vaya máquinas.',
      btn:'Ver las cuentas', ir:'cuentas'};
  } else {
    accion = {txt:'¿Has pagado algo? Apúntalo y a otra cosa.',
      btn:'Apuntar un gasto', ir:'gasto'};
  }

  // tu saldo en una línea
  let miLinea = '';
  if(yo && c.total){
    const s = c.saldo[S.yo] || 0;
    const cls = claseSaldo(s);
    const txt = s === 0 ? 'Estás en paz' : s > 0 ? `Te deben ${eur(s)}` : `Debes ${eur(-s)}`;
    miLinea = `<div class="card yo-fila">
      <span class="quien"><b class="${cls}">${txt}</b></span>
      <button class="btn btn-borde btn-mini" id="btnMiCuenta" type="button">Mis cuentas</button>
    </div>`;
  }

  return `${heroMiniHtml()}
    <div class="card fiesta-card">
      <span class="label">Tu fiesta</span>
      <div class="titulo">${esc(S.fiesta.nombre)}</div>
      <div class="meta">${f ? esc(f) + ' · ' : ''}${S.gente.length} en la peña · ${S.items.length} cosa${S.items.length===1?'':'s'} en la lista · ${eur(c.total)}</div>
      <button class="btn btn-sky btn-block" id="btnInvitar" type="button">Mandar al grupo</button>
      ${!S.remota && !S.fiesta.ejemplo ? `
        <button class="btn btn-soft btn-block" id="btnPonerVivo" type="button" style="margin-top:8px">
          Ponerla en vivo pa que todos apunten</button>` : ''}
      <div class="estado-sync" id="syncEstado">${esc(textoSync())}</div>
    </div>
    <div class="card">
      <span class="label">¿Qué toca?</span>
      <p style="margin:0 0 11px;font-size:14px;color:var(--muted)">${accion.txt}</p>
      <button class="btn ${accion.ir==='gasto'?'btn-green':'btn-soft'} btn-block" id="btnAccion"
        data-ir="${accion.ir}" type="button">${accion.btn}</button>
    </div>
    ${miLinea}
    <div class="card yo-fila">
      <span class="quien">${yo ? `Eres <b>${esc(yo.nombre)}</b>` : 'Aún no has dicho quién eres'}</span>
      <button class="btn btn-borde btn-mini" id="btnQuienSoy" type="button">${yo ? 'Cambiar' : '¿Quién eres?'}</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:22px">
      ${soyAdmin() ? '<button class="link-quieto" id="btnRenombrar" type="button">Cambiar nombre o fecha</button>' : ''}
      <button class="link-quieto" id="btnNueva" type="button">Empezar otra fiesta</button>
      <button class="link-quieto" id="btnVerEjemplo" type="button">Ver la fiesta de ejemplo</button>
    </div>`;
}

function vistaLista(){
  const total = S.items.length;
  const porResolver = S.items.filter(i=>i.estado!=='comprada').length;
  const sub = !total ? 'Apunta lo que haga falta'
    : porResolver === 0 ? 'Todo comprado. Vaya máquinas.'
    : porResolver === 1 ? `1 cosa por resolver de ${total}`
    : `${porResolver} cosas por resolver de ${total}`;
  const admin = soyAdmin();

  const cardItem = it => {
    const comprada = it.estado === 'comprada';
    const p = it.pilladorId ? persona(it.pilladorId) : null;
    const esMia = it.estado==='pillada' && it.pilladorId === S.yo;

    let chip;
    if(comprada) chip = '<span class="chip-estado chip-green">Comprada</span>';
    else if(esMia) chip = '<span class="chip-estado chip-sky">La traes tú</span>';
    else if(p) chip = `<span class="chip-estado chip-sky">La trae ${esc(p.nombre)}</span>`;
    else chip = '<span class="chip-estado chip-neutro">Sin dueño</span>';

    let meta = '';
    if(comprada){
      const n = consumidores(it).length;
      meta = `<div class="meta">${eur(it.precio)} · pagó ${esc(persona(it.compradorId)?.nombre || '—')} · entre ${n===S.gente.length?'todos':n}</div>`;
    }

    let acciones = '';
    if(!comprada){
      if(esMia){
        acciones = `<button class="btn btn-green btn-mini" data-comprar="${it.id}" type="button">Ya está comprada</button>
          <button class="link-quieto" data-soltar="${it.id}" type="button">soltar</button>`;
      } else if(!p){
        acciones = `<button class="btn btn-soft btn-mini" data-pillar="${it.id}" type="button">Me lo pido</button>
          <button class="link-quieto" data-comprar="${it.id}" type="button">ya comprada</button>
          ${admin ? `<button class="link-quieto" data-asignar="${it.id}" type="button">asignar</button>` : ''}`;
      } else if(admin){
        acciones = `<button class="link-quieto" data-soltar="${it.id}" type="button">soltar</button>
          <button class="link-quieto" data-comprar="${it.id}" type="button">apuntar precio</button>`;
      }
    }

    const puedeQuitar = !comprada && (admin || !p);
    return `<div class="card item-card ${comprada?'comprada-card':''}" ${comprada?`data-editar="${it.id}"`:''}>
      <div class="fila">
        <div style="flex:1;min-width:0">
          <div class="nombre">${esc(it.nombre)}</div>
          ${meta}
          ${acciones ? `<div class="acciones">${acciones}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          ${chip}
          ${puedeQuitar ? `<button class="quitar" data-quitar="${it.id}" type="button" aria-label="Quitar ${esc(it.nombre)}">✕</button>` : ''}
        </div>
      </div>
    </div>`;
  };

  const porComprar = S.items.filter(i=>i.estado!=='comprada');
  const compradas = S.items.filter(i=>i.estado==='comprada');
  const sinDueno = S.items.filter(i=>i.estado==='pendiente').length;

  return `
    <div class="cabecera"><h1>La lista</h1><div class="sub">${sub}</div></div>
    <form class="fila-add" id="formAddItem">
      <input type="text" id="inItem" placeholder="¿Qué falta? (garrafón no)" maxlength="40" autocomplete="off">
      <button class="btn btn-sky" type="submit">Apuntar</button>
    </form>
    <button class="crear-dashed" id="btnGastoDirecto" type="button" style="margin-bottom:14px">
      + Apuntar un gasto ya pagado</button>
    ${!total ? '<div class="vacio">La lista está vacía.<br>Apunta lo primero que haga falta.</div>'
      : porComprar.map(cardItem).join('')
        + (sinDueno ? `<div style="text-align:center;margin:2px 0 10px">
            <button class="link-quieto" id="btnMandarLista" type="button">Mandar lo que falta al grupo</button>
          </div>` : '')
        + (compradas.length && porComprar.length ? '<span class="label">Ya compradas</span>' : '')
        + compradas.map(cardItem).join('')}
  `;
}

function vistaPena(c){
  const filas = S.gente.map(p => {
    const asignadas = S.items.filter(i=>i.estado==='pillada' && i.pilladorId===p.id).length;
    const s = c.saldo[p.id];
    const cls = claseSaldo(s);
    const estado = s>0?'le deben':(s<0?'debe':'en paz');
    const subs = [];
    if(p.admin) subs.push('Organiza la fiesta');
    if(asignadas) subs.push(`trae ${asignadas} cosa${asignadas===1?'':'s'}`);
    return `
    <div class="persona-fila" data-persona="${p.id}">
      ${avatarHtml(p.id)}
      <div class="centro">
        <div class="nombre">${esc(p.nombre)}${p.id===S.yo?' (tú)':''}${p.admin?LLAVE:''}</div>
        ${subs.length?`<div class="subtexto">${esc(subs.join(' · '))}</div>`:''}
      </div>
      <div class="saldo ${cls}">
        <span class="cifra">${s>0?'+':''}${eur(s)}</span>
        <span class="estado">${estado}</span>
      </div>
    </div>`;
  }).join('');
  return `
    <div class="cabecera"><h1>La peña</h1><div class="sub">${S.gente.length} en la cuadrilla</div></div>
    <div class="card" style="padding:4px 14px">${filas}</div>
    <button class="btn btn-sky btn-block" id="btnInvitar" type="button" style="margin-top:6px">Mandar al grupo</button>
    <form class="fila-add" id="formAddPersona" style="margin-top:14px">
      <input type="text" id="inPersona" placeholder="Añadir a alguien a mano" maxlength="20" autocomplete="off">
      <button class="btn btn-borde" type="submit">Añadir</button>
    </form>
  `;
}

function vistaCuentas(c){
  if(c.total === 0){
    return `
      <div class="cabecera"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
      <div class="vacio">Aún no hay gastos apuntados.<br>En cuanto la peña compre cosas, aquí salen las cuentas.</div>
      <div style="text-align:center"><button class="btn btn-green" id="btnGastoDirecto" type="button">Apuntar un gasto</button></div>`;
  }

  const flecha = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h15M14 6l6 6-6 6"/></svg>';
  const check = '<svg viewBox="0 0 24 24"><path d="M4.5 12.5l5 5 10-11"/></svg>';
  const pendientes = bizumsPendientes(c);

  // tu cuenta, lo primero
  let miCuenta;
  if(!S.yo){
    miCuenta = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="micuenta-accion" style="border-top:none;margin-top:0;padding-top:2px">
        <span class="texto">Di quién eres y te digo cómo vas.</span>
        <button class="btn btn-sky btn-mini" id="btnQuienSoy" type="button">¿Quién eres?</button>
      </div>
    </div>`;
  } else {
    const s = c.saldo[S.yo] || 0;
    const cls = claseSaldo(s);
    const titulo = s === 0 ? 'Estás en paz' : s > 0 ? `Te deben ${eur(s)}` : `Debes ${eur(-s)}`;
    const misBizums = pendientes.filter(b => b.de === S.yo || b.a === S.yo);
    const acciones = misBizums.map(b => b.de === S.yo
      ? `<div class="micuenta-accion">
          <span class="texto">Haz bizum de <b>${eur(b.cents)}</b> a <b>${esc(persona(b.a).nombre)}</b></span>
          <button class="btn btn-soft btn-mini" data-copiabizum="${b.a}" data-cents="${b.cents}" type="button">Copiar</button>
        </div>`
      : `<div class="micuenta-accion">
          <span class="texto"><b>${esc(persona(b.de).nombre)}</b> te debe <b>${eur(b.cents)}</b></span>
        </div>`).join('');
    miCuenta = `<div class="card">
      <span class="label">Tu cuenta</span>
      <div class="micuenta-cifra ${cls}">${titulo}</div>
      <div class="micuenta-desglose">Pagaste ${eur(c.pagado[S.yo]||0)} · te tocaba ${eur(c.debe[S.yo]||0)}</div>
      ${acciones || (s === 0 ? '<div class="micuenta-accion"><span class="texto">Ni pa ti ni pa mí. Así da gusto.</span></div>' : '')}
    </div>`;
  }

  // «por cabeza» solo cuando es verdad (todas las compras entre todos)
  const uniforme = S.items.every(i => i.estado !== 'comprada' || !i.consumen || !i.consumen.length);
  const subTotal = uniforme
    ? `${eur(Math.round(c.total / S.gente.length))} por cabeza`
    : 'repartido según quién cata cada cosa';

  const bizumsHtml = c.bizums.map(b => {
    const key = claveBizum(b), hecho = hechoBizum(key);
    return `<div class="card bizum-fila ${hecho?'hecho':''}">
      <div class="quien">${esc(persona(b.de).nombre)}${flecha}${esc(persona(b.a).nombre)}</div>
      <span class="cuanto">${eur(b.cents)}</span>
      <button class="check ${hecho?'on':''}" data-bizum="${key}" type="button"
        aria-label="${hecho?'Deshacer':'Marcar'} bizum de ${esc(persona(b.de).nombre)} a ${esc(persona(b.a).nombre)}">${check}</button>
    </div>`;
  }).join('');

  const todoEnPaz = c.bizums.length>0 && pendientes.length===0;

  return `
    <div class="cabecera"><h1>Las cuentas</h1><div class="sub">Bizums mínimos pa quedar en paz</div></div>
    ${miCuenta}
    <div class="card total-card">
      <div class="cifra">${eur(c.total)}</div>
      <div class="porcabeza">${subTotal}</div>
    </div>
    ${c.bizums.length ? '<span class="label">Bizums de todos</span>' : ''}
    ${bizumsHtml}
    ${todoEnPaz ? '<div class="enpaz">Cuentas claras y el chocolate espeso.</div>'
      : c.bizums.length ? '<div class="pie-nota">Marca el círculo cuando el bizum esté hecho.</div>'
      : '<div class="enpaz">Cuentas en paz. Ni pa ti ni pa mí.</div>'}
    <button class="btn btn-borde btn-block" id="btnCompartirCuentas" type="button" style="margin-top:14px">
      Mandar las cuentas al grupo</button>
  `;
}

/* ================= pintar ================= */
function pintar(){
  sync.pintarLuego = false; // repintar por cualquier vía salda la deuda
  document.body.classList.toggle('sin-fiesta', !S);
  const v = $('#vista');
  if(!S){
    v.innerHTML = vistaEntrada();
    conectarEntrada(v);
    return;
  }
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('activa', t.dataset.tab === S.tab));
  const c = cuentas();
  const pend = bizumsPendientes(c).length;
  const badge = $('#badgeCuentas');
  badge.hidden = pend===0;
  badge.textContent = pend;

  v.innerHTML = S.tab==='fiesta' ? vistaFiesta(c)
    : S.tab==='lista' ? vistaLista()
    : S.tab==='pena' ? vistaPena(c)
    : vistaCuentas(c);
  conectar(v);
}

function conectarEntrada(v){
  v.querySelector('#btnUnirme').onclick = () => {
    const txt = v.querySelector('#inEnlace').value.trim();
    if(!txt) return sheetUnirse();
    if(!importar(txt)) toast('Ahí no hay ninguna fiesta que valga');
  };
  v.querySelector('#btnCrear').onclick = sheetCrear;
  v.querySelector('#btnVerEjemplo').onclick = () => {
    S = demo(); guardar(); pintar(); sheetIdentidad(true);
  };
}

function conectar(v){
  const on = (sel, fn) => { const el = v.querySelector(sel); if(el) el.onclick = fn; };

  /* fiesta / inicio */
  on('#btnInvitar', () => sheetCompartir('invitar'));
  on('#btnPonerVivo', activarVivo);
  on('#btnQuienSoy', () => sheetIdentidad(false));
  on('#btnMiCuenta', () => { S.tab='cuentas'; guardar(); pintar(); });
  on('#btnAccion', e => {
    const ir = v.querySelector('#btnAccion').dataset.ir;
    if(ir === 'gasto'){
      if(!S.yo) return sheetIdentidad(true);
      sheetGasto(null);
    } else { S.tab = ir; guardar(); pintar(); }
  });
  on('#btnRenombrar', sheetRenombrar);
  on('#btnNueva', () => sheetConfirmar('¿Empezar otra fiesta?',
    S.remota
      ? 'Se quita de tu móvil, pero sigue viva en el servidor pa la peña: con el enlace del grupo vuelves cuando quieras.'
      : 'Esta se borra de tu móvil. Si quieres conservarla, copia antes el enlace de invitación: sirve de copia de seguridad.', () => {
      S = null; localStorage.removeItem(CLAVE); pintar();
    }));
  on('#btnVerEjemplo', () => sheetConfirmar('¿Cargar la fiesta de ejemplo?',
    S.remota
      ? 'La tuya sigue viva en el servidor; el ejemplo va solo en este móvil.'
      : 'Se borrará la actual de este móvil (la de tus colegas no se toca).', () => {
      respaldarActual();
      S = demo(); guardarLocal(); pintar(); sheetIdentidad(true);
    }));

  /* lista */
  const form = v.querySelector('#formAddItem');
  if(form) form.onsubmit = e => {
    e.preventDefault();
    const n = v.querySelector('#inItem').value.trim();
    if(!n) return toast('Escribe algo, que la lista no adivina.');
    S.items.unshift(tocar({id:nuevoId('i'), nombre:n, estado:'pendiente',
      creadoEn:ahora(), creadoPor:S.yo || null}));
    guardar(); pintar(); toast('«' + n + '» apuntado');
  };
  on('#btnGastoDirecto', () => {
    if(!S.yo) return sheetIdentidad(true);
    sheetGasto(null);
  });
  on('#btnMandarLista', () => sheetCompartir('lista'));
  v.querySelectorAll('[data-pillar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    const it = S.items.find(x=>x.id===b.dataset.pillar);
    if(!it) return pintar(); // la borraron desde otro móvil
    it.estado='pillada'; it.pilladorId=S.yo;
    tocar(it);
    guardar(); pintar(); toast('Apuntado: ' + it.nombre + ' corre de tu cuenta.');
  });
  v.querySelectorAll('[data-soltar]').forEach(b => b.onclick = () => {
    const it = S.items.find(x=>x.id===b.dataset.soltar);
    if(!it) return pintar();
    if(it.pilladorId !== S.yo && !soyAdmin()) return;
    it.estado='pendiente'; delete it.pilladorId;
    tocar(it);
    guardar(); pintar(); toast('Suelta. A ver quién se la pide ahora.');
  });
  v.querySelectorAll('[data-asignar]').forEach(b => b.onclick = () => {
    if(!soyAdmin()) return toast('Eso es cosa de la llave');
    sheetAsignar(b.dataset.asignar);
  });
  v.querySelectorAll('[data-comprar]').forEach(b => b.onclick = () => {
    if(!S.yo) return sheetIdentidad(true);
    sheetGasto(b.dataset.comprar);
  });
  v.querySelectorAll('[data-editar]').forEach(card => card.onclick = e => {
    if(e.target.closest('button')) return;
    const it = S.items.find(x=>x.id===card.dataset.editar);
    if(!it) return;
    if(!soyAdmin() && it.compradorId !== S.yo){
      const quien = persona(it.compradorId);
      return toast('Solo ' + (quien?quien.nombre:'quien la pagó') + ' o la llave pueden tocarla');
    }
    sheetGasto(card.dataset.editar);
  });
  v.querySelectorAll('[data-quitar]').forEach(b => b.onclick = e => {
    e.stopPropagation();
    S.items = S.items.filter(x=>x.id!==b.dataset.quitar);
    S.papelera.push({id:b.dataset.quitar, t:ahora()});
    guardar(); pintar();
  });

  /* peña */
  const formP = v.querySelector('#formAddPersona');
  if(formP) formP.onsubmit = e => {
    e.preventDefault();
    const n = v.querySelector('#inPersona').value.trim();
    if(!n) return;
    S.gente.push(tocar({id:nuevoId('p'), nombre:n, admin:false}));
    guardar(); pintar(); toast(n + ' se une a la peña');
  };
  v.querySelectorAll('[data-persona]').forEach(f => f.onclick = () => sheetPersona(f.dataset.persona));

  /* cuentas */
  v.querySelectorAll('[data-bizum]').forEach(b => b.onclick = () => {
    const key = b.dataset.bizum;
    const hecho = !hechoBizum(key);
    S.saldados[key] = {hecho, t:ahora(), por:S.yo || null};
    if(hecho){
      const c = cuentas();
      if(c.bizums.every(x=>hechoBizum(x.de+'>'+x.a))) toast('Cuentas claras y el chocolate espeso.');
      else toast('Bizum apuntado');
    }
    guardar(); pintar();
  });
  v.querySelectorAll('[data-copiabizum]').forEach(b => b.onclick = async () => {
    const quien = persona(b.dataset.copiabizum);
    const txt = `Bizum de ${eur(Number(b.dataset.cents))} a ${quien ? quien.nombre : '—'} — «${S.fiesta.nombre}»`;
    const ok = await copiar(txt);
    toast(ok ? 'Copiado. Al Bizum y arreando.' : 'No se ha podido copiar');
  });
  on('#btnCompartirCuentas', () => sheetCompartir('cuentas'));
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  if(!S) return;
  S.tab = t.dataset.tab; guardar(); pintar();
}));

/* arranque: enlace vivo (#F:id:clave), snapshot (#AP1:/#EB1:) o lo guardado */
(function(){
  let hash = location.hash || '';
  try { hash = decodeURIComponent(hash); } catch(e){ /* un % suelto no tumba la app */ }
  const limpiarHash = () => {
    try { history.replaceState(null,'',location.pathname + location.search); } catch(e){}
  };

  const vivo = hash.match(RE_VIVO);
  if(vivo){
    pintar();
    if(!S) toast('Abriendo la fiesta del grupo…');
    // el hash solo se limpia si la fiesta abre: si no hay red, recargar reintenta
    abrirEnlaceVivo(vivo[1].toLowerCase(), vivo[2].toLowerCase())
      .then(ok => { if(ok) limpiarHash(); });
    return;
  }

  if(hash.length > 4){
    const obj = decodificar(hash);
    if(obj){
      respaldarActual();
      S = obj; guardarLocal();
      limpiarHash();
    }
  }
  pintar();
  if(S && !S.yo) sheetIdentidad(true);
  if(S && S.remota) bajar();
})();

/* la fiesta viva se mantiene al día sola */
setInterval(() => {
  if(document.visibilityState !== 'visible' || !S || !S.remota) return;
  refrescarSync();
  if(sync.pintarLuego) pintarOLuego();
  bajar();
  if(sync.sinRed || estadoJson() !== sync.subido) subir();
}, 12000);
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') bajar();
});
window.addEventListener('online', () => { subir(); bajar(); });
</script>

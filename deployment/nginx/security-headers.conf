# Shared security headers. nginx does not inherit add_header from a parent
# block into a location that defines its own add_header, so every location
# that sets Cache-Control also needs to `include` this file.
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
add_header X-Frame-Options "DENY" always;

# BEGIN GENERATED CSP — run: node scripts/update_csp.js
add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; form-action 'self'; script-src 'self' 'sha256-CiNOFxP3biVZRURhzE6fmaaxSuzf191ab4JwrlpKWi8='; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; style-src-elem 'self' https://fonts.googleapis.com 'sha256-LN3NX5Fh3Abjj4ruTLdQOuke0EUpTQJYMAtoIxOZxxM='; style-src-attr 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; media-src 'none'; worker-src 'none'; upgrade-insecure-requests" always;
# END GENERATED CSP
